<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Il Gioco dell'Oca — Edizione Bevuta</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e9d9b2; --paper-2:#e2cd9c; --paper-dark:#d2b984;
    --ink:#33240f; --ink-soft:#5b431f;
    --oxblood:#7d2a26; --oxblood-deep:#5d1c1a;
    --verd:#2f6b5b; --verd-deep:#1f4a3e;
    --gold:#b3893b; --gold-bright:#d8b154; --terra:#b1542a;
    --shadow:rgba(45,28,8,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  button{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  html,body{
    width:100%;height:100dvh;overflow:hidden;
    background:#1c1206;font-family:'EB Garamond',Georgia,serif;color:var(--ink);
    -webkit-tap-highlight-color:transparent;user-select:none;
  }
  body{
    background:
      radial-gradient(ellipse at 30% 12%, rgba(255,246,214,.5), transparent 55%),
      radial-gradient(ellipse at 78% 88%, rgba(120,80,30,.30), transparent 55%),
      linear-gradient(160deg, var(--paper) 0%, var(--paper-2) 45%, var(--paper-dark) 100%);
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='150' height='150' filter='url(%23n)' opacity='0.5'/></svg>");
    mix-blend-mode:multiply;opacity:.14;
  }

  #app{position:relative;z-index:2;width:100vw;height:100dvh;display:flex;}
  .frame{
    flex:1;display:flex;flex-direction:column;min-height:0;
    margin:0;border:0;padding:max(6px,env(safe-area-inset-top)) 0 0;
  }

  /* Topbar (title sits inline at breadcrumb/button level) */
  .topbar{display:flex;align-items:center;gap:8px;flex:none;padding:0 10px;}
  .topbar a.bc{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;color:var(--ink-soft);
    text-decoration:none;border-bottom:1px solid var(--gold);flex:none;}
  .topbar a.bc:hover{color:var(--oxblood);}
  .gtitle{flex:1;min-width:0;text-align:center;font-family:'Cinzel',serif;font-weight:900;
    color:var(--oxblood);font-size:clamp(14px,3.4vw,20px);letter-spacing:.04em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-btns{display:flex;gap:6px;flex:none;}
  .ic-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    background:transparent;border:1.5px solid var(--ink-soft);color:var(--ink-soft);font-size:14px;}
  .ic-btn:hover{color:var(--oxblood);border-color:var(--oxblood);}

  /* ===== SETUP ===== */
  .setup{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;
    align-items:center;gap:14px;padding:14px 12px;text-align:center;}
  .setup.hide,.game,.win{display:none;}
  .pick-label{font-family:'Cinzel',serif;letter-spacing:.2em;font-size:12px;color:var(--oxblood);text-transform:uppercase;}
  .count-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .count-btn{width:50px;height:50px;border:2px solid var(--ink);background:var(--paper);color:var(--ink);
    font-family:'Cinzel',serif;font-weight:700;font-size:20px;border-radius:50%;box-shadow:0 3px 0 var(--shadow);}
  .count-btn.on{background:var(--oxblood);color:var(--paper);border-color:var(--oxblood-deep);
    box-shadow:0 0 0 3px rgba(176,137,59,.4),0 3px 0 var(--shadow);}
  .names{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;width:100%;max-width:560px;}
  .name-field{display:flex;align-items:center;gap:9px;border:1.5px solid var(--ink-soft);
    background:rgba(255,250,232,.5);padding:7px 10px;}
  .seal{width:20px;height:20px;border-radius:50%;flex:none;border:2px solid rgba(0,0,0,.25);box-shadow:inset 0 0 5px rgba(0,0,0,.35);}
  .name-field input{flex:1;min-width:0;border:none;background:transparent;font-family:'EB Garamond',serif;
    font-size:16px;color:var(--ink);outline:none;}
  .name-field input::placeholder{color:var(--ink-soft);opacity:.7;}
  .btn{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    font-size:clamp(14px,2.4vw,17px);color:var(--paper);background:linear-gradient(180deg,var(--verd),var(--verd-deep));
    border:2px solid var(--ink);padding:12px 30px;box-shadow:0 5px 0 var(--shadow);transition:.12s;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
  .btn.gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:var(--ink);}

  /* ===== GAME ===== */
  .game.show{display:flex;flex-direction:column;flex:1;min-height:0;gap:7px;padding-top:6px;}

  .players-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;flex:none;align-items:stretch;padding:0 10px;}
  .players-row.top{transform:rotate(180deg);padding-top:12px;padding-bottom:16px;}
  .players-row.bottom{padding-top:16px;padding-bottom:max(12px,env(safe-area-inset-bottom));}

  .pslot{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0;}
  .pslot.empty{visibility:hidden;}
  .pslot .pname{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.04em;
    color:var(--ink-soft);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pbox{display:flex;align-items:center;gap:8px;padding:8px 10px;border:2px solid var(--ink-soft);
    background:rgba(255,250,232,.4);transition:.18s;}
  .pbox.active{border-color:var(--gold-bright);background:rgba(216,177,84,.34);
    animation:boxglow 1.1s ease-in-out infinite;}
  @keyframes boxglow{
    0%,100%{box-shadow:0 0 0 1px var(--gold-bright),0 0 6px 1px rgba(216,177,84,.55);}
    50%{box-shadow:0 0 0 2px var(--gold-bright),0 0 14px 4px rgba(216,177,84,.85);}}
  .avatar{width:26px;height:26px;border-radius:50%;flex:none;
    border:2px solid rgba(30,16,4,.6);box-shadow:inset 0 0 5px rgba(0,0,0,.35);}
  .dslot{width:34px;height:34px;flex:none;border:1.5px solid var(--ink-soft);
    background:rgba(255,248,222,.5);display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;font-weight:700;font-size:17px;color:var(--ink-soft);}
  .dslot.empty{opacity:.3;}
  .dslot.prev{opacity:.9;color:var(--ink-soft);background:rgba(255,248,222,.35);}
  .dslot.live{border-color:var(--oxblood);color:var(--oxblood);cursor:pointer;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(176,137,59,.55)}50%{box-shadow:0 0 0 6px rgba(176,137,59,0)}}

  .menu-board{width:min(74vw,260px);aspect-ratio:7/9;flex:none;margin:2px auto;
    border:2px solid var(--ink);outline:1px solid var(--gold);outline-offset:2px;}
  .menu-board .cell{cursor:default;}
  .menu-board .cell .ico{font-size:9px;}
  .menu-board .cell .num{font-size:8px;}

  .board-wrap{flex:1 1 0;min-height:0;display:flex;align-items:center;justify-content:center;
    width:100%;overflow:hidden;}
  /* Tuscan meadow: grass board, a winding dirt path drawn on the SVG route */
  .board{width:100%;height:100%;position:relative;display:grid;
    grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(9,1fr);
    overflow:hidden;
    background:
      radial-gradient(ellipse at 30% 12%, rgba(232,240,170,.55), transparent 55%),
      repeating-linear-gradient(64deg, rgba(40,70,20,.10) 0 3px, transparent 3px 9px),
      repeating-linear-gradient(116deg, rgba(40,70,20,.08) 0 2px, transparent 2px 11px),
      linear-gradient(170deg,#9aae53 0%,#83992f 45%,#6f8a2c 100%);
    box-shadow:inset 0 0 50px rgba(40,55,15,.45);}
  .route{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}
  .cell{position:relative;z-index:2;background:transparent;
    border:1px solid rgba(34,26,10,.32);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    font-family:'Cinzel',serif;font-weight:700;color:#3a2912;overflow:visible;}
  .cell .num{position:absolute;top:1px;right:3px;font-size:clamp(7px,1.5vw,11px);
    opacity:.85;text-shadow:0 1px 0 rgba(255,246,214,.7),0 0 3px rgba(255,246,214,.6);}
  .cell .ico{font-size:clamp(13px,2.8vw,22px);filter:drop-shadow(0 1px 1px rgba(0,0,0,.55));}
  .cell.cur{z-index:3;box-shadow:inset 0 0 0 3px var(--gold-bright);}
  .cell.cur .num{color:var(--oxblood);}
  .tokens{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4;}
  .token{position:absolute;width:clamp(17px,3.8vw,30px);height:clamp(17px,3.8vw,30px);
    border-radius:50%;border:2px solid rgba(20,12,2,.85);
    box-shadow:0 0 0 2px rgba(255,245,220,.7),0 2px 6px rgba(0,0,0,.6);
    transform:translate(-50%,-50%);
    transition:left .25s cubic-bezier(.45,.05,.3,1),top .25s cubic-bezier(.45,.05,.3,1);}
  .token.active{box-shadow:0 0 0 2px #fff,0 0 11px 3px var(--gold-bright),0 2px 6px rgba(0,0,0,.6);
    z-index:5;animation:tokpulse 1s ease-in-out infinite;}
  @keyframes tokpulse{0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.16);}}

  /* ===== Field info / event popup ===== */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
    padding:22px;background:rgba(28,18,6,.66);}
  .modal.show{display:flex;}
  .modal .card{max-width:440px;width:100%;border:2px solid var(--ink);
    outline:1px solid var(--gold);outline-offset:3px;
    background:linear-gradient(160deg,#f1e3bd,#e0c890);
    box-shadow:0 14px 36px rgba(0,0,0,.55), inset 0 0 0 5px rgba(176,137,59,.16);
    padding:20px 22px 22px;text-align:center;}
  .modal .mtag{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.26em;
    color:var(--ink-soft);text-transform:uppercase;}
  .modal h3{font-family:'Cinzel',serif;color:var(--oxblood);font-size:clamp(19px,5vw,26px);
    margin:5px 0 10px;}
  .modal .mbody{font-size:clamp(15px,3vw,18px);line-height:1.45;color:var(--ink);}
  .modal .mbody b{color:var(--oxblood);}
  .modal .mclose{margin-top:18px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:14px;color:var(--paper);
    background:linear-gradient(180deg,var(--verd),var(--verd-deep));
    border:2px solid var(--ink);padding:10px 26px;box-shadow:0 4px 0 var(--shadow);}
  .modal .mclose:active{transform:translateY(2px);box-shadow:0 2px 0 var(--shadow);}

  /* ===== WIN ===== */
  .win.show{display:flex;flex:1;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;text-align:center;padding:20px;}
  .win .crest{font-size:64px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.4));}
  .win h2{font-family:'Cinzel',serif;font-size:clamp(22px,6vw,40px);color:var(--oxblood);}
  .win .sub{font-style:italic;color:var(--ink-soft);font-size:16px;max-width:460px;}

  @media (orientation:landscape) and (max-height:560px){
    .gtitle{font-size:clamp(13px,3vw,17px);}
  }
</style>
</head>
<body>
<div id="app">
  <div class="frame">

    <div class="topbar">
      <a class="bc" href="../../index.html">‹ Arcade</a>
      <div class="gtitle">Il Gioco dell'Oca</div>
      <div class="tb-btns">
        <button class="ic-btn" id="fsBtn" aria-label="Schermo intero" title="Schermo intero">⛶</button>
        <button class="ic-btn" id="restartBtn" aria-label="Ricomincia" title="Ricomincia" hidden>☰</button>
      </div>
    </div>

    <!-- SETUP -->
    <section class="setup" id="setup">
      <p class="pick-label">Quanti siete?</p>
      <div class="count-row" id="countRow"></div>
      <div class="names" id="names"></div>
      <div class="menu-board"><div class="board" id="menuBoard"></div></div>
      <button class="btn gold" id="startBtn">Inizia la Partita</button>
    </section>

    <!-- GAME -->
    <section class="game" id="game">
      <div class="players-row top" id="playersTop"></div>

      <div class="board-wrap"><div class="board" id="board"></div></div>

      <div class="players-row bottom" id="playersBottom"></div>
    </section>

    <!-- WIN -->
    <section class="win" id="win">
      <div class="crest">🪿</div>
      <h2 id="winName">Vincitore</h2>
      <div class="sub" id="winSub"></div>
      <button class="btn gold" id="againBtn">Un'Altra Partita</button>
    </section>

  </div>

  <!-- Field info / event popup -->
  <div class="modal" id="modal">
    <div class="card" role="dialog" aria-modal="true">
      <div class="mtag" id="mTag">Casella</div>
      <h3 id="mTitle">—</h3>
      <div class="mbody" id="mBody"></div>
      <button class="mclose" id="mClose">Chiudi</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const SEAL_COLORS=["#7d2a26","#2f6b5b","#b3893b","#3a4f7a","#8a4a86","#9c5a25"];
  const TOTAL=63, COLS=7, ROWS=9;

  // All fields are "common" for now — add custom fields here later.
  const GEESE=[];
  const SPECIALS={};
  const PARTY_SQUARES=[];
  const PARTY_PROMPTS=[
    {t:"Verità",d:"Rispondi a una domanda scomoda, o bevi due sorsi."},
    {t:"Obbligo",d:"Accetta una sfida dal gruppo, oppure cul sec."},
    {t:"Cascata",d:"Tutti bevono: nessuno smette finché non smetti tu."},
    {t:"Categorie",d:"Scegli una categoria; chi esita o ripete, beve."},
    {t:"Maestro delle Regole",d:"Inventa una regola fino al tuo prossimo turno."},
    {t:"Pollice",d:"Quando vuoi, pollice sul tavolo: l'ultimo a imitarti beve."},
    {t:"Brindisi",d:"Fai un brindisi: chi non lo ricambia con stile, beve."},
    {t:"Specchio",d:"Chi parla con te deve imitare i tuoi gesti, o beve."}
  ];

  // playerIndex -> slot (0,1,2 = top row; 3,4,5 = bottom row)
  const LAYOUT={
    2:[4,1], 3:[4,0,2], 4:[3,0,2,5], 5:[3,4,5,0,2], 6:[3,4,5,0,1,2]
  };

  let players=[], cur=0, partyIdx=0, busy=false, started=false, rollIv=null, moveIv=null, gen=0;
  let chosenCount=2;
  let cellEls={};

  const $=id=>document.getElementById(id);
  const countRow=$("countRow"), namesBox=$("names");

  /* ---------- Setup ---------- */
  for(let c=2;c<=6;c++){
    const b=document.createElement("button");
    b.className="count-btn"+(c===2?" on":""); b.textContent=c; b.dataset.c=c;
    b.addEventListener("click",()=>{chosenCount=c;[...countRow.children].forEach(x=>x.classList.toggle("on",+x.dataset.c===c));buildNames();});
    countRow.appendChild(b);
  }
  function buildNames(){
    namesBox.innerHTML="";
    for(let i=0;i<chosenCount;i++){
      const w=document.createElement("label"); w.className="name-field";
      const s=document.createElement("span"); s.className="seal"; s.style.background=SEAL_COLORS[i];
      const inp=document.createElement("input"); inp.type="text"; inp.maxLength=14;
      inp.placeholder="Giocatore "+(i+1);
      w.appendChild(s); w.appendChild(inp); namesBox.appendChild(w);
    }
  }
  buildNames();

  function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

  /* ---------- Board (rectangular inward spiral; 63 = centre) ---------- */
  const SPIRAL=(function(){
    const grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    const map={}, dr=[0,1,0,-1], dc=[1,0,-1,0];
    let r=0,c=0,dir=0;                                   // start top-left, go right, wind inward
    for(let k=1;k<=TOTAL;k++){
      map[k]={row:r+1,col:c+1}; grid[r][c]=k;
      let nr=r+dr[dir], nc=c+dc[dir];
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS||grid[nr][nc]!==0){
        dir=(dir+1)%4; nr=r+dr[dir]; nc=c+dc[dir];
      }
      r=nr; c=nc;
    }
    return map;                                          // map[TOTAL] = innermost (centre) cell
  })();
  function gridRC(n){ return SPIRAL[n]; }
  function classify(n){
    if(n===TOTAL) return "goal";
    if(n===1) return "start";
    if(GEESE.includes(n)) return "goose";
    if(SPECIALS[n]) return "peril";
    if(PARTY_SQUARES.includes(n)) return "party";
    return "";
  }
  function routeSVG(){
    // Polyline through every cell centre (units = grid cells); rounded
    // joins/caps give the footpath its soft curved corners.
    let d="";
    for(let n=1;n<=TOTAL;n++){
      const {row,col}=gridRC(n);
      d+=(n===1?"M ":"L ")+(col-0.5)+" "+(row-0.5)+" ";
    }
    let marks="";
    const dot=(n,fill,r)=>{ const {row,col}=gridRC(n);
      marks+='<circle cx="'+(col-0.5)+'" cy="'+(row-0.5)+'" r="'+r+'" fill="'+fill+'"/>'; };
    for(let n=1;n<=TOTAL;n++){
      const k=classify(n);
      if(k==="goose") dot(n,"rgba(31,74,62,.85)",0.30);
      else if(k==="peril") dot(n,"rgba(125,42,38,.85)",0.30);
      else if(k==="party") dot(n,"rgba(179,137,59,.9)",0.28);
    }
    const g1=gridRC(1), g63=gridRC(TOTAL);
    return '<svg class="route" viewBox="0 0 '+COLS+' '+ROWS+'" preserveAspectRatio="none" aria-hidden="true">'
      +'<path d="'+d+'" fill="none" stroke="#5c3d20" stroke-width="0.72" stroke-linejoin="round" stroke-linecap="round"/>'
      +'<path d="'+d+'" fill="none" stroke="#b9894f" stroke-width="0.58" stroke-linejoin="round" stroke-linecap="round"/>'
      +'<circle cx="'+(g1.col-0.5)+'" cy="'+(g1.row-0.5)+'" r="0.40" fill="#cdb98a" stroke="#5c3d20" stroke-width="0.06"/>'
      +'<circle cx="'+(g63.col-0.5)+'" cy="'+(g63.row-0.5)+'" r="0.46" fill="#b9894f" stroke="#5c3d20" stroke-width="0.07"/>'
      +'<circle cx="'+(g63.col-0.5)+'" cy="'+(g63.row-0.5)+'" r="0.30" fill="none" stroke="#d8b154" stroke-width="0.07"/>'
      +marks
      +'</svg>';
  }
  function buildCells(boardEl,track){
    boardEl.innerHTML=""; if(track) cellEls={};
    boardEl.insertAdjacentHTML("beforeend",routeSVG());
    for(let n=1;n<=TOTAL;n++){
      const {row,col}=gridRC(n);
      const kind=classify(n);
      const el=document.createElement("div");
      el.className="cell"+(kind?" "+kind:"");
      el.style.gridRow=row; el.style.gridColumn=col;
      let ico=""; if(n===TOTAL) ico="🏆"; else if(kind==="goose") ico="🦢";
      else if(SPECIALS[n]) ico=SPECIALS[n].ico; else if(kind==="party") ico="✦";
      el.innerHTML='<span class="num">'+n+'</span>'+(ico?'<span class="ico">'+ico+'</span>':'');
      el.title=n===TOTAL?"Il Giardino dell'Oca":(SPECIALS[n]?SPECIALS[n].title:(kind==="goose"?"L'Oca":(kind==="party"?"Pegno":"Casella "+n)));
      if(track) el.addEventListener("click",()=>openCellInfo(n));
      boardEl.appendChild(el); if(track) cellEls[n]=el;
    }
    if(track) boardEl.insertAdjacentHTML("beforeend",'<div class="tokens" id="tokens"></div>');
  }
  function renderBoard(){ buildCells($("board"),true); }
  buildCells($("menuBoard"),false); // static menu preview

  /* ---------- Player tokens (centred, visible, animated) ---------- */
  function cxy(pos){
    const {row,col}=gridRC(Math.max(1,Math.min(TOTAL,pos)));
    return { x:((col-0.5)/COLS)*100, y:((row-0.5)/ROWS)*100 };
  }
  function placeTok(p,pos,instant){
    if(!p.tok) return;
    const c=cxy(pos);
    let dx=0,dy=0;
    if(pos===p.pos){                       // settled: fan out shared cell
      const same=players.filter(q=>q.pos===p.pos), m=same.length, i=same.indexOf(p);
      if(m>1){ const a=(i/m)*Math.PI*2; dx=Math.cos(a)*2.6; dy=Math.sin(a)*2.6; }
    }
    if(instant) p.tok.style.transition="none";
    p.tok.style.left=(c.x+dx)+"%"; p.tok.style.top=(c.y+dy)+"%";
    if(instant){ void p.tok.offsetWidth; p.tok.style.transition=""; }
  }
  function syncTokens(){
    players.forEach(p=>placeTok(p,p.pos,false));
    players.forEach(p=>{ if(p.tok) p.tok.classList.toggle("active", started && players[cur]===p); });
    Object.values(cellEls).forEach(c=>c.classList.remove("cur"));
    if(started && players[cur]){
      const cc=cellEls[Math.max(1,Math.min(TOTAL,players[cur].pos))];
      if(cc) cc.classList.add("cur");
    }
  }
  function makeTokens(){
    const layer=$("tokens"); if(!layer) return;
    layer.innerHTML="";
    players.forEach(p=>{
      const t=document.createElement("div"); t.className="token";
      t.style.background="radial-gradient(circle at 35% 30%,#fff,"+SEAL_COLORS[p.idx]+" 62%,rgba(0,0,0,.45))";
      layer.appendChild(t); p.tok=t;
      placeTok(p,p.pos,true);
    });
    syncTokens();
  }
  // Walk the token from->to one field at a time (snakes-style); long
  // jumps glide directly. p.pos must already be the final value.
  function animateMove(p,fromPos,toPos,cb){
    if(moveIv){ clearInterval(moveIv); moveIv=null; }
    const g=gen;                                  // stale-guard: a restart/exit bumps gen
    const done=()=>{ if(g!==gen) return; syncTokens(); cb(); };
    const delta=toPos-fromPos, dist=Math.abs(delta);
    if(dist===0){ syncTokens(); setTimeout(done,140); return; }
    if(dist>14){ placeTok(p,toPos,false); setTimeout(done,320); return; }
    const stp=delta>0?1:-1; let q=fromPos;
    moveIv=setInterval(()=>{
      q+=stp; placeTok(p,q,false);
      if(q===toPos){ clearInterval(moveIv); moveIv=null; setTimeout(done,150); }
    },135);
  }


  /* ---------- Popup (field info + event verdicts) ---------- */
  function showModal(tag,title,html){
    $("mTag").textContent=tag; $("mTitle").innerHTML=title; $("mBody").innerHTML=html;
    $("modal").classList.add("show");
  }
  function closeModal(){ $("modal").classList.remove("show"); }
  function event(title,html){ showModal("La Sorte",title,html); }

  function openCellInfo(n){
    const kind=classify(n);
    let title, body;
    if(n===TOTAL){
      title="Il Giardino dell'Oca 🪿";
      body="Casella <b>63</b>, l'arrivo al centro. Raggiungila con il <b>tiro esatto</b> per vincere; se superi, rimbalzi indietro.";
    }else if(kind==="goose"){
      title="L'Oca 🦢";
      body="Casella <b>"+n+"</b>. Chi vi arriva <b>avanza ancora</b> dello stesso tiro e <b>beve</b> &mdash; e le oche si concatenano.";
    }else if(SPECIALS[n]){
      const sp=SPECIALS[n];
      title=sp.title+" "+sp.ico;
      body="Casella <b>"+n+"</b>. "+sp.text;
    }else if(kind==="party"){
      title="Pegno ✦";
      body="Casella <b>"+n+"</b>. Una prova a sorte: verità, obbligo, cascata, categorie&hellip; bevi se fallisci.";
    }else if(n===1){
      title="La Partenza";
      body="Casella <b>1</b>. Tutti partono da qui. Buona fortuna &mdash; e buona sete.";
    }else{
      title="Casella "+n;
      body="Una casella tranquilla: nessun effetto. Per ora la sete attende.";
    }
    showModal("Casella "+n, title, body);
  }

  /* ---------- Per-player controls (minimal: avatar + one dice slot) ---------- */
  function renderPlayers(){
    const top=$("playersTop"), bot=$("playersBottom");
    top.innerHTML=""; bot.innerHTML="";
    const slots=[];
    for(let s=0;s<6;s++){
      const d=document.createElement("div"); d.className="pslot empty";
      slots.push(d); (s<3?top:bot).appendChild(d);
    }
    const lay=LAYOUT[players.length]||LAYOUT[2];
    players.forEach((p,i)=>{
      const slot=slots[lay[i]]; slot.classList.remove("empty");
      const active=started && i===cur;

      const nm=document.createElement("div"); nm.className="pname"; nm.textContent=p.name;

      const box=document.createElement("div"); box.className="pbox"+(active?" active":"");
      const av=document.createElement("div"); av.className="avatar";
      av.style.background="radial-gradient(circle at 35% 30%,#fff6,"+SEAL_COLORS[p.idx]+" 60%,rgba(0,0,0,.4))";
      const ds=document.createElement("div"); ds.className="dslot";

      if(active){
        ds.classList.add("live"); ds.textContent="?";
        box.addEventListener("click",roll);
      }else if(p.lastRoll!=null){
        ds.classList.add("prev"); ds.textContent=String(p.lastRoll);
      }else{
        ds.classList.add("empty");
      }
      box.appendChild(av); box.appendChild(ds);
      slot.appendChild(nm); slot.appendChild(box);
    });
  }
  function activeDie(){ return document.querySelector(".pslot .pbox.active .dslot"); }

  /* ---------- Flow ---------- */
  function startGame(){
    players=[];
    const inputs=namesBox.querySelectorAll("input");
    for(let i=0;i<chosenCount;i++){
      const nm=(inputs[i].value.trim())||("Giocatore "+(i+1));
      players.push({idx:i,name:nm,pos:1,skip:0,trapped:null,lastRoll:null});
    }
    cur=0; started=true; busy=false; partyIdx=0; gen++;
    $("setup").classList.add("hide"); $("win").classList.remove("show"); closeModal();
    $("game").classList.add("show"); $("restartBtn").hidden=false;
    renderBoard();
    makeTokens();
    renderPlayers();
  }

  function advanceTurn(){
    cur=(cur+1)%players.length;
    let guard=0;
    while(players[cur].skip>0 && guard++<players.length*8){
      players[cur].skip--; cur=(cur+1)%players.length;
    }
    busy=false;
    syncTokens(); renderPlayers();
  }

  function roll(){
    if(busy || !started) return;
    const p=players[cur];
    const die=activeDie();
    if(!die) return;
    busy=true;
    let ticks=0;
    rollIv=setInterval(()=>{
      die.textContent=String(1+Math.floor(Math.random()*6));
      if(++ticks>9){
        clearInterval(rollIv); rollIv=null;
        const v=1+Math.floor(Math.random()*6);
        die.textContent=String(v); p.lastRoll=v;
        resolve(p,v);
      }
    },55);
  }

  function freeTrappedBy(rollVal){
    if(rollVal!==6) return;
    players.forEach(q=>{ if(q.trapped) q.trapped=null; });
  }

  function resolve(p,sum){
    if(p.trapped){
      if(sum===6){
        p.trapped=null;
        event("Libero! ("+sum+")","<b>"+esc(p.name)+"</b> esce con un colpo di fortuna. <b>Bevi alla libertà</b> e prosegui al prossimo turno.");
      }else{
        event("Ancora bloccato ("+sum+")","Niente <b>6</b>. <b>"+esc(p.name)+"</b> beve un sorso e resta fermo.");
      }
      endRoll(); return;
    }
    freeTrappedBy(sum);

    const from=p.pos;
    let pos=p.pos+sum, title="In Marcia", msg="";
    if(pos===TOTAL){ p.pos=TOTAL; animateMove(p,from,TOTAL,()=>win(p)); return; }
    if(pos>TOTAL){
      const over=pos-TOTAL; pos=TOTAL-over; title="Rimbalzo";
      msg="Superi il traguardo di "+over+"! <b>Rimbalzi</b> alla "+pos+" e <b>bevi</b>.";
    }
    p.pos=pos;
    animateMove(p,from,pos,()=>handleLanding(p,sum,title,msg));
  }

  function handleLanding(p,sum,title,preMsg,depth){
    depth=depth||0;
    const n=p.pos;
    if(GEESE.includes(n)){
      let np=n+sum;
      if(np===TOTAL){ p.pos=TOTAL; animateMove(p,n,TOTAL,()=>win(p)); return; }
      if(np>TOTAL){ np=TOTAL-(np-TOTAL); }
      if(np===n || depth>=12){
        p.pos=np;
        animateMove(p,n,np,()=>{
          event("L'Oca! 🦢","<b>"+esc(p.name)+"</b> rimbalza e resta alla casella <b>"+np+"</b>. <b>Bevi</b> e fermati qui.");
          endRoll();
        });
        return;
      }
      p.pos=np;
      animateMove(p,n,np,()=>handleLanding(p,sum,"L'Oca","l'oca ti ha spinto avanti &mdash; <b>bevi</b>. ",depth+1));
      return;
    }
    const sp=SPECIALS[n];
    if(sp){
      if(sp.skip) p.skip=sp.skip;
      if(sp.trap) p.trapped=sp.trap;
      event(sp.title+" "+sp.ico,(preMsg?preMsg+"<br>":"")+sp.text);
      renderPlayers();
      if(sp.go!==undefined){ p.pos=sp.go; animateMove(p,n,sp.go,endRoll); }
      else { syncTokens(); endRoll(); }
      return;
    }
    if(PARTY_SQUARES.includes(n)){
      const pr=PARTY_PROMPTS[partyIdx%PARTY_PROMPTS.length]; partyIdx++;
      event("Pegno: "+pr.t+" ✦",(preMsg?preMsg+"<br>":"")+"<b>"+esc(p.name)+"</b> &mdash; "+pr.d);
      endRoll(); return;
    }
    if(preMsg) event(title, preMsg);   // only surface notable events (e.g. bounce / goose push)
    endRoll();
  }

  function endRoll(){
    // No manual pass — automatically hand the turn to the next player.
    advanceTurn();
  }

  function win(p){
    started=false; clearRoll(); closeModal();
    $("game").classList.remove("show"); $("win").classList.add("show");
    $("winName").textContent="🏆 "+p.name;
    $("winSub").innerHTML="ha conquistato il <b>Giardino dell'Oca</b> con il tiro esatto. "+
      "Tutti gli altri brindano alla sua gloria con un lungo sorso.";
  }

  /* ---------- Wire up ---------- */
  function clearRoll(){ gen++; if(rollIv){ clearInterval(rollIv); rollIv=null; } if(moveIv){ clearInterval(moveIv); moveIv=null; } busy=false; }
  function toMenu(){
    clearRoll(); started=false; closeModal();
    $("game").classList.remove("show"); $("win").classList.remove("show");
    $("setup").classList.remove("hide"); $("restartBtn").hidden=true;
  }
  $("startBtn").addEventListener("click",startGame);
  $("againBtn").addEventListener("click",toMenu);
  $("restartBtn").addEventListener("click",()=>{ if(confirm("Ricominciare la partita?")) toMenu(); });

  /* ---------- Modal close wiring ---------- */
  $("mClose").addEventListener("click",closeModal);
  $("modal").addEventListener("click",e=>{ if(e.target===$("modal")) closeModal(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

  /* ---------- Fullscreen ---------- */
  const docEl=document.documentElement;
  function isFs(){ return !!(document.fullscreenElement||document.webkitFullscreenElement); }
  function toggleFs(){
    if(!isFs()){
      const r=docEl.requestFullscreen||docEl.webkitRequestFullscreen;
      if(r) r.call(docEl).catch(()=>{});
    }else{
      const x=document.exitFullscreen||document.webkitExitFullscreen;
      if(x) x.call(document).catch(()=>{});
    }
  }
  function syncFsIcon(){ $("fsBtn").textContent=isFs()?"✕":"⛶"; }
  $("fsBtn").addEventListener("click",toggleFs);
  ["fullscreenchange","webkitfullscreenchange"].forEach(e=>document.addEventListener(e,syncFsIcon));
})();
</script>
</body>
