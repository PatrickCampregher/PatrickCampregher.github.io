<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BUSFAHREN — '85</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0420;
    --grid: #1a0a3a;
    --neon-pink: #ff2bd6;
    --neon-cyan: #00f0ff;
    --neon-yellow: #ffd23f;
    --neon-green: #39ff14;
    --neon-purple: #b537f2;
    --dark-square: #14082e;
    --light-square: #1d0b3d;
    --p1: #ff8a00;
    --p2: #ffffff;
    --p3: #c266ff;
    --p4: #4dffd8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  button {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100dvh;
    height: var(--app-vh, 100dvh);
    overflow: hidden;
    background: var(--bg);
    font-family: 'VT323', monospace;
    color: var(--neon-cyan);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* Synthwave grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--neon-pink) 1px, transparent 1px),
      linear-gradient(90deg, var(--neon-pink) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 80%);
    pointer-events: none;
    z-index: 1;
  }

  #app {
    position: relative;
    z-index: 2;
    width: 100vw;
    height: 100dvh;
    height: var(--app-vh, 100dvh);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== START MENU ===== */
  .menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
    padding: max(10px, env(safe-area-inset-top)) 0 20px;
    gap: 16px;
    overflow: hidden;
    position: relative;
  }

  /* Content below the breadcrumb, centered so free space (incl. fullscreen)
     splits evenly above the title and below the Play button. */
  .menu-body {
    flex: 1 1 0;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 8px 0;
  }

  /* Topbar: breadcrumb · title · icon buttons */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 0 12px;
    flex-shrink: 0;
  }

  .topbar a.bc {
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--neon-cyan);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-shadow: 0 0 4px var(--neon-cyan);
    flex: none;
  }
  .topbar a.bc:hover, .topbar a.bc:active {
    color: var(--neon-pink);
    text-shadow: 0 0 6px var(--neon-pink);
  }
  .topbar .bc-sep {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: rgba(0, 240, 255, 0.45);
    flex: none;
  }
  .topbar .bc-current {
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: rgba(0, 240, 255, 0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: none;
    max-width: 42vw;
  }

  .tb-btns {
    display: flex;
    gap: 8px;
    flex: none;
  }

  .menu-fs-btn {
    background: transparent;
    border: 1.5px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-size: 12px;
    line-height: 1;
    width: 22px;
    height: 22px;
    cursor: pointer;
    text-shadow: 0 0 4px var(--neon-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .menu-fs-btn:hover, .menu-fs-btn:active {
    background: var(--neon-cyan);
    color: var(--bg);
    text-shadow: none;
  }

  .tb-spacer { flex: 1; min-width: 0; }

  .menu-title {
    flex: none;
    width: 100%;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 4.8vw, 32px);
    color: var(--neon-pink);
    text-shadow:
      0 0 10px var(--neon-pink),
      3px 3px 0 var(--neon-cyan);
    letter-spacing: 1px;
    line-height: 1.6;
    padding: 2px 16px 4px;
    white-space: nowrap;
  }

  .menu-prompt {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .player-buttons {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    padding: 0 12px;
  }

  .p-btn {
    background: transparent;
    border: 3px solid var(--neon-pink);
    color: var(--neon-pink);
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-shadow: 0 0 6px var(--neon-pink);
    box-shadow: 0 0 8px rgba(255, 43, 214, 0.3);
    min-width: 50px;
  }

  .p-btn.selected {
    background: var(--neon-pink);
    color: var(--bg);
    text-shadow: none;
    box-shadow: 0 0 18px var(--neon-pink);
  }

  /* Player name inputs */
  .name-inputs {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 280px;
    padding: 0 12px;
    flex-shrink: 0;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .name-row.hidden { display: none; }

  .name-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 6px currentColor;
    flex: none;
  }
  .name-dot.p1 { background: var(--p1); color: var(--p1); }
  .name-dot.p2 { background: var(--p2); color: var(--p2); }
  .name-dot.p3 { background: var(--p3); color: var(--p3); }
  .name-dot.p4 { background: var(--p4); color: var(--p4); }

  .name-input {
    flex: 1;
    min-width: 0;
    background: rgba(0, 240, 255, 0.05);
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 1px;
    padding: 6px 10px;
    outline: none;
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .name-input:focus {
    border-color: var(--neon-yellow);
    color: var(--neon-yellow);
    text-shadow: 0 0 4px var(--neon-yellow);
    box-shadow: 0 0 10px rgba(255, 210, 63, 0.3);
  }

  .play-btn {
    background: transparent;
    border: 3px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 12px 28px;
    cursor: pointer;
    text-shadow: 0 0 6px var(--neon-green);
    box-shadow: 0 0 14px rgba(57, 255, 20, 0.5);
    letter-spacing: 3px;
    flex-shrink: 0;
    animation: playPulse 1.4s ease-in-out infinite;
  }
  @keyframes playPulse {
    0%, 100% { box-shadow: 0 0 14px rgba(57, 255, 20, 0.5); }
    50% { box-shadow: 0 0 24px rgba(57, 255, 20, 0.9); }
  }
  .play-btn:hover, .play-btn:active {
    background: var(--neon-green);
    color: var(--bg);
    text-shadow: none;
  }

  /* ===== GAME ===== */
  /* Populated by later tasks (deck/slots/discard + per-player panels). */
  .game {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 14px 0;
    gap: 14px;
    align-items: stretch;
    overflow: hidden;
  }

  /* Controls bar above the play area */
  .controls-bar {
    display: none;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    padding: 0 12px;
  }
  .controls-bar.visible { display: flex; }

  .ctrl-btn {
    background: transparent;
    font-size: 12px;
    line-height: 1;
    width: 22px;
    height: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .ctrl-btn.fs {
    border: 1.5px solid var(--neon-cyan);
    color: var(--neon-cyan);
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .ctrl-btn.fs:hover, .ctrl-btn.fs:active {
    background: var(--neon-cyan);
    color: var(--bg);
    text-shadow: none;
  }
  .ctrl-btn.menu {
    border: 1.5px solid var(--neon-purple);
    color: var(--neon-purple);
    text-shadow: 0 0 4px var(--neon-purple);
  }
  .ctrl-btn.menu:hover, .ctrl-btn.menu:active {
    background: var(--neon-purple);
    color: var(--bg);
    text-shadow: none;
  }

  /* Status header: current player + stage + question */
  .status {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 0 12px;
    text-align: center;
  }
  .status-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .status-name {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 3vw, 16px);
    color: var(--neon-cyan);
    text-shadow: 0 0 6px var(--neon-cyan);
    letter-spacing: 1px;
  }
  .status-stage {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.4vw, 12px);
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    letter-spacing: 1px;
  }
  .status-question {
    font-family: 'VT323', monospace;
    font-size: clamp(15px, 4.4vw, 22px);
    color: var(--neon-pink);
    text-shadow: 0 0 6px var(--neon-pink);
    letter-spacing: 1px;
  }

  /* Center play row: deck · stage slots · discard */
  .play-row {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2.5vw, 22px);
    padding: 0 10px;
    flex-wrap: nowrap;
  }

  .pile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: none;
  }
  .pile-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: rgba(0, 240, 255, 0.6);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Card-sized box used by deck/slots/discard */
  .slot {
    --card-w: clamp(48px, 13vw, 84px);
    width: var(--card-w);
    height: calc(var(--card-w) * 1.4);
    border-radius: 9px;
    flex: none;
    position: relative;
  }
  .slot.empty {
    border: 2px dashed rgba(0, 240, 255, 0.35);
    background: rgba(0, 240, 255, 0.03);
  }
  .slot .card {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .slot-num {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 3vw, 16px);
    color: rgba(0, 240, 255, 0.3);
    pointer-events: none;
  }

  .stage-slots {
    display: flex;
    align-items: center;
    gap: clamp(4px, 1.6vw, 12px);
    flex: none;
  }

  /* Face-down deck stack with offset shadow cards + count badge */
  .deck-stack { position: relative; }
  .deck-stack .deck-shadow {
    position: absolute;
    inset: 0;
    border-radius: 9px;
    background: #14082e;
    border: 2px solid rgba(181, 55, 242, 0.5);
  }
  .deck-stack .deck-shadow.s1 { transform: translate(4px, 4px); }
  .deck-stack .deck-shadow.s2 { transform: translate(8px, 8px); }
  .deck-count {
    position: absolute;
    bottom: -8px;
    right: -8px;
    min-width: 24px;
    height: 24px;
    padding: 0 5px;
    border-radius: 12px;
    background: var(--bg);
    border: 2px solid var(--neon-yellow);
    color: var(--neon-yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 4px var(--neon-yellow);
    z-index: 3;
  }
  /* Per-player control panels */
  .controls-region {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 10px;
    flex-wrap: wrap;
  }
  .panel {
    flex: 1 1 0;
    min-width: 0;
    max-width: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 8px 6px;
    border: 2px solid var(--pc, var(--neon-cyan));
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.02);
    box-shadow: 0 0 8px rgba(0, 240, 255, 0.30);
    box-shadow: 0 0 8px color-mix(in srgb, var(--pc, var(--neon-cyan)) 30%, transparent);
  }
  .panel.active {
    background: rgba(0, 240, 255, 0.12);
    background: color-mix(in srgb, var(--pc, var(--neon-cyan)) 12%, transparent);
    box-shadow: 0 0 16px rgba(0, 240, 255, 0.55);
    box-shadow: 0 0 16px color-mix(in srgb, var(--pc, var(--neon-cyan)) 55%, transparent);
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    justify-content: center;
  }
  .panel-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #fff;
    background: var(--pc);
    color: var(--pc);
    box-shadow: 0 0 6px currentColor;
    flex: none;
  }
  .panel-name {
    font-family: 'VT323', monospace;
    font-size: 17px;
    letter-spacing: 1px;
    color: var(--pc, var(--neon-cyan));
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel-status {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: rgba(0, 240, 255, 0.65);
  }
  .panel-status.done {
    color: var(--neon-green);
    text-shadow: 0 0 6px var(--neon-green);
  }
  .panel-btns {
    display: flex;
    gap: 6px;
    width: 100%;
  }
  .ans-btn {
    flex: 1 1 0;
    min-width: 0;
    background: transparent;
    border: 2px solid var(--pc, var(--neon-cyan));
    color: var(--pc, var(--neon-cyan));
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 8px 2px;
    cursor: pointer;
    text-shadow: 0 0 4px var(--pc, var(--neon-cyan));
    transition: all 0.12s;
  }
  .ans-btn:not(:disabled):hover,
  .ans-btn:not(:disabled):active {
    background: var(--pc, var(--neon-cyan));
    color: var(--bg);
    text-shadow: none;
  }
  .ans-btn:disabled {
    opacity: 0.28;
    cursor: not-allowed;
    text-shadow: none;
    box-shadow: none;
  }

  /* Brief result feedback in the status header */
  .status-result {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.4vw, 12px);
    letter-spacing: 1px;
    min-height: 1em;
    margin-top: 2px;
  }
  .status-result.win {
    color: var(--neon-green);
    text-shadow: 0 0 6px var(--neon-green);
  }
  .status-result.lose {
    color: var(--neon-pink);
    text-shadow: 0 0 6px var(--neon-pink);
  }

  /* ===== END SCREEN OVERLAY ===== */
  .end-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: rgba(10, 4, 32, 0.92);
    backdrop-filter: blur(2px);
  }
  .end-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 360px;
    max-height: 100%;
    overflow: auto;
    padding: 22px 18px;
    border: 3px solid var(--neon-pink);
    border-radius: 12px;
    background: rgba(20, 8, 46, 0.95);
    box-shadow: 0 0 24px rgba(255, 43, 214, 0.55);
  }
  .end-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 4.6vw, 22px);
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink), 2px 2px 0 var(--neon-cyan);
    letter-spacing: 2px;
    text-align: center;
  }
  .end-ranks {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    padding: 0;
    margin: 0;
  }
  .end-rank {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 2px solid var(--neon-cyan);
    border-radius: 8px;
    background: rgba(0, 240, 255, 0.05);
  }
  .end-rank.busfahrer {
    border-color: var(--neon-yellow);
    background: rgba(255, 210, 63, 0.08);
    box-shadow: 0 0 12px rgba(255, 210, 63, 0.4);
  }
  .end-pos {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--neon-yellow);
    text-shadow: 0 0 4px var(--neon-yellow);
    flex: none;
    min-width: 22px;
  }
  .end-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 6px currentColor;
    flex: none;
  }
  .end-name {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--neon-cyan);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .end-tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    flex: none;
  }
  .end-again {
    background: transparent;
    border: 3px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    padding: 12px 24px;
    cursor: pointer;
    text-shadow: 0 0 6px var(--neon-green);
    box-shadow: 0 0 14px rgba(57, 255, 20, 0.5);
    letter-spacing: 2px;
  }
  .end-again:hover, .end-again:active {
    background: var(--neon-green);
    color: var(--bg);
    text-shadow: none;
  }

  /* ===== CARDS ===== */
  /* Sizing/visuals only. Positioning is added by later tasks. */
  .card {
    --card-w: 84px;
    width: var(--card-w);
    height: calc(var(--card-w) * 1.4);
    display: block;
    border-radius: 9px;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    flex: none;
  }
  .card svg {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div id="app">
  <!-- START MENU -->
  <div class="menu" id="menu">
    <div class="topbar">
      <a class="bc" href="../../index.html">Arcade</a>
      <span class="bc-sep">›</span>
      <span class="bc-current">Busfahren</span>
      <div class="tb-spacer"></div>
      <div class="tb-btns">
        <button class="menu-fs-btn" id="menuFsBtn" aria-label="Fullscreen">⛶</button>
      </div>
    </div>
    <div class="menu-body">
      <div class="menu-title">BUSFAHREN</div>
      <div class="menu-prompt">SPIELER WÄHLEN</div>
      <div class="player-buttons">
        <button class="p-btn" data-players="1">1</button>
        <button class="p-btn" data-players="2">2</button>
        <button class="p-btn" data-players="3">3</button>
        <button class="p-btn" data-players="4">4</button>
      </div>
      <div class="name-inputs" id="nameInputs">
        <div class="name-row" data-idx="0">
          <span class="name-dot p1"></span>
          <input class="name-input" id="name0" type="text" maxlength="14" value="Spieler 1" aria-label="Name Spieler 1">
        </div>
        <div class="name-row" data-idx="1">
          <span class="name-dot p2"></span>
          <input class="name-input" id="name1" type="text" maxlength="14" value="Spieler 2" aria-label="Name Spieler 2">
        </div>
        <div class="name-row" data-idx="2">
          <span class="name-dot p3"></span>
          <input class="name-input" id="name2" type="text" maxlength="14" value="Spieler 3" aria-label="Name Spieler 3">
        </div>
        <div class="name-row" data-idx="3">
          <span class="name-dot p4"></span>
          <input class="name-input" id="name3" type="text" maxlength="14" value="Spieler 4" aria-label="Name Spieler 4">
        </div>
      </div>
      <button class="play-btn" id="playBtn">▶ SPIELEN</button>
    </div>
  </div>

  <!-- GAME -->
  <div class="game" id="game" style="display:none;">
    <!-- Controls: upper-right (fullscreen + exit to menu) -->
    <div class="controls-bar" id="controlsBar">
      <button class="ctrl-btn fs" id="fsBtn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
      <button class="ctrl-btn menu" id="restartBtn" aria-label="Main menu" title="Hauptmenü">☰</button>
    </div>

    <!-- Status header -->
    <div class="status" id="status">
      <div class="status-line">
        <span class="status-name" id="statusName">Spieler 1</span>
        <span class="status-stage" id="statusStage">Stufe (1/4)</span>
      </div>
      <div class="status-question" id="statusQuestion">Höher oder tiefer als 10?</div>
      <div class="status-result" id="statusResult"></div>
    </div>

    <!-- Center play row: deck · 4 stage slots · discard -->
    <div class="play-row" id="playRow">
      <div class="pile">
        <div class="pile-label">Stapel</div>
        <div class="slot deck-stack" id="deckStack">
          <div class="deck-shadow s2"></div>
          <div class="deck-shadow s1"></div>
          <div class="card" id="deckCard"></div>
          <div class="deck-count" id="deckCount">0</div>
        </div>
      </div>

      <div class="stage-slots" id="stageSlots">
        <div class="slot empty" data-stage="1"><span class="slot-num">1</span></div>
        <div class="slot empty" data-stage="2"><span class="slot-num">2</span></div>
        <div class="slot empty" data-stage="3"><span class="slot-num">3</span></div>
        <div class="slot empty" data-stage="4"><span class="slot-num">4</span></div>
      </div>

      <div class="pile">
        <div class="pile-label">Ablage</div>
        <div class="slot empty" id="discardSlot"></div>
      </div>
    </div>

    <!-- One control panel per active player -->
    <div class="controls-region" id="controlsRegion"></div>
  </div>

  <!-- END SCREEN OVERLAY (shown when all players finished) -->
  <div class="end-overlay" id="endOverlay" style="display:none;">
    <div class="end-card">
      <div class="end-title">SPIEL VORBEI</div>
      <ol class="end-ranks" id="endRanks"></ol>
      <button class="end-again" id="endAgainBtn">↻ NOCHMAL</button>
    </div>
  </div>
</div>

<script>
  // ============ DOM ============
  const menu = document.getElementById('menu');
  const game = document.getElementById('game');
  const playBtn = document.getElementById('playBtn');
  const nameRows = Array.from(document.querySelectorAll('.name-row'));

  let selectedPlayers = 2; // default

  // ============ SETUP MENU ============
  function updatePlayerSelection() {
    document.querySelectorAll('.p-btn').forEach(btn => {
      const n = parseInt(btn.dataset.players, 10);
      btn.classList.toggle('selected', n === selectedPlayers);
    });
    // Show/enable only the first N name inputs.
    nameRows.forEach((row, i) => {
      const on = i < selectedPlayers;
      row.classList.toggle('hidden', !on);
      const input = row.querySelector('.name-input');
      if (input) input.disabled = !on;
    });
  }

  document.querySelectorAll('.p-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPlayers = parseInt(btn.dataset.players, 10);
      updatePlayerSelection();
    });
  });

  // ============ GAME STATE ============
  // Built by startGame(); Task 4 mutates it inside onAnswer() then calls render().
  let state = null;

  const PLAYER_COLORS = ['var(--p1)', 'var(--p2)', 'var(--p3)', 'var(--p4)'];

  // The two decision-button captions for a given stage (1-based).
  function buttonLabels(stage) {
    switch (stage) {
      // same labels; stage 1 compares vs 10, stage 2 vs card 1 (Task 4)
      case 1: case 2: return ['TIEFER', 'HÖHER'];
      case 3: return ['INNEN', 'AUSSEN'];
      case 4: return ['ROT', 'SCHWARZ'];
      default: return ['TIEFER', 'HÖHER'];
    }
  }

  // Header question text for a given stage (1-based). German UI.
  function stageQuestion(stage) {
    switch (stage) {
      case 1: return 'Höher oder tiefer als 10?';
      case 2: return 'Höher oder tiefer als die erste Karte?';
      case 3: return 'Innen oder außen?';
      case 4: return 'Rot oder schwarz?';
      default: return 'Höher oder tiefer als 10?';
    }
  }

  // ============ DOM (game view) ============
  const statusName = document.getElementById('statusName');
  const statusStage = document.getElementById('statusStage');
  const statusQuestion = document.getElementById('statusQuestion');
  const statusResult = document.getElementById('statusResult');
  const endOverlay = document.getElementById('endOverlay');
  const endRanks = document.getElementById('endRanks');
  const endAgainBtn = document.getElementById('endAgainBtn');
  const stageSlots = document.getElementById('stageSlots');
  const deckCard = document.getElementById('deckCard');
  const deckStack = document.getElementById('deckStack');
  const deckCount = document.getElementById('deckCount');
  const discardSlot = document.getElementById('discardSlot');
  const controlsRegion = document.getElementById('controlsRegion');
  const restartBtn = document.getElementById('restartBtn');

  // ============ RENDER ============
  // (Re)draws header + stage slots + deck + discard + per-player panels from
  // `state`. Safe to call repeatedly — Task 4 calls this after each move.
  function render() {
    if (!state) return;
    const active = state.players[state.activePlayer];

    // Status header (active player + their stage + matching question).
    statusName.textContent = active.name;
    statusStage.textContent = 'Stufe (' + active.stage + '/4)';
    statusQuestion.textContent = stageQuestion(active.stage);

    // Deck stack: face-down back + remaining count (or empty hint).
    if (state.deck.length > 0) {
      deckCard.style.display = '';
      deckCard.innerHTML = cardBackSVG();
      deckCount.style.display = '';
      deckCount.textContent = String(state.deck.length);
      deckStack.classList.remove('empty');
    } else {
      deckCard.style.display = 'none';
      deckCount.style.display = 'none';
      deckStack.classList.add('empty');
      deckCard.innerHTML = '';
    }

    // Four stage slots: show active player's revealed cards, else placeholder.
    // Select by data-stage (not child order) so Task 5 can insert transient
    // in-flight card elements into stageSlots without misaligning the render.
    for (let stage = 1; stage <= 4; stage++) {
      const slot = stageSlots.querySelector('[data-stage="' + stage + '"]');
      if (!slot) continue;
      const card = active.revealed[stage - 1];
      if (card) {
        slot.classList.remove('empty');
        slot.innerHTML = '<div class="card">' + cardSVG(card) + '</div>';
      } else {
        slot.classList.add('empty');
        slot.innerHTML = '<span class="slot-num">' + stage + '</span>';
      }
    }

    // Discard: top card face-up, else empty.
    const top = state.discard[state.discard.length - 1];
    if (top) {
      discardSlot.classList.remove('empty');
      discardSlot.innerHTML = '<div class="card">' + cardSVG(top) + '</div>';
    } else {
      discardSlot.classList.add('empty');
      discardSlot.innerHTML = '';
    }

    renderControls();
  }

  // Per-player panels: name + status + the two stage-appropriate buttons.
  // Only the active, unfinished player's buttons are enabled.
  function renderControls() {
    controlsRegion.innerHTML = '';
    state.players.forEach((p, idx) => {
      const isActive = idx === state.activePlayer && !p.finished;

      const panel = document.createElement('div');
      panel.className = 'panel' + (isActive ? ' active' : '');
      panel.style.setProperty('--pc', PLAYER_COLORS[idx]);

      const head = document.createElement('div');
      head.className = 'panel-head';
      const dot = document.createElement('span');
      dot.className = 'panel-dot';
      const nm = document.createElement('span');
      nm.className = 'panel-name';
      nm.textContent = p.name;
      head.appendChild(dot);
      head.appendChild(nm);

      const st = document.createElement('div');
      st.className = 'panel-status' + (p.finished ? ' done' : '');
      st.textContent = p.finished ? 'FERTIG' : (p.stage + '/4');

      const btns = document.createElement('div');
      btns.className = 'panel-btns';
      if (p.finished) {
        // Finished players: inert placeholders only — no stage labels (stage
        // may be reset) and no click listener (status stays FERTIG).
        for (let k = 0; k < 2; k++) {
          const b = document.createElement('button');
          b.className = 'ans-btn';
          b.disabled = true;
          btns.appendChild(b);
        }
      } else {
        const labels = buttonLabels(p.stage);
        labels.forEach((label, choiceIndex) => {
          const b = document.createElement('button');
          b.className = 'ans-btn';
          b.textContent = label;
          b.disabled = !isActive;
          b.addEventListener('click', () => onAnswer(idx, choiceIndex));
          btns.appendChild(b);
        });
      }

      panel.appendChild(head);
      panel.appendChild(st);
      panel.appendChild(btns);
      controlsRegion.appendChild(panel);
    });
  }

  // ============ RULES ENGINE ============

  // Pure stage resolver. NO side effects — returns 'win' or 'lose'.
  //
  // Contract (read carefully — Task 5 depends on this):
  //  - stage:       1-based stage number being attempted.
  //  - choiceIndex: chosen button index (0 = first label, 1 = second label,
  //                 per buttonLabels for that stage).
  //  - card:        the just-drawn card for THIS attempt — the resolver
  //                 evaluates the outcome against THIS card.
  //  - revealed:    the player's revealed array for this attempt. It is
  //                 passed AFTER the just-drawn card has been pushed, so it
  //                 INCLUDES the current card as its LAST element. The
  //                 resolver therefore reads PRIOR-stage reference cards by
  //                 fixed index — revealed[0] = stage-1 card, revealed[1] =
  //                 stage-2 card — and the just-drawn card ONLY via the
  //                 `card` parameter (never via revealed[revealed.length-1]).
  //
  // Drawing exactly the boundary value is an auto loss; the Weli
  // (value Infinity, isWeli) always wins.
  function resolveStage(stage, choiceIndex, card, revealed) {
    if (stage === 1) {
      // choiceIndex 0 = TIEFER (< 10), 1 = HÖHER (> 10). Exactly 10 = lose.
      if (card.isWeli) return 'win';
      if (card.value === 10) return 'lose';
      if (choiceIndex === 1) return card.value > 10 ? 'win' : 'lose';
      return card.value < 10 ? 'win' : 'lose';
    }

    if (stage === 2) {
      // Compare against the stage-1 card. Weli first card => value Infinity.
      if (card.isWeli) return 'win';
      const first = revealed[0];
      const ref = first.isWeli ? Infinity : first.value;
      if (card.value === ref) return 'lose';
      if (choiceIndex === 1) return card.value > ref ? 'win' : 'lose';
      return card.value < ref ? 'win' : 'lose';
    }

    if (stage === 3) {
      // INNEN (0) / AUSSEN (1) relative to cards 1 & 2. Landing on a bound
      // = lose. Weli => win. Both bounds equal: only "außen" can win.
      if (card.isWeli) return 'win';
      const v0 = revealed[0].isWeli ? Infinity : revealed[0].value;
      const v1 = revealed[1].isWeli ? Infinity : revealed[1].value;
      const lo = Math.min(v0, v1);
      const hi = Math.max(v0, v1);
      if (card.value === lo || card.value === hi) return 'lose';
      if (choiceIndex === 0) return (card.value > lo && card.value < hi) ? 'win' : 'lose';
      return (card.value < lo || card.value > hi) ? 'win' : 'lose';
    }

    // Stage 4 — ROT (0) / SCHWARZ (1). Weli (no color) always wins.
    if (card.isWeli) return 'win';
    const want = choiceIndex === 0 ? 'rot' : 'schwarz';
    return colorOf(card) === want ? 'win' : 'lose';
  }

  // Draw the top card. Reshuffles the discard back into the deck when empty
  // (Task 5 will wrap this with a shuffle animation; functional here).
  function drawCard() {
    if (state.deck.length === 0) {
      state.deck = shuffle(state.discard);
      state.discard = [];
    }
    return state.deck.pop();
  }

  // Move a player's revealed (attempt) cards onto the discard pile and clear.
  function discardRevealed(p) {
    while (p.revealed.length) state.discard.push(p.revealed.shift());
  }

  // Advance the turn to the next not-finished player (wraps). No-op when
  // everyone is finished (end screen handles that case).
  function advanceTurn() {
    const n = state.players.length;
    for (let step = 1; step <= n; step++) {
      const idx = (state.activePlayer + step) % n;
      if (!state.players[idx].finished) {
        state.activePlayer = idx;
        return;
      }
    }
  }

  function checkAllFinished() {
    return state.players.every(p => p.finished);
  }

  // Brief textual feedback for the just-resolved attempt.
  function setResult(text, kind) {
    statusResult.textContent = text;
    statusResult.className = 'status-result' + (kind ? ' ' + kind : '');
  }

  // Outcome-continuation seam. Given the resolved outcome for the active
  // player's attempt, applies exactly what happens after the resolver
  // decides: a non-terminal win (<stage 4) bumps the stage; a terminal
  // win (stage 4 cleared) finishes the player, discards, records finish
  // order and may end the game; a lose resets to stage 1 and discards.
  // Returns true when the end screen was shown (caller must stop).
  //
  // This is intentionally a single SYNCHRONOUS function so Task 5 can defer
  // the call (run a deal/flip animation showing the just-drawn card in its
  // slot) BEFORE the discard/turn-pass happens. Do not add async/timers
  // here — that is Task 5's job.
  function applyOutcome(p, playerIndex, outcome, stage, cardName) {
    if (outcome === 'win') {
      if (stage < 4) {
        // Advance to the next stage — SAME player keeps going.
        p.stage = stage + 1;
        setResult('RICHTIG! (' + cardName + ') → Stufe ' + p.stage, 'win');
      } else {
        // Cleared all four stages — player finishes.
        p.finished = true;
        state.finishOrder.push(playerIndex);
        discardRevealed(p);
        setResult(p.name + ' ist FERTIG! (' + cardName + ')', 'win');
        if (checkAllFinished()) {
          render();
          showEndScreen();
          return true;
        }
        advanceTurn();
      }
    } else {
      // Wrong / boundary / auto-loss — back to Stufe 1, turn passes on.
      p.stage = 1;
      discardRevealed(p);
      setResult('FALSCH (' + cardName + ') — zurück zu Stufe 1', 'lose');
      advanceTurn();
    }
    return false;
  }

  // Decision-button handler. Resolves the active player's current stage from
  // a freshly drawn card, applies win/lose, advances stage or passes the
  // turn, reshuffles when needed, detects game end, then re-renders.
  function onAnswer(playerIndex, choiceIndex) {
    if (!state) return;
    // Only the active, non-finished player may act.
    if (playerIndex !== state.activePlayer) return;
    const p = state.players[playerIndex];
    if (p.finished) return;

    const stage = p.stage;
    const card = drawCard();
    p.revealed.push(card);

    const cardName = card.isWeli
      ? 'Weli'
      : (RANK_LABEL[card.rank] + ' ' + card.suit);

    const outcome = resolveStage(stage, choiceIndex, card, p.revealed);

    // Terminal handling lives behind a single synchronous seam so Task 5 can
    // animate the revealed card before the discard/turn-pass. If the game
    // ended, applyOutcome already rendered + showed the end screen.
    if (applyOutcome(p, playerIndex, outcome, stage, cardName)) return;

    render();
  }

  // Build + show the end overlay: rank by finish order, last = BUSFAHRER.
  function showEndScreen() {
    const order = state.finishOrder || [];
    endRanks.innerHTML = '';
    order.forEach((pIdx, i) => {
      const isLast = i === order.length - 1;
      const li = document.createElement('li');
      li.className = 'end-rank' + (isLast ? ' busfahrer' : '');

      const pos = document.createElement('span');
      pos.className = 'end-pos';
      pos.textContent = (i + 1) + '.';

      const dot = document.createElement('span');
      dot.className = 'end-dot';
      dot.style.background = PLAYER_COLORS[pIdx];
      dot.style.color = PLAYER_COLORS[pIdx];

      const nm = document.createElement('span');
      nm.className = 'end-name';
      nm.textContent = state.players[pIdx].name;

      li.appendChild(pos);
      li.appendChild(dot);
      li.appendChild(nm);

      if (isLast) {
        const tag = document.createElement('span');
        tag.className = 'end-tag';
        tag.textContent = 'BUSFAHRER';
        li.appendChild(tag);
      }
      endRanks.appendChild(li);
    });
    endOverlay.style.display = 'flex';
  }

  // ============ START / RESET ============
  function startGame() {
    const names = [];
    for (let i = 0; i < selectedPlayers; i++) {
      const input = document.getElementById('name' + i);
      const v = input && input.value.trim();
      names.push(v || ('Spieler ' + (i + 1)));
    }

    state = {
      players: names.map(name => ({ name, stage: 1, finished: false, revealed: [] })),
      deck: shuffle(buildDeck()),
      discard: [],
      activePlayer: 0,
      finishOrder: []
    };

    endOverlay.style.display = 'none';
    setResult('', null);
    menu.style.display = 'none';
    game.style.display = 'flex';
    render();
  }

  function backToMenu() {
    state = null;
    endOverlay.style.display = 'none';
    setResult('', null);
    game.style.display = 'none';
    menu.style.display = 'flex';
  }

  playBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', backToMenu);
  endAgainBtn.addEventListener('click', backToMenu);

  // ============ FULLSCREEN ============
  const fsBtn = document.getElementById('fsBtn');
  const menuFsBtn = document.getElementById('menuFsBtn');
  const controlsBar = document.getElementById('controlsBar');
  const docEl = document.documentElement;

  const fsSupported =
    docEl.requestFullscreen ||
    docEl.webkitRequestFullscreen ||
    docEl.mozRequestFullScreen ||
    docEl.msRequestFullscreen;

  // Pre-set; startGame (Task 3) makes #game visible — controls bar is always shown in game view.
  controlsBar.classList.add('visible');
  if (!fsSupported) {
    fsBtn.style.display = 'none';
    menuFsBtn.style.display = 'none';
  }

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement ||
              document.mozFullScreenElement || document.msFullscreenElement);
  }

  const FS_WANT_KEY = 'mg_fs_want';
  function wantFs() { try { return sessionStorage.getItem(FS_WANT_KEY) === '1'; } catch (e) { return false; } }
  function setWantFs(on) {
    try { on ? sessionStorage.setItem(FS_WANT_KEY, '1') : sessionStorage.removeItem(FS_WANT_KEY); } catch (e) {}
  }
  function enterFs() {
    const req = docEl.requestFullscreen || docEl.webkitRequestFullscreen ||
                docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
    if (req) req.call(docEl).catch(() => {});
  }

  function toggleFullscreen() {
    if (!isFullscreen()) {
      setWantFs(true);
      enterFs();
    } else {
      // Explicit user exit — stop auto-restoring on later pages.
      setWantFs(false);
      const exit = document.exitFullscreen || document.webkitExitFullscreen ||
                   document.mozCancelFullScreen || document.msExitFullscreen;
      if (exit) exit.call(document).catch(() => {});
    }
  }

  function updateFsIcon() {
    const icon = isFullscreen() ? '❐' : '⛶';
    fsBtn.textContent = icon;
    menuFsBtn.textContent = icon;
  }

  // After a fullscreen transition the viewport size changes, but the layout
  // sometimes does not re-flow until something triggers it. Forcing a tiny
  // style toggle + dispatching a resize event ensures bottom controls stay visible.
  // Pin the app to the REAL viewport height. dvh is recomputed by the browser
  // asynchronously across fullscreen transitions, so relying on it alone leaves
  // the layout briefly oversized and clips the bottom player row. innerHeight is
  // always the settled value once the matching resize event fires.
  function setAppHeight() {
    document.documentElement.style.setProperty('--app-vh', window.innerHeight + 'px');
  }

  function forceReflow() {
    setAppHeight();
    // Toggle a harmless property on body to force the browser to recompute layout
    document.body.style.minHeight = '0';
    // Read offsetHeight to flush layout
    void document.body.offsetHeight;
    document.body.style.minHeight = '';
  }

  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  fsBtn.addEventListener('click', toggleFullscreen);
  menuFsBtn.addEventListener('click', toggleFullscreen);

  // Navigation force-exits fullscreen and a fresh gesture is required to
  // re-enter. If the user wanted fullscreen, restore it on their first
  // interaction with this page (the tap/click they'd make anyway).
  if (wantFs() && !isFullscreen()) {
    const restore = () => {
      if (wantFs() && !isFullscreen()) enterFs();
      ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev =>
        document.removeEventListener(ev, restore, true));
    };
    ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev =>
      document.addEventListener(ev, restore, true));
  }

  ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange']
    .forEach(ev => document.addEventListener(ev, () => {
      updateFsIcon();
      setAppHeight();
      // The viewport height settles asynchronously; re-measure across a frame
      // and a couple of delays to cover slow fullscreen transitions.
      requestAnimationFrame(() => {
        forceReflow();
        setTimeout(forceReflow, 250);
        setTimeout(forceReflow, 600);
      });
    }));

  // ============ CARD MODEL ============
  // German-suited Watt deck: 4 suits, ranks 7..Ass, plus the Weli jolly.
  const SUITS = ['schell', 'eichel', 'herz', 'laub'];
  const RANKS = { '7': 7, '8': 8, '9': 9, '10': 10, unter: 11, ober: 12, koenig: 13, ass: 14 };

  // Short rank label for corner indices.
  const RANK_LABEL = {
    '7': '7', '8': '8', '9': '9', '10': '10',
    unter: 'U', ober: 'O', koenig: 'K', ass: 'A'
  };

  function buildDeck() {
    const deck = [];
    for (const suit of SUITS) {
      for (const rank of Object.keys(RANKS)) {
        deck.push({
          id: suit + '_' + rank,
          suit,
          rank,
          value: RANKS[rank],
          isWeli: false
        });
      }
    }
    // The Weli: suitless jolly that always wins (value Infinity).
    deck.push({ id: 'weli', suit: null, rank: 'weli', value: Infinity, isWeli: true });
    return deck;
  }

  // 'rot' = herz + laub · 'schwarz' = eichel + schell · null = Weli (no color).
  function colorOf(card) {
    if (card.isWeli) return null;
    if (card.suit === 'herz' || card.suit === 'laub') return 'rot';
    if (card.suit === 'eichel' || card.suit === 'schell') return 'schwarz';
    return null;
  }

  // Fisher–Yates, in place, returns the same array for convenience.
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = array[i];
      array[i] = array[j];
      array[j] = t;
    }
    return array;
  }

  // ============ SVG CARD FACES ============
  // All drawing happens on a 240 x 336 viewBox (1 : 1.4).
  const CARD_W = 240, CARD_H = 336;
  const CARD_RED = '#e23426';
  const CARD_BLACK = '#1a1430';

  // --- Reusable suit emblems, drawn around the origin, ~ -1..1 box. ---
  // Each returns SVG path/markup; caller wraps it in a <g transform> to place/scale.
  function emblemSchell(fill) {
    // Round sleigh-bell: body, slit, jingle holes, top loop.
    return (
      '<g fill="' + fill + '">' +
      '<path d="M0,-0.86 C0.55,-0.86 0.92,-0.42 0.92,0.18 C0.92,0.5 0.74,0.66 0.74,0.78 ' +
      'L-0.74,0.78 C-0.74,0.66 -0.92,0.5 -0.92,0.18 C-0.92,-0.42 -0.55,-0.86 0,-0.86 Z"/>' +
      '<rect x="-0.82" y="0.78" width="1.64" height="0.16" rx="0.06"/>' +
      '<rect x="-0.16" y="-1.08" width="0.32" height="0.26" rx="0.1"/>' +
      '<path d="M-0.13,-0.92 a0.13 0.13 0 1 1 0.26 0" fill="none" stroke="' + fill +
      '" stroke-width="0.12"/>' +
      '</g>' +
      '<ellipse cx="0" cy="0.34" rx="0.16" ry="0.2" fill="rgba(0,0,0,0.32)"/>' +
      '<circle cx="-0.42" cy="-0.16" r="0.09" fill="rgba(255,255,255,0.45)"/>'
    );
  }
  function emblemEichel(fill) {
    // Acorn: nut body + textured cap + tiny stalk.
    return (
      '<g>' +
      '<path d="M-0.6,-0.12 C-0.6,0.62 -0.34,0.96 0,0.96 C0.34,0.96 0.6,0.62 0.6,-0.12 Z" fill="' +
      fill + '"/>' +
      '<path d="M-0.72,-0.5 C-0.72,-0.18 -0.4,0.02 0,0.02 C0.4,0.02 0.72,-0.18 0.72,-0.5 ' +
      'C0.72,-0.74 0.4,-0.92 0,-0.92 C-0.4,-0.92 -0.72,-0.74 -0.72,-0.5 Z" fill="' + fill + '"/>' +
      '<rect x="-0.08" y="-1.16" width="0.16" height="0.3" rx="0.07" fill="' + fill + '"/>' +
      '<g stroke="rgba(255,255,255,0.35)" stroke-width="0.05">' +
      '<line x1="-0.4" y1="-0.66" x2="-0.4" y2="-0.16"/>' +
      '<line x1="0" y1="-0.78" x2="0" y2="-0.12"/>' +
      '<line x1="0.4" y1="-0.66" x2="0.4" y2="-0.16"/>' +
      '</g>' +
      '<ellipse cx="-0.2" cy="0.4" rx="0.12" ry="0.22" fill="rgba(255,255,255,0.28)"/>' +
      '</g>'
    );
  }
  function emblemHerz(fill) {
    return (
      '<path fill="' + fill + '" d="M0,0.92 C-0.2,0.6 -0.95,0.2 -0.95,-0.34 ' +
      'C-0.95,-0.74 -0.62,-0.96 -0.32,-0.96 C-0.1,-0.96 0,-0.78 0,-0.66 ' +
      'C0,-0.78 0.1,-0.96 0.32,-0.96 C0.62,-0.96 0.95,-0.74 0.95,-0.34 ' +
      'C0.95,0.2 0.2,0.6 0,0.92 Z"/>' +
      '<path d="M-0.5,-0.66 C-0.66,-0.5 -0.7,-0.28 -0.64,-0.06" stroke="rgba(255,255,255,0.4)" ' +
      'stroke-width="0.09" fill="none" stroke-linecap="round"/>'
    );
  }
  function emblemLaub(fill) {
    // Leaf frond with stem and midrib veins.
    return (
      '<g>' +
      '<path fill="' + fill + '" d="M0,-0.98 C0.6,-0.5 0.78,0.2 0.34,0.7 ' +
      'C0.16,0.9 -0.16,0.9 -0.34,0.7 C-0.78,0.2 -0.6,-0.5 0,-0.98 Z"/>' +
      '<rect x="-0.07" y="0.62" width="0.14" height="0.42" rx="0.06" fill="' + fill + '"/>' +
      '<g stroke="rgba(255,255,255,0.4)" stroke-width="0.055" fill="none" stroke-linecap="round">' +
      '<line x1="0" y1="-0.78" x2="0" y2="0.66"/>' +
      '<path d="M0,-0.42 L0.36,-0.18 M0,-0.42 L-0.36,-0.18"/>' +
      '<path d="M0,0.02 L0.34,0.26 M0,0.02 L-0.34,0.26"/>' +
      '</g>' +
      '</g>'
    );
  }
  const EMBLEMS = {
    schell: emblemSchell, eichel: emblemEichel, herz: emblemHerz, laub: emblemLaub
  };

  function emblemAt(suit, cx, cy, scale, fill, rotate) {
    const fn = EMBLEMS[suit];
    if (!fn) return '';
    return '<g transform="translate(' + cx + ' ' + cy + ') scale(' + scale + ')' +
      (rotate ? ' rotate(180)' : '') + '">' + fn(fill) + '</g>';
  }

  // Pip layouts (unit coords, x in -1..1, y in -1..1) per rank.
  // Lower half pips are flagged to be drawn rotated 180° like real cards.
  function pipLayout(n) {
    const C = 0, L = -0.62, R = 0.62;
    const T = -0.78, B = 0.78, MT = -0.26, MB = 0.26, M = 0;
    const pos = (x, y) => ({ x, y, flip: y > 0.001 });
    switch (n) {
      case 7:  return [pos(L,T),pos(R,T),pos(C,-0.46),pos(L,M),pos(R,M),pos(L,B),pos(R,B)];
      case 8:  return [pos(L,T),pos(R,T),pos(C,MT),pos(L,M),pos(R,M),pos(C,MB),pos(L,B),pos(R,B)];
      case 9:  return [pos(L,T),pos(R,T),pos(L,MT),pos(R,MT),pos(C,M),
                       pos(L,MB),pos(R,MB),pos(L,B),pos(R,B)];
      case 10: return [pos(L,T),pos(R,T),pos(C,-0.5),pos(L,MT),pos(R,MT),
                       pos(L,MB),pos(R,MB),pos(C,0.5),pos(L,B),pos(R,B)];
      default: return [];
    }
  }

  // Court figures — clean stylized SVG so each rank reads distinctly.
  // Drawn inside an inner panel rect (px coords, the panel is x:60..180 y:64..272).
  function courtFigure(rank, accent, ink) {
    const skin = '#f3d6b3', robe = accent, trim = '#fff6e0';
    let crown = '';
    if (rank === 'koenig') {
      // Tall five-point crown.
      crown = '<path d="M96,96 L96,74 L108,86 L120,66 L132,86 L144,74 L144,96 Z" fill="' +
        '#ffd23f" stroke="' + ink + '" stroke-width="1.5"/>' +
        '<circle cx="120" cy="64" r="3.4" fill="#ff2bd6"/>';
    } else if (rank === 'ober') {
      // Lower, rounded coronet.
      crown = '<path d="M99,96 C99,80 109,74 120,74 C131,74 141,80 141,96 Z" fill="' +
        '#ffd23f" stroke="' + ink + '" stroke-width="1.5"/>' +
        '<circle cx="105" cy="84" r="2.6" fill="#ff2bd6"/>' +
        '<circle cx="120" cy="80" r="2.6" fill="#ff2bd6"/>' +
        '<circle cx="135" cy="84" r="2.6" fill="#ff2bd6"/>';
    } else {
      // Unter / footman: feathered cap.
      crown = '<path d="M101,98 C101,84 110,77 120,77 C130,77 139,84 139,98 Z" fill="' +
        accent + '" stroke="' + ink + '" stroke-width="1.5"/>' +
        '<path d="M120,77 C128,66 138,64 146,68 C140,74 132,78 124,82 Z" fill="#39ff14"/>';
    }
    return (
      // Shoulders / robe.
      '<path d="M84,272 C84,210 96,150 120,150 C144,150 156,210 156,272 Z" fill="' + robe +
      '" stroke="' + ink + '" stroke-width="1.6"/>' +
      // Collar.
      '<path d="M104,158 L120,182 L136,158 Z" fill="' + trim + '"/>' +
      // Center placket.
      '<rect x="118" y="172" width="4" height="96" fill="' + trim + '" opacity="0.7"/>' +
      // Head.
      '<circle cx="120" cy="118" r="22" fill="' + skin + '" stroke="' + ink +
      '" stroke-width="1.4"/>' +
      // Hair / beard hint for König.
      (rank === 'koenig'
        ? '<path d="M99,120 C99,138 108,150 120,150 C132,150 141,138 141,120" fill="none" stroke="' +
          '#7a5a3a" stroke-width="3"/>'
        : '') +
      // Eyes.
      '<circle cx="112" cy="116" r="2.4" fill="' + ink + '"/>' +
      '<circle cx="128" cy="116" r="2.4" fill="' + ink + '"/>' +
      crown
    );
  }

  // Build a full card-face SVG string for the given card.
  function cardSVG(card) {
    const W = CARD_W, H = CARD_H;
    let body = '';

    if (card.isWeli) {
      // Sun / globe motif: rays, disc, meridians, WELI banner.
      const cx = W / 2, cy = H / 2 - 6;
      let rays = '';
      for (let i = 0; i < 16; i++) {
        const a = (Math.PI * 2 * i) / 16;
        const r1 = 60, r2 = 92;
        rays += '<line x1="' + (cx + Math.cos(a) * r1).toFixed(1) +
          '" y1="' + (cy + Math.sin(a) * r1).toFixed(1) +
          '" x2="' + (cx + Math.cos(a) * r2).toFixed(1) +
          '" y2="' + (cy + Math.sin(a) * r2).toFixed(1) + '"/>';
      }
      body =
        '<g stroke="#ffd23f" stroke-width="5" stroke-linecap="round" opacity="0.9">' +
        rays + '</g>' +
        '<circle cx="' + cx + '" cy="' + cy + '" r="54" fill="#ffd23f"/>' +
        '<circle cx="' + cx + '" cy="' + cy + '" r="54" fill="none" stroke="#ff2bd6" ' +
        'stroke-width="3"/>' +
        '<ellipse cx="' + cx + '" cy="' + cy + '" rx="22" ry="54" fill="none" stroke="' +
        '#ff2bd6" stroke-width="2.4" opacity="0.7"/>' +
        '<line x1="' + (cx - 54) + '" y1="' + cy + '" x2="' + (cx + 54) + '" y2="' + cy +
        '" stroke="#ff2bd6" stroke-width="2.4" opacity="0.7"/>' +
        '<text x="' + cx + '" y="' + (cy + 8) +
        '" text-anchor="middle" font-family="\'Press Start 2P\', monospace" font-size="20" ' +
        'fill="#0a0420">W</text>' +
        '<text x="' + cx + '" y="' + (H - 40) +
        '" text-anchor="middle" font-family="\'Press Start 2P\', monospace" font-size="18" ' +
        'fill="#ff2bd6">WELI</text>';

      const idx = cornerIndex('W', null, '#b537f2', true);
      return wrapCard(body + idx, true);
    }

    const isRed = colorOf(card) === 'rot';
    const ink = isRed ? CARD_RED : CARD_BLACK;
    const rank = card.rank;

    if (RANKS[rank] <= 10) {
      // Number card: pip grid of the suit emblem.
      const n = RANKS[rank];
      const layout = pipLayout(n);
      // Map unit coords into the central area.
      const ax = W / 2, ay = H / 2, sx = 58, sy = 110, pip = 22;
      let pips = '';
      for (const p of layout) {
        pips += emblemAt(card.suit,
          (ax + p.x * sx), (ay + p.y * sy), pip, ink, p.flip);
      }
      body = pips;
    } else if (rank === 'ass') {
      // Ace: one large central emblem.
      body = emblemAt(card.suit, W / 2, H / 2, 64, ink, false);
    } else {
      // Court: figure panel + suit emblems in two corners of the panel.
      body =
        '<rect x="58" y="62" width="124" height="212" rx="10" fill="rgba(0,0,0,0.04)" ' +
        'stroke="' + ink + '" stroke-width="1.5"/>' +
        courtFigure(rank, isRed ? '#ff5d73' : '#5a4b8a', ink) +
        emblemAt(card.suit, 74, 78, 15, ink, false) +
        emblemAt(card.suit, 166, 258, 15, ink, true);
    }

    const idx = cornerIndex(RANK_LABEL[rank], card.suit, ink, false);
    return wrapCard(body + idx, false);
  }

  // Corner index block: rank label + mini emblem, top-left and bottom-right (rotated).
  function cornerIndex(label, suit, ink, isWeli) {
    const mini = (x, y, rot) => suit
      ? emblemAt(suit, x, y, 11, ink, rot)
      : (isWeli
          ? '<circle cx="' + x + '" cy="' + y + '" r="8" fill="#b537f2"/>' +
            '<circle cx="' + x + '" cy="' + y + '" r="8" fill="none" stroke="#ffd23f" ' +
            'stroke-width="1.6"/>'
          : '');
    const txt = (x, y, rot) =>
      '<text x="' + x + '" y="' + y + '" text-anchor="middle" ' +
      'font-family="\'Press Start 2P\', monospace" font-size="15" fill="' + ink + '"' +
      (rot ? ' transform="rotate(180 ' + x + ' ' + y + ')"' : '') + '>' + label + '</text>';
    return (
      '<g>' +
      txt(26, 34, false) + mini(26, 56, false) +
      txt(CARD_W - 26, CARD_H - 22, true) + mini(CARD_W - 26, CARD_H - 46, true) +
      '</g>'
    );
  }

  // Wrap card body in the cream card face with border + rounded corners.
  function wrapCard(inner, isWeli) {
    const faceFill = '#f7f1e3';
    const border = isWeli ? '#b537f2' : '#2a1f47';
    return (
      '<svg viewBox="0 0 ' + CARD_W + ' ' + CARD_H + '" xmlns="http://www.w3.org/2000/svg" ' +
      'role="img">' +
      '<rect x="3" y="3" width="' + (CARD_W - 6) + '" height="' + (CARD_H - 6) +
      '" rx="16" fill="' + faceFill + '" stroke="' + border + '" stroke-width="3"/>' +
      '<rect x="10" y="10" width="' + (CARD_W - 20) + '" height="' + (CARD_H - 20) +
      '" rx="11" fill="none" stroke="' + (isWeli ? '#ffd23f' : '#d8cdb0') +
      '" stroke-width="1.4"/>' +
      inner +
      '</svg>'
    );
  }

  // Face-down card back: neon synthwave grid + diagonal glow + monogram.
  function cardBackSVG() {
    const W = CARD_W, H = CARD_H;
    // Monotonic counter mints unique <defs> IDs (bfBack<n>/bfClip<n>) so
    // multiple card-backs can coexist in the DOM at once — needed for the
    // Task 5 deal animation. Contract: each call returns a fresh, self-
    // contained SVG string with its own IDs. Callers must NOT cache a
    // previously-returned string and re-insert it expecting new IDs;
    // call cardBackSVG() again for every distinct DOM card-back instance.
    const n = (cardBackSVG._n = (cardBackSVG._n || 0) + 1);
    const gradId = 'bfBack' + n, clipId = 'bfClip' + n;
    let grid = '';
    for (let x = 24; x < W; x += 24) {
      grid += '<line x1="' + x + '" y1="14" x2="' + x + '" y2="' + (H - 14) + '"/>';
    }
    for (let y = 24; y < H; y += 24) {
      grid += '<line x1="14" y1="' + y + '" x2="' + (W - 14) + '" y2="' + y + '"/>';
    }
    return (
      '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" role="img">' +
      '<defs>' +
      '<linearGradient id="' + gradId + '" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="#1a0a3a"/>' +
      '<stop offset="0.55" stop-color="#0a0420"/>' +
      '<stop offset="1" stop-color="#2a0a45"/>' +
      '</linearGradient>' +
      '<clipPath id="' + clipId + '">' +
      '<rect x="3" y="3" width="' + (W - 6) + '" height="' + (H - 6) +
      '" rx="16"/>' +
      '</clipPath>' +
      '</defs>' +
      '<rect x="3" y="3" width="' + (W - 6) + '" height="' + (H - 6) +
      '" rx="16" fill="url(#' + gradId + ')" stroke="#00f0ff" stroke-width="3"/>' +
      '<g clip-path="url(#' + clipId + ')">' +
      '<g stroke="#ff2bd6" stroke-width="1" opacity="0.32">' + grid + '</g>' +
      '<g stroke="#00f0ff" stroke-width="2" opacity="0.5">' +
      '<line x1="14" y1="' + H + '" x2="' + W + '" y2="14"/>' +
      '<line x1="-20" y1="' + (H - 40) + '" x2="' + (W - 40) + '" y2="-20"/>' +
      '<line x1="40" y1="' + (H + 20) + '" x2="' + (W + 20) + '" y2="40"/>' +
      '</g>' +
      '</g>' +
      '<circle cx="' + (W / 2) + '" cy="' + (H / 2) + '" r="44" fill="rgba(10,4,32,0.6)" ' +
      'stroke="#ffd23f" stroke-width="2.5"/>' +
      '<text x="' + (W / 2) + '" y="' + (H / 2 + 12) +
      '" text-anchor="middle" font-family="\'Press Start 2P\', monospace" font-size="26" ' +
      'fill="#ff2bd6">B</text>' +
      '<rect x="10" y="10" width="' + (W - 20) + '" height="' + (H - 20) +
      '" rx="11" fill="none" stroke="#b537f2" stroke-width="1.4" opacity="0.7"/>' +
      '</svg>'
    );
  }

  // ============ INIT ============
  updatePlayerSelection();
</script>
</body>
</html>
