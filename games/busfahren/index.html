<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BUSFAHREN — '85</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0420;
    --grid: #1a0a3a;
    --neon-pink: #ff2bd6;
    --neon-cyan: #00f0ff;
    --neon-yellow: #ffd23f;
    --neon-green: #39ff14;
    --neon-purple: #b537f2;
    --neon-red: #ff2b4d;
    --dark-square: #14082e;
    --light-square: #1d0b3d;
    --p1: #ff8a00;
    --p2: #ffffff;
    --p3: #c266ff;
    --p4: #4dffd8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  button {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100dvh;
    height: var(--app-vh, 100dvh);
    overflow: hidden;
    background: var(--bg);
    font-family: 'VT323', monospace;
    color: var(--neon-cyan);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* Synthwave grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--neon-pink) 1px, transparent 1px),
      linear-gradient(90deg, var(--neon-pink) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 80%);
    pointer-events: none;
    z-index: 1;
  }

  #app {
    position: relative;
    z-index: 2;
    width: 100vw;
    height: 100dvh;
    height: var(--app-vh, 100dvh);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== START MENU ===== */
  .menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
    padding: max(10px, env(safe-area-inset-top)) 0 20px;
    gap: 16px;
    overflow: hidden;
    position: relative;
  }

  /* Content below the breadcrumb, centered so free space (incl. fullscreen)
     splits evenly above the title and below the Play button. */
  .menu-body {
    flex: 1 1 0;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 8px 0;
  }

  /* Topbar: breadcrumb · title · icon buttons */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 0 12px;
    flex-shrink: 0;
  }

  .topbar a.bc {
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--neon-cyan);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-shadow: 0 0 4px var(--neon-cyan);
    flex: none;
  }
  .topbar a.bc:hover, .topbar a.bc:active {
    color: var(--neon-pink);
    text-shadow: 0 0 6px var(--neon-pink);
  }
  .topbar .bc-sep {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: rgba(0, 240, 255, 0.45);
    flex: none;
  }
  .topbar .bc-current {
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: rgba(0, 240, 255, 0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: none;
    max-width: 42vw;
  }

  .tb-btns {
    display: flex;
    gap: 8px;
    flex: none;
  }

  .menu-fs-btn {
    background: transparent;
    border: 1.5px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-size: 12px;
    line-height: 1;
    width: 22px;
    height: 22px;
    cursor: pointer;
    text-shadow: 0 0 4px var(--neon-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .menu-fs-btn:hover, .menu-fs-btn:active {
    background: var(--neon-cyan);
    color: var(--bg);
    text-shadow: none;
  }

  .tb-spacer { flex: 1; min-width: 0; }

  .menu-title {
    flex: none;
    width: 100%;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 4.8vw, 32px);
    color: var(--neon-pink);
    text-shadow:
      0 0 10px var(--neon-pink),
      3px 3px 0 var(--neon-cyan);
    letter-spacing: 1px;
    line-height: 1.6;
    padding: 2px 16px 4px;
    white-space: nowrap;
  }

  .menu-prompt {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .player-buttons {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    padding: 0 12px;
  }

  .p-btn {
    background: transparent;
    border: 3px solid var(--neon-pink);
    color: var(--neon-pink);
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-shadow: 0 0 6px var(--neon-pink);
    box-shadow: 0 0 8px rgba(255, 43, 214, 0.3);
    min-width: 50px;
  }

  .p-btn.selected {
    background: var(--neon-pink);
    color: var(--bg);
    text-shadow: none;
    box-shadow: 0 0 18px var(--neon-pink);
  }

  /* Player name inputs */
  .name-inputs {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 280px;
    padding: 0 12px;
    flex-shrink: 0;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .name-row.hidden { display: none; }

  .name-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 6px currentColor;
    flex: none;
  }
  .name-dot.p1 { background: var(--p1); color: var(--p1); }
  .name-dot.p2 { background: var(--p2); color: var(--p2); }
  .name-dot.p3 { background: var(--p3); color: var(--p3); }
  .name-dot.p4 { background: var(--p4); color: var(--p4); }

  .name-input {
    flex: 1;
    min-width: 0;
    background: rgba(0, 240, 255, 0.05);
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 1px;
    padding: 6px 10px;
    outline: none;
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .name-input:focus {
    border-color: var(--neon-yellow);
    color: var(--neon-yellow);
    text-shadow: 0 0 4px var(--neon-yellow);
    box-shadow: 0 0 10px rgba(255, 210, 63, 0.3);
  }

  .play-btn {
    background: transparent;
    border: 3px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 12px 28px;
    cursor: pointer;
    text-shadow: 0 0 6px var(--neon-green);
    box-shadow: 0 0 14px rgba(57, 255, 20, 0.5);
    letter-spacing: 3px;
    flex-shrink: 0;
    animation: playPulse 1.4s ease-in-out infinite;
  }
  @keyframes playPulse {
    0%, 100% { box-shadow: 0 0 14px rgba(57, 255, 20, 0.5); }
    50% { box-shadow: 0 0 24px rgba(57, 255, 20, 0.9); }
  }
  .play-btn:hover, .play-btn:active {
    background: var(--neon-green);
    color: var(--bg);
    text-shadow: none;
  }

  /* ===== GAME ===== */
  .game {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 12px 0;
    gap: 10px;
    align-items: stretch;
    overflow: hidden;
  }

  /* Controls: upper-right (fullscreen + exit to menu) */
  .controls-bar {
    display: none;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    padding: 0 12px;
  }
  .controls-bar.visible { display: flex; }

  .ctrl-btn {
    background: transparent;
    font-size: 12px;
    line-height: 1;
    width: 22px;
    height: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .ctrl-btn.fs {
    border: 1.5px solid var(--neon-cyan);
    color: var(--neon-cyan);
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .ctrl-btn.fs:hover, .ctrl-btn.fs:active {
    background: var(--neon-cyan);
    color: var(--bg);
    text-shadow: none;
  }
  .ctrl-btn.menu {
    border: 1.5px solid var(--neon-purple);
    color: var(--neon-purple);
    text-shadow: 0 0 4px var(--neon-purple);
  }
  .ctrl-btn.menu:hover, .ctrl-btn.menu:active {
    background: var(--neon-purple);
    color: var(--bg);
    text-shadow: none;
  }

  /* Top / bottom player rows. Seat layout (set in JS per player count):
     row-center  -> single controller, centered
     row-corners -> two controllers pinned to the left/right corners
     row-left    -> single controller pinned to the (left) corner */
  .players-top, .players-bottom {
    display: flex;
    gap: 12px;
    flex-shrink: 0;
    padding: 0 16px;
    width: 100%;
    align-items: flex-start;
    justify-content: center;
  }
  .players-top { transform: rotate(180deg); }
  .players-top.row-corners,
  .players-bottom.row-corners { justify-content: space-between; }
  .players-top.row-left,
  .players-bottom.row-left { justify-content: flex-start; }
  .players-top:empty, .players-bottom:empty { display: none; }

  /* Center felt: deck + discard, with question/feedback above & below */
  .felt {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .felt-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 6vw, 36px);
  }

  /* Active / last-acting player's question + feedback, parked next to the
     Stapel on whichever side that player's controller sits. The top zone is
     flipped to read right-side-up for the rotated top-row controllers. */
  .stage-msg {
    width: 100%;
    min-height: 5.4em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 12px;
    text-align: center;
  }
  .stage-msg.stage-msg-top { transform: rotate(180deg); }
  .stage-q {
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--neon-pink);
    text-shadow: 0 0 6px var(--neon-pink);
  }
  .pile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: none;
  }
  .pile-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: rgba(0, 240, 255, 0.6);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Card-sized box used by deck/discard and (smaller) by panel spots.
     Aspect matches the card art (134 x 243) so images fill edge-to-edge
     with no letterboxing and their rounded corners actually show. */
  .slot {
    --card-w: clamp(76px, 22vw, 128px);
    width: var(--card-w);
    height: calc(var(--card-w) * 1.814);
    border-radius: 7px;
    flex: none;
    position: relative;
  }
  .slot.empty {
    border: 2px dashed rgba(0, 240, 255, 0.35);
    background: rgba(0, 240, 255, 0.03);
  }
  .slot .card {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
  }
  .slot-num {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 2.6vw, 14px);
    color: rgba(0, 240, 255, 0.3);
    pointer-events: none;
  }
  /* Discard (Ablage) matches the deck (Stapel) size — same --card-w. */

  /* Face-down deck stack: offset copies of the card-back image so the
     Stapel reads as a real deck of cards (no SVG) + count badge. */
  .deck-stack { position: relative; }
  .deck-stack .deck-shadow {
    position: absolute;
    inset: 0;
    border-radius: 7px;
    background: url('CardIcons/background.png') center / cover no-repeat;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
  }
  .deck-stack.empty .deck-shadow { display: none; }
  .deck-stack .deck-shadow.s1 { transform: translate(4px, 4px); }
  .deck-stack .deck-shadow.s2 { transform: translate(8px, 8px); }
  .deck-count {
    position: absolute;
    bottom: -8px;
    right: -8px;
    min-width: 24px;
    height: 24px;
    padding: 0 5px;
    border-radius: 12px;
    background: var(--bg);
    border: 2px solid var(--neon-yellow);
    color: var(--neon-yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 4px var(--neon-yellow);
    z-index: 3;
  }

  /* Per-player controller */
  .panel {
    width: auto;
    max-width: 46vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 14px;
    border: 2px solid var(--pc, var(--neon-cyan));
    border-radius: 10px;
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    box-shadow: 0 0 8px color-mix(in srgb, var(--pc, var(--neon-cyan)) 30%, transparent);
    transition: background 0.32s ease, box-shadow 0.32s ease,
                border-color 0.32s ease, filter 0.32s ease;
    position: relative;
  }
  /* Only the player whose turn it is keeps colour — everyone else is
     fully greyed out (cards included). */
  .panel:not(.active) {
    filter: grayscale(1) brightness(0.72);
  }
  .panel.active {
    background: color-mix(in srgb, var(--pc, var(--neon-cyan)) 12%, transparent);
    box-shadow: 0 0 16px color-mix(in srgb, var(--pc, var(--neon-cyan)) 55%, transparent);
    animation: turnPulse 0.5s ease-out;
  }
  @keyframes turnPulse {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  /* Outcome flash on the acting player's box — replaces the old result text.
     Overrides the inactive grey-out (and is placed after .panel.active so it
     wins on ties) so the colour reads even once the turn has passed on. */
  .panel.result-win,
  .panel.result-lose {
    filter: none;
  }
  /* Entrance pulse — only added on the FIRST paint of a result (renderControls)
     so the sweep-to-Ablage re-render doesn't replay it. */
  .panel.result-anim {
    animation: resultPulse 0.5s ease-out;
  }
  .panel.result-win {
    border-color: var(--neon-green);
    background: color-mix(in srgb, var(--neon-green) 14%, transparent);
    box-shadow: 0 0 18px color-mix(in srgb, var(--neon-green) 60%, transparent);
  }
  .panel.result-lose {
    border-color: var(--neon-red);
    background: color-mix(in srgb, var(--neon-red) 14%, transparent);
    box-shadow: 0 0 18px color-mix(in srgb, var(--neon-red) 60%, transparent);
  }
  @keyframes resultPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  /* The ✓ / ✕ that pops up inside the player control. Rotates with its panel
     (top-row panels are flipped 180°), so it reads upright for each seat. */
  .panel-mark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    font-size: clamp(48px, 14vw, 96px);
    font-weight: bold;
    line-height: 1;
    pointer-events: none;
    z-index: 5;
    opacity: 0.95;
  }
  /* Pop the ✓/✕ in only on the first paint — same gate as the box pulse. */
  .panel.result-anim .panel-mark {
    animation: markPop 0.45s ease-out;
  }
  .panel-mark.win {
    color: var(--neon-green);
    text-shadow: 0 0 12px var(--neon-green), 0 0 24px var(--neon-green);
  }
  .panel-mark.lose {
    color: var(--neon-red);
    text-shadow: 0 0 12px var(--neon-red), 0 0 24px var(--neon-red);
  }
  @keyframes markPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    60%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    100% { opacity: 0.95; transform: translate(-50%, -50%) scale(1); }
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    justify-content: space-between;
  }
  .panel-name {
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--pc, var(--neon-cyan));
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: left;
  }
  /* Right corner of the head: running count of this player's wrong answers. */
  .panel-errors {
    flex: none;
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--neon-red, #ff2b4d);
    text-shadow: 0 0 6px color-mix(in srgb, var(--neon-red, #ff2b4d) 70%, transparent);
    white-space: nowrap;
  }
  .panel-stage {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: rgba(0, 240, 255, 0.65);
  }
  .panel-stage.done {
    color: var(--neon-green);
    text-shadow: 0 0 6px var(--neon-green);
  }
  /* Casino-style stack: each card sits half over the previous one. Later
     spots paint on top so the newest card fans over the older ones; empty
     placeholders recede behind every dealt card. */
  .panel-slots {
    display: flex;
    justify-content: center;
  }
  .panel-slots .slot { --card-w: clamp(50px, 17vw, 78px); }
  .panel-slots .slot + .slot {
    margin-left: calc(var(--card-w) * -0.5);
  }
  .panel-slots .slot:nth-child(1) { z-index: 1; }
  .panel-slots .slot:nth-child(2) { z-index: 2; }
  .panel-slots .slot:nth-child(3) { z-index: 3; }
  .panel-slots .slot:nth-child(4) { z-index: 4; }
  .panel-slots .slot.empty {
    z-index: 0;
    border: 2px dashed color-mix(in srgb, var(--pc, var(--neon-cyan)) 22%, transparent);
    background: transparent;
  }
  .panel-slots .slot-num { display: none; }
  /* A player's seat: the optional decision-button bar stacked ABOVE the
     controller panel (outside its frame), then the panel itself. */
  .seat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }
  /* Active player's icon-only decision buttons, floating just above their
     panel. Built only for the player whose turn it is (renderControls), so
     no one else's seat shows them. */
  .panel-actions {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 220px;
    justify-content: center;
  }
  .ans-btn {
    flex: 1 1 0;
    min-width: 0;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    border: 2px solid var(--pc, var(--neon-cyan));
    border-radius: 10px;
    color: var(--pc, var(--neon-cyan));
    padding: 9px 12px;
    cursor: pointer;
    box-shadow: 0 0 6px color-mix(in srgb, currentColor 35%, transparent);
    transition: transform 0.12s, background 0.12s, color 0.12s, box-shadow 0.12s;
    animation: ansBlink 1.5s ease-in-out infinite;
  }
  .ans-btn:not(:disabled):hover,
  .ans-btn:not(:disabled):active {
    background: var(--pc, var(--neon-cyan));
    color: var(--bg);
    transform: scale(1.08);
    box-shadow: 0 0 16px color-mix(in srgb, var(--pc, var(--neon-cyan)) 75%, transparent);
    animation: none;
  }
  .ans-btn:disabled {
    opacity: 0.28;
    cursor: not-allowed;
    box-shadow: none;
    animation: none;
  }
  /* Rot/Schwarz: the whole button is colour-filled, no glyph. currentColor
     drives the blink glow so each pulses in its own colour. */
  .ans-btn.fill-rot {
    background: var(--neon-red);
    border-color: var(--neon-red);
    color: var(--neon-red);
  }
  .ans-btn.fill-schwarz {
    background: #0a0a0a;
    border-color: rgba(255, 255, 255, 0.6);
    color: rgba(255, 255, 255, 0.85);
  }
  .ans-btn.fill-rot:not(:disabled):hover,
  .ans-btn.fill-rot:not(:disabled):active {
    background: var(--neon-red);
    color: var(--neon-red);
    transform: scale(1.08);
    box-shadow: 0 0 18px color-mix(in srgb, var(--neon-red) 80%, transparent);
  }
  .ans-btn.fill-schwarz:not(:disabled):hover,
  .ans-btn.fill-schwarz:not(:disabled):active {
    background: #0a0a0a;
    transform: scale(1.08);
    box-shadow: 0 0 18px rgba(255, 255, 255, 0.5);
  }
  /* Gentle glow pulse to draw the eye to the active player's choices. */
  @keyframes ansBlink {
    0%, 100% {
      box-shadow: 0 0 5px color-mix(in srgb, currentColor 28%, transparent);
    }
    50% {
      box-shadow: 0 0 15px color-mix(in srgb, currentColor 72%, transparent);
    }
  }
  /* Icon glyph inside a decision button. Arrows/brackets are stroked in the
     current colour (so they invert on hover); .swatch icons carry their own
     literal fill (rot/schwarz) and are left untouched. */
  .btn-ic {
    width: clamp(20px, 6vw, 26px);
    height: clamp(20px, 6vw, 26px);
    display: block;
  }
  .btn-ic:not(.swatch) {
    fill: none;
    stroke: currentColor;
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ===== END SCREEN OVERLAY ===== */
  .end-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: rgba(10, 4, 32, 0.92);
    backdrop-filter: blur(2px);
  }
  .end-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 360px;
    max-height: 100%;
    overflow: auto;
    padding: 22px 18px;
    border: 3px solid var(--neon-pink);
    border-radius: 12px;
    background: rgba(20, 8, 46, 0.95);
    box-shadow: 0 0 24px rgba(255, 43, 214, 0.55);
  }
  .end-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 4.6vw, 22px);
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink), 2px 2px 0 var(--neon-cyan);
    letter-spacing: 2px;
    text-align: center;
  }
  .end-ranks {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    padding: 0;
    margin: 0;
  }
  .end-rank {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 2px solid var(--neon-cyan);
    border-radius: 8px;
    background: rgba(0, 240, 255, 0.05);
  }
  .end-rank.busfahrer {
    border-color: var(--neon-yellow);
    background: rgba(255, 210, 63, 0.08);
    box-shadow: 0 0 12px rgba(255, 210, 63, 0.4);
  }
  .end-pos {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--neon-yellow);
    text-shadow: 0 0 4px var(--neon-yellow);
    flex: none;
    min-width: 22px;
  }
  .end-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 6px currentColor;
    flex: none;
  }
  .end-name {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--neon-cyan);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .end-tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    flex: none;
  }
  /* Per-player wrong-answer tally on the final standings. */
  .end-errors {
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--neon-red, #ff2b4d);
    text-shadow: 0 0 6px color-mix(in srgb, var(--neon-red, #ff2b4d) 70%, transparent);
    flex: none;
    white-space: nowrap;
  }
  .end-again {
    background: transparent;
    border: 3px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    padding: 12px 24px;
    cursor: pointer;
    text-shadow: 0 0 6px var(--neon-green);
    box-shadow: 0 0 14px rgba(57, 255, 20, 0.5);
    letter-spacing: 2px;
  }
  .end-again:hover, .end-again:active {
    background: var(--neon-green);
    color: var(--bg);
    text-shadow: none;
  }

  /* ===== CARDS ===== */
  /* Sizing/visuals only. Positioning is added by later tasks. */
  .card {
    --card-w: 84px;
    width: var(--card-w);
    height: calc(var(--card-w) * 1.814);
    display: block;
    border-radius: 7px;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    flex: none;
  }
  .card svg,
  .card img {
    display: block;
    width: 100%;
    height: 100%;
  }
  .card img {
    object-fit: cover;
    border-radius: 7px;
    pointer-events: none;
  }

  /* ===== ANIMATIONS (Task 5) ===== */
  /* Transient flying card: position computed from real bounding rects.
     `inset:auto` so it's driven purely by left/top/width/height. */
  .fly-card {
    position: fixed;
    z-index: 9;
    border-radius: 7px;
    pointer-events: none;
    perspective: 900px;
    will-change: transform;
    transition: left var(--fly-ms, 360ms) cubic-bezier(0.22, 0.61, 0.36, 1),
                top  var(--fly-ms, 360ms) cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  /* One playful full spin while the card travels deck -> slot. Ends at
     360deg (== 0) so it rests seamlessly at the card's orientation. */
  .fly-spin {
    position: relative;
    width: 100%;
    height: 100%;
    animation: flySpin var(--fly-ms, 360ms) cubic-bezier(0.34, 0.8, 0.4, 1);
  }
  @keyframes flySpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .fly-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform var(--flip-ms, 360ms) ease-in-out;
  }
  .fly-card.flipped .fly-inner { transform: rotateY(180deg); }
  .fly-face, .fly-back {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .fly-face svg, .fly-back svg,
  .fly-face img, .fly-back img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 7px;
  }
  .fly-back  { transform: rotateY(0deg); }
  .fly-face  { transform: rotateY(180deg); }

  /* Sweep a revealed slot card off toward the discard pile. */
  .slot .card.sweeping {
    transition: transform 0.34s cubic-bezier(0.55, 0.06, 0.68, 0.19),
                opacity 0.34s ease;
    z-index: 8;
  }

  /* Deck "riffle" pulse used during reshuffle. */
  .deck-stack.reshuffling .deck-shadow {
    animation: riffle 0.5s ease-in-out;
  }
  .deck-stack.reshuffling #deckCard {
    animation: riffle 0.5s ease-in-out;
  }
  @keyframes riffle {
    0%   { transform: translate(0, 0) rotate(0deg); }
    30%  { transform: translate(-6px, -3px) rotate(-4deg); }
    65%  { transform: translate(7px, 2px) rotate(5deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }
  /* Keep the offset shadow cards' base transforms during the riffle. */
  .deck-stack.reshuffling .deck-shadow.s1 { animation-name: riffleS1; }
  .deck-stack.reshuffling .deck-shadow.s2 { animation-name: riffleS2; }
  @keyframes riffleS1 {
    0%   { transform: translate(4px, 4px) rotate(0deg); }
    30%  { transform: translate(-3px, 0) rotate(-3deg); }
    65%  { transform: translate(10px, 7px) rotate(4deg); }
    100% { transform: translate(4px, 4px) rotate(0deg); }
  }
  @keyframes riffleS2 {
    0%   { transform: translate(8px, 8px) rotate(0deg); }
    30%  { transform: translate(0, 3px) rotate(-2deg); }
    65%  { transform: translate(13px, 11px) rotate(3deg); }
    100% { transform: translate(8px, 8px) rotate(0deg); }
  }
  /* A card flying back from discard onto the deck during reshuffle. */
  .reshuffle-card {
    position: fixed;
    z-index: 9;
    border-radius: 9px;
    pointer-events: none;
    transition: left 0.5s ease-in, top 0.5s ease-in, opacity 0.5s ease-in;
  }

  @media (prefers-reduced-motion: reduce) {
    .panel { transition: none; }
    .panel.active { animation: none; }
    .panel.result-anim { animation: none; }
    .panel.result-anim .panel-mark { animation: none; }
    .fly-card { transition: none; }
    .fly-inner { transition: none; }
    .fly-spin { animation: none; }
    .slot .card.sweeping { transition: none; }
    .deck-stack.reshuffling .deck-shadow,
    .deck-stack.reshuffling #deckCard { animation: none; }
    .reshuffle-card { transition: none; }
    .ans-btn { animation: none; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- START MENU -->
  <div class="menu" id="menu">
    <div class="topbar">
      <a class="bc" href="../../index.html">Arcade</a>
      <span class="bc-sep">›</span>
      <span class="bc-current">Busfahren</span>
      <div class="tb-spacer"></div>
      <div class="tb-btns">
        <button class="menu-fs-btn" id="menuFsBtn" aria-label="Fullscreen">⛶</button>
      </div>
    </div>
    <div class="menu-body">
      <div class="menu-title">BUSFAHREN</div>
      <div class="menu-prompt">SPIELER WÄHLEN</div>
      <div class="player-buttons">
        <button class="p-btn" data-players="1">1</button>
        <button class="p-btn" data-players="2">2</button>
        <button class="p-btn" data-players="3">3</button>
        <button class="p-btn" data-players="4">4</button>
      </div>
      <div class="name-inputs" id="nameInputs">
        <div class="name-row" data-idx="0">
          <span class="name-dot p1"></span>
          <input class="name-input" id="name0" type="text" maxlength="14" value="Spieler 1" aria-label="Name Spieler 1">
        </div>
        <div class="name-row" data-idx="1">
          <span class="name-dot p2"></span>
          <input class="name-input" id="name1" type="text" maxlength="14" value="Spieler 2" aria-label="Name Spieler 2">
        </div>
        <div class="name-row" data-idx="2">
          <span class="name-dot p3"></span>
          <input class="name-input" id="name2" type="text" maxlength="14" value="Spieler 3" aria-label="Name Spieler 3">
        </div>
        <div class="name-row" data-idx="3">
          <span class="name-dot p4"></span>
          <input class="name-input" id="name3" type="text" maxlength="14" value="Spieler 4" aria-label="Name Spieler 4">
        </div>
      </div>
      <button class="play-btn" id="playBtn">▶ SPIELEN</button>
    </div>
  </div>

  <!-- GAME -->
  <div class="game" id="game" style="display:none;">
    <!-- Controls: upper-right (fullscreen + exit to menu) -->
    <div class="controls-bar" id="controlsBar">
      <button class="ctrl-btn fs" id="fsBtn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
      <button class="ctrl-btn menu" id="restartBtn" aria-label="Main menu" title="Hauptmenü">☰</button>
    </div>

    <!-- Top row: players 2-4 (rotated 180°) -->
    <div class="players-top" id="playersTop"></div>

    <!-- Center: deck (Stapel) + discard (Ablage), with the active /
         last-acting player's question + feedback above or below it. -->
    <div class="felt" id="felt">
      <div class="stage-msg stage-msg-top" id="stageMsgTop"></div>
      <div class="felt-row">
        <div class="pile">
          <div class="slot empty" id="discardSlot"></div>
        </div>
        <div class="pile pile-deck">
          <div class="slot deck-stack" id="deckStack">
            <div class="deck-shadow s2"></div>
            <div class="deck-shadow s1"></div>
            <div class="card" id="deckCard"></div>
            <div class="deck-count" id="deckCount">0</div>
          </div>
        </div>
      </div>
      <div class="stage-msg stage-msg-bottom" id="stageMsgBottom"></div>
    </div>

    <!-- Bottom row: player 1 -->
    <div class="players-bottom" id="playersBottom"></div>
  </div>

  <!-- END SCREEN OVERLAY (shown when all players finished) -->
  <div class="end-overlay" id="endOverlay" style="display:none;">
    <div class="end-card">
      <div class="end-title">SPIEL VORBEI</div>
      <ol class="end-ranks" id="endRanks"></ol>
      <button class="end-again" id="endAgainBtn">↻ NOCHMAL</button>
    </div>
  </div>
</div>

<script>
  // ============ DOM ============
  const menu = document.getElementById('menu');
  const game = document.getElementById('game');
  const playBtn = document.getElementById('playBtn');
  const nameRows = Array.from(document.querySelectorAll('.name-row'));

  let selectedPlayers = 2; // default

  // ============ SETUP MENU ============
  function updatePlayerSelection() {
    document.querySelectorAll('.p-btn').forEach(btn => {
      const n = parseInt(btn.dataset.players, 10);
      btn.classList.toggle('selected', n === selectedPlayers);
    });
    // Show/enable only the first N name inputs.
    nameRows.forEach((row, i) => {
      const on = i < selectedPlayers;
      row.classList.toggle('hidden', !on);
      const input = row.querySelector('.name-input');
      if (input) input.disabled = !on;
    });
  }

  document.querySelectorAll('.p-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPlayers = parseInt(btn.dataset.players, 10);
      updatePlayerSelection();
    });
  });

  // ============ GAME STATE ============
  // Built by startGame(); Task 4 mutates it inside onAnswer() then calls render().
  let state = null;

  // Identity (idx:kind) of the outcome flash currently shown, so its entrance
  // pulse plays only on the FIRST paint — the lose/finish path renders twice
  // (once at decision, once after the sweep) and must not replay it. Reset
  // when a new decision begins (onAnswer) or the board has no result.
  let shownResultKey = null;

  const PLAYER_COLORS = ['var(--p1)', 'var(--p2)', 'var(--p3)', 'var(--p4)'];

  // The two decision-button captions for a given stage (1-based).
  function buttonLabels(stage) {
    switch (stage) {
      // same labels; stage 1 compares vs 10, stage 2 vs card 1 (Task 4)
      case 1: case 2: return ['TIEFER', 'HÖHER'];
      case 3: return ['INNEN', 'AUSSEN'];
      case 4: return ['ROT', 'SCHWARZ'];
      default: return ['TIEFER', 'HÖHER'];
    }
  }

  // Inline-SVG icons for the two decision buttons of a stage, parallel to
  // buttonLabels (index 0 = first label, 1 = second). Arrows use currentColor
  // so they take the player's tint and invert on hover. Stage 4 (Rot/Schwarz)
  // has no glyph — the whole button is colour-filled (see renderControls).
  function buttonIcons(stage) {
    const down = '<svg class="btn-ic" viewBox="0 0 24 24" aria-hidden="true">' +
      '<path d="M12 4v16M5 13l7 7 7-7"/></svg>';
    const up = '<svg class="btn-ic" viewBox="0 0 24 24" aria-hidden="true">' +
      '<path d="M12 20V4M5 11l7-7 7 7"/></svg>';
    const inward = '<svg class="btn-ic" viewBox="0 0 24 24" aria-hidden="true">' +
      '<path d="M3 12h7M7 9l3 3-3 3M21 12h-7M17 9l-3 3 3 3"/></svg>';
    const outward = '<svg class="btn-ic" viewBox="0 0 24 24" aria-hidden="true">' +
      '<path d="M11 12H3M6 9l-3 3 3 3M13 12h8M18 9l3 3-3 3"/></svg>';
    switch (stage) {
      case 1: case 2: return [down, up];
      case 3: return [inward, outward];
      default: return [down, up];
    }
  }

  // Header question text for a given stage (1-based). German UI.
  function stageQuestion(stage) {
    switch (stage) {
      case 1: return 'Höher oder tiefer? (10 zählt als tiefer)';
      case 2: return 'Höher oder tiefer als die erste Karte?';
      case 3: return 'Innen oder außen?';
      case 4: return 'Rot oder schwarz?';
      default: return 'Höher oder tiefer? (10 zählt als tiefer)';
    }
  }

  // ============ DOM (game view) ============
  const endOverlay = document.getElementById('endOverlay');
  const endRanks = document.getElementById('endRanks');
  const endAgainBtn = document.getElementById('endAgainBtn');
  const deckCard = document.getElementById('deckCard');
  const deckStack = document.getElementById('deckStack');
  const deckCount = document.getElementById('deckCount');
  const discardSlot = document.getElementById('discardSlot');
  const playersTop = document.getElementById('playersTop');
  const playersBottom = document.getElementById('playersBottom');
  const stageMsgTop = document.getElementById('stageMsgTop');
  const stageMsgBottom = document.getElementById('stageMsgBottom');
  const restartBtn = document.getElementById('restartBtn');

  // Deterministic "sloppy toss" transform for a discarded card. Seeded
  // from the card identity so a given card keeps the SAME angle/offset on
  // every re-render (no jitter), but each card looks carelessly placed.
  function cardJitter(card) {
    const key = card.isWeli ? 'weli' : (card.suit + card.rank);
    let h = 0;
    for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) | 0;
    const rnd = (n) => { h = (h * 1103515245 + 12345) | 0; return (h >>> 17) % n; };
    const rot = rnd(37) - 18;   // -18..18 deg
    const dx  = rnd(25) - 12;   // -12..12 px
    const dy  = rnd(21) - 10;   // -10..10 px
    return 'transform:rotate(' + rot + 'deg) translate(' +
      dx + 'px,' + dy + 'px);';
  }

  // ============ RENDER ============
  // (Re)draws deck + discard + per-player panels from `state`.
  function render() {
    if (!state) return;

    // Deck stack: face-down back + remaining count (or empty hint).
    if (state.deck.length > 0) {
      deckCard.style.display = '';
      deckCard.innerHTML = cardBackSVG();
      deckCount.style.display = '';
      deckCount.textContent = String(state.deck.length);
      deckStack.classList.remove('empty');
    } else {
      deckCard.style.display = 'none';
      deckCount.style.display = 'none';
      deckStack.classList.add('empty');
      deckCard.innerHTML = '';
    }

    // Discard: a messy pile — the last few cards tossed on at sloppy
    // angles/offsets (newest on top), like nobody squared the stack.
    const dn = state.discard.length;
    if (dn) {
      discardSlot.classList.remove('empty');
      const pile = state.discard.slice(Math.max(0, dn - 6));
      discardSlot.innerHTML = pile.map(c =>
        '<div class="card discard-card" style="' + cardJitter(c) + '">' +
        cardSVG(c) + '</div>'
      ).join('');
    } else {
      discardSlot.classList.add('empty');
      discardSlot.innerHTML = '';
    }

    renderControls();
    renderStageMsg();
  }

  // Which screen row a player's controller sits in, per the seat plan:
  //   1P: bottom centered
  //   2P: bottom + top, each centered
  //   3P: P1 bottom corner, P2/P3 top corners (one corner stays empty)
  //   4P: one controller in every corner
  // Bottom row holds P1 always (+ P4 when there are 4 players); everyone
  // else sits up top (which CSS flips upright).
  function playerSide(idx) {
    const n = state.players.length;
    if (idx === 0) return 'bottom';
    if (n === 4 && idx === 3) return 'bottom';
    return 'top';
  }

  // Park the active player's question next to the Stapel, on whichever side
  // that player's controller sits. The decision buttons now live on that
  // player's own panel (renderControls); the centre shows only the question.
  function renderStageMsg() {
    if (!stageMsgTop || !stageMsgBottom) return;
    stageMsgTop.innerHTML = '';
    stageMsgBottom.innerHTML = '';
    const zoneFor = idx =>
      (playerSide(idx) === 'bottom' ? stageMsgBottom : stageMsgTop);

    // Question for the active player.
    const ai = state.activePlayer;
    const ap = state.players[ai];
    if (ap && !ap.finished) {
      const zone = zoneFor(ai);

      const q = document.createElement('div');
      q.className = 'stage-q';
      q.textContent = stageQuestion(ap.stage);
      zone.appendChild(q);
    }
  }

  // Per-player panels: name + (FERTIG badge) + the player's own 4 stacked
  // card spots. A win/loss lights the box green/red with a ✓/✕ overlay. The
  // question and answer buttons are rendered separately by the Stapel
  // (renderStageMsg). Seats are placed per playerSide() + the row layout.
  function renderControls() {
    playersTop.innerHTML = '';
    playersBottom.innerHTML = '';

    const n = state.players.length;
    const bottomCount = state.players
      .filter((_, i) => playerSide(i) === 'bottom').length;
    const topCount = n - bottomCount;
    const layout = (count) =>
      (count >= 2 ? 'row-corners' : (n >= 3 ? 'row-left' : 'row-center'));
    playersBottom.className = 'players-bottom ' + layout(bottomCount);
    playersTop.className = 'players-top ' + layout(topCount);

    // No result on the board → forget the last-shown flash so the next one
    // animates fresh (covers start/menu and any cleared state).
    const lr = state.lastResult;
    if (!lr) shownResultKey = null;

    state.players.forEach((p, idx) => {
      const isActive = idx === state.activePlayer && !p.finished;

      const panel = document.createElement('div');
      panel.className = 'panel' + (isActive ? ' active' : '');
      panel.dataset.player = String(idx);
      panel.style.setProperty('--pc', PLAYER_COLORS[idx]);

      // Visual feedback for this player's last action: their box lights up
      // green/red and a ✓/✕ pops up inside the control. The result class is
      // added to the panel; both clear on the next action. The entrance pulse
      // (result-anim) is added only the first time a given result is painted
      // so the post-sweep re-render doesn't replay it.
      let mark = null;
      if (lr && lr.idx === idx && lr.kind) {
        const key = lr.idx + ':' + lr.kind;
        if (key !== shownResultKey) panel.classList.add('result-anim');
        shownResultKey = key;
        panel.classList.add('result-' + lr.kind);
        mark = document.createElement('div');
        mark.className = 'panel-mark ' + lr.kind;
        mark.textContent = lr.kind === 'win' ? '✓' : '✕';
      }

      const head = document.createElement('div');
      head.className = 'panel-head';
      const nm = document.createElement('span');
      nm.className = 'panel-name';
      nm.textContent = p.name;
      // Right corner: running tally of this player's wrong answers.
      const err = document.createElement('span');
      err.className = 'panel-errors';
      err.title = 'Fehler';
      err.textContent = '✕ ' + (p.errors || 0);
      head.appendChild(nm);
      head.appendChild(err);

      // Stage is read off the stacked cards now; only the FERTIG state
      // still needs a badge. Question/feedback live by the Stapel.
      const stg = p.finished ? document.createElement('div') : null;
      if (stg) {
        stg.className = 'panel-stage done';
        stg.textContent = 'FERTIG';
      }

      // The player's own four card spots (cumulative progress).
      const slots = document.createElement('div');
      slots.className = 'panel-slots';
      for (let s = 1; s <= 4; s++) {
        const slot = document.createElement('div');
        slot.dataset.spot = String(s);
        const card = p.revealed[s - 1];
        // A card mid-deal stays hidden until its ghost lands (dealing guard),
        // so render() never pops it in ahead of the animation.
        if (card && !dealing.has(idx + ':' + s)) {
          slot.className = 'slot';
          slot.innerHTML = '<div class="card">' + cardSVG(card) + '</div>';
        } else {
          slot.className = 'slot empty';
          slot.innerHTML = '<span class="slot-num">' + s + '</span>';
        }
        slots.appendChild(slot);
      }

      // The active player's two decision buttons sit at the top of their own
      // panel — icon-only, and built ONLY for the player whose turn it is, so
      // nobody else's panel shows them. The 180° flip on the top row keeps
      // them oriented "above the controls" for each seated player.
      let actions = null;
      if (isActive) {
        actions = document.createElement('div');
        actions.className = 'panel-actions';
        const icons = buttonIcons(p.stage);
        buttonLabels(p.stage).forEach((label, choiceIndex) => {
          const b = document.createElement('button');
          b.className = 'ans-btn';
          if (p.stage === 4) {
            // Rot/Schwarz: the whole button IS the colour — no inner glyph.
            b.classList.add(choiceIndex === 0 ? 'fill-rot' : 'fill-schwarz');
          } else {
            b.innerHTML = icons[choiceIndex];
          }
          b.setAttribute('aria-label', label);
          b.title = label;
          b.addEventListener('click', () => onAnswer(idx, choiceIndex));
          actions.appendChild(b);
        });
      }

      panel.appendChild(head);
      if (stg) panel.appendChild(stg);
      panel.appendChild(slots);
      if (mark) panel.appendChild(mark);

      // Seat = the optional action bar stacked ABOVE the panel + the panel.
      // Wrapping keeps the buttons outside (above) the controller frame; the
      // 180° flip on the top row still reads them "above" for that seat.
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.style.setProperty('--pc', PLAYER_COLORS[idx]);
      if (actions) seat.appendChild(actions);
      seat.appendChild(panel);

      (playerSide(idx) === 'bottom' ? playersBottom : playersTop)
        .appendChild(seat);
    });
  }

  // ============ RULES ENGINE ============

  // Pure stage resolver. NO side effects — returns 'win' or 'lose'.
  //
  // Contract (read carefully — Task 5 depends on this):
  //  - stage:       1-based stage number being attempted.
  //  - choiceIndex: chosen button index (0 = first label, 1 = second label,
  //                 per buttonLabels for that stage).
  //  - card:        the just-drawn card for THIS attempt — the resolver
  //                 evaluates the outcome against THIS card.
  //  - revealed:    the player's revealed array for this attempt. It is
  //                 passed AFTER the just-drawn card has been pushed, so it
  //                 INCLUDES the current card as its LAST element. The
  //                 resolver therefore reads PRIOR-stage reference cards by
  //                 fixed index — revealed[0] = stage-1 card, revealed[1] =
  //                 stage-2 card — and the just-drawn card ONLY via the
  //                 `card` parameter (never via revealed[revealed.length-1]).
  //
  // Drawing exactly the boundary value is an auto loss; the Weli (isWeli)
  // always wins the current stage. When a Weli is drawn its numeric value is
  // assigned contextually (assignWeliValue) before it becomes a reference for
  // a later stage, so the comparisons below just read the stored value.
  function resolveStage(stage, choiceIndex, card, revealed) {
    if (stage === 1) {
      // Deck splits cleanly in two: 7–10 (value <= 10) are TIEFER, Unter–Ass
      // (value >= 11) are HÖHER. The 10 counts as tiefer, so there is no
      // boundary auto-loss — every card lands in exactly one group.
      // choiceIndex 0 = TIEFER, 1 = HÖHER.
      if (card.isWeli) return 'win';
      if (choiceIndex === 1) return card.value >= 11 ? 'win' : 'lose';
      return card.value <= 10 ? 'win' : 'lose';
    }

    if (stage === 2) {
      // Compare against the stage-1 card (its value is already concrete,
      // even if it was a Weli — see assignWeliValue).
      if (card.isWeli) return 'win';
      const ref = revealed[0].value;
      if (card.value === ref) return 'lose';
      if (choiceIndex === 1) return card.value > ref ? 'win' : 'lose';
      return card.value < ref ? 'win' : 'lose';
    }

    if (stage === 3) {
      // INNEN (0) / AUSSEN (1) relative to cards 1 & 2. Landing on a bound
      // = lose. Weli => win. Both bounds equal: only "außen" can win.
      if (card.isWeli) return 'win';
      const v0 = revealed[0].value;
      const v1 = revealed[1].value;
      const lo = Math.min(v0, v1);
      const hi = Math.max(v0, v1);
      if (card.value === lo || card.value === hi) return 'lose';
      if (choiceIndex === 0) return (card.value > lo && card.value < hi) ? 'win' : 'lose';
      return (card.value < lo || card.value > hi) ? 'win' : 'lose';
    }

    // Stage 4 — ROT (0) / SCHWARZ (1). Weli (no color) always wins.
    if (card.isWeli) return 'win';
    const want = choiceIndex === 0 ? 'rot' : 'schwarz';
    return colorOf(card) === want ? 'win' : 'lose';
  }

  // A drawn Weli always wins, but for stages whose card later becomes a
  // numeric reference it must adopt a concrete "best" value matching the just-
  // made choice (it used to be Infinity, which forced the next guess):
  //   Stage 1: TIEFER -> 7 (lowest), HÖHER -> Ass (14, highest).
  //   Stage 2: lower  -> first card - 1, higher -> first card + 1.
  // `revealed` includes the just-drawn Weli as its last element; revealed[0]
  // is the stage-1 card. Stages 3 & 4 auto-win and never become a numeric
  // reference, so no value is assigned (it stays null).
  function assignWeliValue(stage, choiceIndex, card, revealed) {
    if (!card.isWeli) return;
    if (stage === 1) {
      card.value = choiceIndex === 1 ? RANKS.ass : RANKS['7'];
    } else if (stage === 2) {
      const first = revealed[0].value;
      card.value = choiceIndex === 1 ? first + 1 : first - 1;
    }
  }

  // Draw the top card. Reshuffles the discard back into the deck when empty.
  // Sets state._lastReshuffled (read + cleared by onAnswer) so the deal
  // sequence can play a shuffle animation before revealing the card. The
  // reshuffle logic itself is unchanged from Task 4.
  function drawCard() {
    state._lastReshuffled = false;
    if (state.deck.length === 0) {
      state.deck = shuffle(state.discard);
      state.discard = [];
      state._lastReshuffled = true;
    }
    return state.deck.pop();
  }

  // Move a player's revealed (attempt) cards onto the discard pile and clear.
  function discardRevealed(p) {
    while (p.revealed.length) state.discard.push(p.revealed.shift());
  }

  // Advance the turn to the next not-finished player (wraps). No-op when
  // everyone is finished (end screen handles that case).
  function advanceTurn() {
    if (!state) return;
    const n = state.players.length;
    for (let step = 1; step <= n; step++) {
      const idx = (state.activePlayer + step) % n;
      if (!state.players[idx].finished) {
        state.activePlayer = idx;
        return;
      }
    }
  }

  function checkAllFinished() {
    return state.players.every(p => p.finished);
  }

  // Result feedback is stored on state, keyed to the player who acted, and
  // painted by renderControls into that player's panel. `idx` omitted/null
  // clears it (start/menu).
  function setResult(text, kind, idx) {
    if (!state) return;
    state.lastResult = text
      ? { idx: (idx == null ? -1 : idx), text: text, kind: kind || '' }
      : null;
  }

  // Outcome-continuation seam. Turn ALWAYS passes after an action (social
  // flow — nobody chains stages in one turn). A non-terminal win bumps the
  // player's own stage and KEEPS their revealed cards (cumulative progress).
  // A stage-4 win finishes the player (their cards discard). A loss resets
  // ONLY that player to stage 1 and discards only their cards — other
  // players' progress is untouched. Returns true when the end screen was
  // shown (caller must stop). Synchronous so Task-5 animation can defer it.
  function applyOutcome(p, playerIndex, outcome, stage, cardName) {
    if (outcome === 'win') {
      if (stage < 4) {
        // Advance this player's own stage; keep their revealed cards.
        p.stage = stage + 1;
        setResult('RICHTIG! (' + cardName + ') → Stufe ' + p.stage, 'win', playerIndex);
        advanceTurn();
      } else {
        // Cleared all four stages — player finishes.
        p.finished = true;
        state.finishOrder.push(playerIndex);
        discardRevealed(p);
        setResult(p.name + ' ist FERTIG! (' + cardName + ')', 'win', playerIndex);
        if (checkAllFinished()) {
          render();
          showEndScreen();
          return true;
        }
        advanceTurn();
      }
    } else {
      // Wrong / boundary / auto-loss — ONLY this player resets to Stufe 1
      // and clears their own spots. Turn passes on. Tally the misstep.
      p.stage = 1;
      p.errors = (p.errors || 0) + 1;
      discardRevealed(p);
      setResult('FALSCH (' + cardName + ') — zurück zu Stufe 1', 'lose', playerIndex);
      advanceTurn();
    }
    return false;
  }

  // ============ ANIMATION (Task 5) ============
  // Purely presentational. "Fast" model: a click resolves the outcome and
  // hands the turn over SYNCHRONOUSLY (see onAnswer), so the next player can
  // act at once — the card motion then plays on its own, non-blocking, on a
  // transient ghost that never depends on (or fights) render().
  //
  // `dealing` maps "playerIndex:spot" -> the token of the deal whose resting
  // card is still flying in; render() draws those slots empty so the card only
  // appears once its ghost lands. The token (dealSeq) makes same-slot deals
  // unique: when a player loses and returns to the same stage while an older
  // deal is still airborne, only the CURRENT owner may clear/reveal the slot —
  // a stale deal can't yank the guard out from under the newer card (which is
  // what left cards invisible when spamming).
  const dealing = new Map();
  let dealSeq = 0;

  function prefersReducedMotion() {
    return window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }

  function nextFrame() {
    return new Promise(res => requestAnimationFrame(() => res()));
  }

  // Resolve once a CSS transition/animation on `el` ends, or after `timeout`
  // ms as a safety fallback (so a missed transitionend never wedges input).
  function onceTransitionEnd(el, timeout, propFilter) {
    return new Promise(res => {
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        el.removeEventListener('transitionend', onTransition);
        el.removeEventListener('animationend', finish);
        res();
      };
      // When propFilter is set, ignore transitionend for other properties
      // (e.g. .fly-card transitions both left & top with equal duration —
      // wait on one so the FIRST event doesn't resolve early).
      const onTransition = (e) => {
        if (propFilter && e.propertyName !== propFilter) return;
        finish();
      };
      el.addEventListener('transitionend', onTransition);
      el.addEventListener('animationend', finish);
      setTimeout(finish, timeout);
    });
  }

  // Non-blocking card motion for one already-resolved action. onAnswer has
  // applied the outcome + rendered, so this runs purely on a transient ghost:
  // deck -> the player's stage slot (spin + 3D flip), then on a sweep outcome
  // (loss / stage-4 finish) it carries the ghost on to the discard pile. Never
  // awaited, never calls render() — concurrent turns each fly their own ghost.
  async function playCardAction(card, playerIndex, stage, willSweep, reshuffled, priorCards, dealToken) {
    const dealKey = playerIndex + ':' + stage;
    const slotFor = (spot) => document.querySelector(
      '.panel[data-player="' + playerIndex + '"] ' +
      '.panel-slots .slot[data-spot="' + spot + '"]');
    // Reveal the resting (non-sweep) card and stop hiding it on future renders.
    // Only act while WE still own the slot's guard — a newer same-slot deal
    // (player lost and came back to this stage) must not be cleared by us.
    const finishDeal = () => {
      if (willSweep) return;
      if (dealing.get(dealKey) !== dealToken) return;
      dealing.delete(dealKey);
      const s = slotFor(stage);
      if (s && state && state.players[playerIndex] &&
          state.players[playerIndex].revealed[stage - 1] === card) {
        s.classList.remove('empty');
        s.innerHTML = '<div class="card">' + cardSVG(card) + '</div>';
      }
    };

    if (prefersReducedMotion()) { finishDeal(); return; }

    // Top-row controllers are rotated 180°; ghosts live in screen space so they
    // must settle at the player's orientation. .fly-spin adds a spin on top.
    const restRot = playerSide(playerIndex) === 'top' ? 180 : 0;
    // A static, screen-space ghost showing `html` at a slot's rect.
    const makeGhost = (rect, html) => {
      const g = document.createElement('div');
      g.className = 'fly-card';
      g.style.transition = 'none';
      if (restRot) g.style.transform = 'rotate(' + restRot + 'deg)';
      g.style.left = rect.left + 'px';
      g.style.top = rect.top + 'px';
      g.style.width = rect.width + 'px';
      g.style.height = rect.height + 'px';
      // Fill the slot-sized wrapper (don't inherit .card's fixed 84px width),
      // so the ghost matches the panel card's actual size.
      g.innerHTML = '<div class="card" style="width:100%;height:100%">' + html + '</div>';
      document.body.appendChild(g);
      return g;
    };

    // On a sweep, render() already emptied the player's slots in the model.
    // Re-stand their PRIOR cards as static ghosts (synchronously, same paint as
    // render — no flicker) so they stay on screen while the drawn card deals in;
    // then everything sweeps to the Ablage together.
    const priorGhosts = [];
    if (willSweep && priorCards && priorCards.length) {
      priorCards.forEach((c, i) => {
        const s = slotFor(i + 1);
        if (s) priorGhosts.push(makeGhost(s.getBoundingClientRect(), cardSVG(c)));
      });
    }
    const removeGhosts = () => priorGhosts.forEach(g => { if (g.parentNode) g.remove(); });

    // Deck recycled on this draw -> brief shuffle flourish first.
    if (reshuffled) { try { await animateReshuffle(); } catch (e) {} }

    const slot = slotFor(stage);
    if (!slot) { finishDeal(); removeGhosts(); return; }

    const from = deckStack.getBoundingClientRect();
    const to = slot.getBoundingClientRect();

    const fly = document.createElement('div');
    fly.className = 'fly-card';
    fly.style.setProperty('--fly-ms', '360ms');
    fly.style.setProperty('--flip-ms', '360ms');
    if (restRot) fly.style.transform = 'rotate(' + restRot + 'deg)';
    fly.style.left = from.left + 'px';
    fly.style.top = from.top + 'px';
    fly.style.width = from.width + 'px';
    fly.style.height = from.height + 'px';
    fly.innerHTML =
      '<div class="fly-spin">' +
      '<div class="fly-inner">' +
      '<div class="fly-back">' + cardBackSVG() + '</div>' +
      '<div class="fly-face">' + cardSVG(card) + '</div>' +
      '</div>' +
      '</div>';
    document.body.appendChild(fly);
    const dropFly = () => { if (fly.parentNode) fly.parentNode.removeChild(fly); };

    try {
      // 1) slide deck -> slot, doing one full spin to the rest angle.
      await nextFrame();
      fly.style.left = to.left + 'px';
      fly.style.top = to.top + 'px';
      fly.style.width = to.width + 'px';
      fly.style.height = to.height + 'px';
      await onceTransitionEnd(fly, 600, 'top');

      // 2) 3D flip to the face.
      await nextFrame();
      fly.classList.add('flipped');
      await onceTransitionEnd(fly.querySelector('.fly-inner'), 600);

      if (willSweep) {
        // 3) Now that the drawn card has LANDED, beat briefly so the verdict
        // registers, then sweep it AND the prior cards to the Ablage together.
        await new Promise(res => setTimeout(res, 260));
        const target = discardSlot.getBoundingClientRect();
        const all = priorGhosts.concat([fly]);
        all.forEach(g => {
          g.style.transition =
            'left 0.34s ease-in, top 0.34s ease-in, ' +
            'transform 0.34s ease-in, opacity 0.34s ease-in';
          g.style.left = target.left + 'px';
          g.style.top = target.top + 'px';
          g.style.transform = 'rotate(' + (restRot + 120) + 'deg) scale(0.7)';
          g.style.opacity = '0';
        });
        await onceTransitionEnd(all[all.length - 1], 600);
      } else {
        // 3) reveal the resting card under the ghost, then drop the ghost.
        finishDeal();
      }
    } finally {
      // Never orphan a ghost or leave a card hidden, even if an await threw.
      dropFly();
      removeGhosts();
      finishDeal();
    }
  }

  // Brief shuffle animation: pulse the deck and fly the (now face-down) top
  // discard card back onto the deck. Sequenced before the deal when a
  // reshuffle happened. ~500ms.
  async function animateReshuffle() {
    if (prefersReducedMotion()) return;

    const from = discardSlot.getBoundingClientRect();
    const to = deckStack.getBoundingClientRect();

    const ghost = document.createElement('div');
    ghost.className = 'reshuffle-card';
    ghost.style.left = from.left + 'px';
    ghost.style.top = from.top + 'px';
    ghost.style.width = from.width + 'px';
    ghost.style.height = from.height + 'px';
    ghost.innerHTML = '<div class="card">' + cardBackSVG() + '</div>';
    document.body.appendChild(ghost);

    try {
      deckStack.classList.add('reshuffling');
      await nextFrame();
      ghost.style.left = to.left + 'px';
      ghost.style.top = to.top + 'px';
      ghost.style.width = to.width + 'px';
      ghost.style.height = to.height + 'px';
      ghost.style.opacity = '0.2';

      await onceTransitionEnd(ghost, 700);
      deckStack.classList.remove('reshuffling');
    } finally {
      // Guarantee the transient ghost is never orphaned even if an
      // await above throws. parentNode guard makes a double-call safe.
      if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
    }
  }

  // Decision-button handler. FAST model: the outcome is resolved and the turn
  // is handed over SYNCHRONOUSLY (no awaits before the turn passes), so the
  // moment one player clicks the next player's buttons go live. The drawn
  // card's motion then plays on its own (playCardAction), non-blocking. The
  // Task-4 seam (resolveStage/applyOutcome) is unchanged.
  function onAnswer(playerIndex, choiceIndex) {
    if (!state) return;
    // Only the active, non-finished player may act.
    if (playerIndex !== state.activePlayer) return;
    const p = state.players[playerIndex];
    if (p.finished) return;

    // ---- Resolve the model synchronously (atomic against concurrent clicks:
    // no awaits run between drawing the card and passing the turn). ----
    const stage = p.stage;
    const card = drawCard();
    const reshuffled = state._lastReshuffled;
    p.revealed.push(card);
    assignWeliValue(stage, choiceIndex, card, p.revealed);

    const cardName = card.isWeli
      ? 'Weli'
      : (RANK_LABEL[card.rank] + ' ' + card.suit);

    const outcome = resolveStage(stage, choiceIndex, card, p.revealed);
    const willSweep = (outcome === 'lose') || (outcome === 'win' && stage === 4);

    // The player's prior cards (everything before the just-drawn one). On a
    // sweep they must stay on screen until the drawn card lands, then leave
    // together — capture them before applyOutcome discards them.
    const priorCards = willSweep ? p.revealed.slice(0, -1) : null;

    shownResultKey = null;   // new decision — let this player's flash animate fresh

    // A non-sweep win leaves the card resting in the slot; hide it (with a
    // unique token) until its deal ghost lands (render() honours `dealing`).
    const dealKey = playerIndex + ':' + stage;
    let dealToken = 0;
    if (!willSweep) { dealToken = ++dealSeq; dealing.set(dealKey, dealToken); }

    // Apply the (unchanged) outcome: discard/turn-pass/finish bookkeeping. On
    // game end it has already rendered + shown the end screen and returns true.
    const ended = applyOutcome(p, playerIndex, outcome, stage, cardName);

    render();   // next player is active + clickable immediately

    // Only retract our own guard (a newer deal may already own this slot).
    if (ended) { if (dealing.get(dealKey) === dealToken) dealing.delete(dealKey); return; }

    // Fire-and-forget the card animation; input is already free.
    playCardAction(card, playerIndex, stage, willSweep, reshuffled, priorCards, dealToken);
  }

  // Build + show the end overlay: rank by finish order, last = BUSFAHRER.
  function showEndScreen() {
    const order = state.finishOrder || [];
    endRanks.innerHTML = '';
    order.forEach((pIdx, i) => {
      const isLast = i === order.length - 1;
      const li = document.createElement('li');
      li.className = 'end-rank' + (isLast ? ' busfahrer' : '');

      const pos = document.createElement('span');
      pos.className = 'end-pos';
      pos.textContent = (i + 1) + '.';

      const dot = document.createElement('span');
      dot.className = 'end-dot';
      dot.style.background = PLAYER_COLORS[pIdx];
      dot.style.color = PLAYER_COLORS[pIdx];

      const nm = document.createElement('span');
      nm.className = 'end-name';
      nm.textContent = state.players[pIdx].name;

      const err = document.createElement('span');
      err.className = 'end-errors';
      err.title = 'Fehler';
      err.textContent = '✕ ' + (state.players[pIdx].errors || 0);

      li.appendChild(pos);
      li.appendChild(dot);
      li.appendChild(nm);
      li.appendChild(err);

      if (isLast) {
        const tag = document.createElement('span');
        tag.className = 'end-tag';
        tag.textContent = 'BUSFAHRER';
        li.appendChild(tag);
      }
      endRanks.appendChild(li);
    });
    endOverlay.style.display = 'flex';
  }

  // ============ START / RESET ============
  function startGame() {
    // Belt-and-suspenders: a fresh game must never inherit hidden-card guards
    // or stray ghosts (e.g. if the player hit the menu button mid-animation).
    dealing.clear();
    document.querySelectorAll('.fly-card, .reshuffle-card')
      .forEach(el => el.remove());
    const names = [];
    for (let i = 0; i < selectedPlayers; i++) {
      const input = document.getElementById('name' + i);
      const v = input && input.value.trim();
      names.push(v || ('Spieler ' + (i + 1)));
    }

    state = {
      players: names.map(name => ({ name, stage: 1, finished: false, revealed: [], errors: 0 })),
      deck: shuffle(buildDeck()),
      discard: [],
      activePlayer: 0,
      finishOrder: [],
      lastResult: null
    };

    endOverlay.style.display = 'none';
    setResult('', null);
    menu.style.display = 'none';
    game.style.display = 'flex';
    render();
  }

  function backToMenu() {
    // Leaving mid-animation must not strand hidden-card guards or ghosts.
    dealing.clear();
    document.querySelectorAll('.fly-card, .reshuffle-card')
      .forEach(el => el.remove());
    state = null;
    endOverlay.style.display = 'none';
    game.style.display = 'none';
    menu.style.display = 'flex';
  }

  playBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', backToMenu);
  endAgainBtn.addEventListener('click', backToMenu);

  // ============ FULLSCREEN ============
  const fsBtn = document.getElementById('fsBtn');
  const menuFsBtn = document.getElementById('menuFsBtn');
  const controlsBar = document.getElementById('controlsBar');
  const docEl = document.documentElement;

  const fsSupported =
    docEl.requestFullscreen ||
    docEl.webkitRequestFullscreen ||
    docEl.mozRequestFullScreen ||
    docEl.msRequestFullscreen;

  // Pre-set; startGame makes #game visible — controls bar is always shown in game view.
  controlsBar.classList.add('visible');
  if (!fsSupported) {
    fsBtn.style.display = 'none';
    menuFsBtn.style.display = 'none';
  }

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement ||
              document.mozFullScreenElement || document.msFullscreenElement);
  }

  const FS_WANT_KEY = 'mg_fs_want';
  function wantFs() { try { return sessionStorage.getItem(FS_WANT_KEY) === '1'; } catch (e) { return false; } }
  function setWantFs(on) {
    try { on ? sessionStorage.setItem(FS_WANT_KEY, '1') : sessionStorage.removeItem(FS_WANT_KEY); } catch (e) {}
  }
  function enterFs() {
    const req = docEl.requestFullscreen || docEl.webkitRequestFullscreen ||
                docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
    if (req) req.call(docEl).catch(() => {});
  }

  function toggleFullscreen() {
    if (!isFullscreen()) {
      setWantFs(true);
      enterFs();
    } else {
      // Explicit user exit — stop auto-restoring on later pages.
      setWantFs(false);
      const exit = document.exitFullscreen || document.webkitExitFullscreen ||
                   document.mozCancelFullScreen || document.msExitFullscreen;
      if (exit) exit.call(document).catch(() => {});
    }
  }

  function updateFsIcon() {
    const icon = isFullscreen() ? '❐' : '⛶';
    fsBtn.textContent = icon;
    menuFsBtn.textContent = icon;
  }

  // After a fullscreen transition the viewport size changes, but the layout
  // sometimes does not re-flow until something triggers it. Forcing a tiny
  // style toggle + dispatching a resize event ensures bottom controls stay visible.
  // Pin the app to the REAL viewport height. dvh is recomputed by the browser
  // asynchronously across fullscreen transitions, so relying on it alone leaves
  // the layout briefly oversized and clips the bottom player row. innerHeight is
  // always the settled value once the matching resize event fires.
  function setAppHeight() {
    document.documentElement.style.setProperty('--app-vh', window.innerHeight + 'px');
  }

  function forceReflow() {
    setAppHeight();
    // Toggle a harmless property on body to force the browser to recompute layout
    document.body.style.minHeight = '0';
    // Read offsetHeight to flush layout
    void document.body.offsetHeight;
    document.body.style.minHeight = '';
  }

  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  fsBtn.addEventListener('click', toggleFullscreen);
  menuFsBtn.addEventListener('click', toggleFullscreen);

  // Navigation force-exits fullscreen and a fresh gesture is required to
  // re-enter. If the user wanted fullscreen, restore it on their first
  // interaction with this page (the tap/click they'd make anyway).
  if (wantFs() && !isFullscreen()) {
    const restore = () => {
      if (wantFs() && !isFullscreen()) enterFs();
      ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev =>
        document.removeEventListener(ev, restore, true));
    };
    ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev =>
      document.addEventListener(ev, restore, true));
  }

  ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange']
    .forEach(ev => document.addEventListener(ev, () => {
      updateFsIcon();
      setAppHeight();
      // The viewport height settles asynchronously; re-measure across a frame
      // and a couple of delays to cover slow fullscreen transitions.
      requestAnimationFrame(() => {
        forceReflow();
        setTimeout(forceReflow, 250);
        setTimeout(forceReflow, 600);
      });
    }));

  // ============ CARD MODEL ============
  // German-suited Watt deck: 4 suits, ranks 7..Ass, plus the Weli jolly.
  const SUITS = ['schell', 'eichel', 'herz', 'laub'];
  const RANKS = { '7': 7, '8': 8, '9': 9, '10': 10, unter: 11, ober: 12, koenig: 13, ass: 14 };

  // Short rank label for corner indices.
  const RANK_LABEL = {
    '7': '7', '8': '8', '9': '9', '10': '10',
    unter: 'U', ober: 'O', koenig: 'K', ass: 'A'
  };

  // Full German display words — used only for accessible SVG aria-labels.
  const RANK_NAME = {
    '7': '7', '8': '8', '9': '9', '10': '10',
    unter: 'Unter', ober: 'Ober', koenig: 'König', ass: 'Ass'
  };
  const SUIT_NAME = {
    schell: 'Schell', eichel: 'Eichel', herz: 'Herz', laub: 'Laub'
  };

  // Escape a string for safe use inside a double-quoted SVG attribute.
  function attrEscape(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function buildDeck() {
    const deck = [];
    for (const suit of SUITS) {
      for (const rank of Object.keys(RANKS)) {
        deck.push({
          id: suit + '_' + rank,
          suit,
          rank,
          value: RANKS[rank],
          isWeli: false
        });
      }
    }
    // The Weli: suitless jolly that always wins. Its numeric value is left
    // null and assigned contextually when drawn (see assignWeliValue), so it
    // leaves a concrete reference behind for later stages instead of Infinity.
    deck.push({ id: 'weli', suit: null, rank: 'weli', value: null, isWeli: true });
    return deck;
  }

  // 'rot' = herz + laub · 'schwarz' = eichel + schell · null = Weli (no color).
  function colorOf(card) {
    if (card.isWeli) return null;
    if (card.suit === 'herz' || card.suit === 'laub') return 'rot';
    if (card.suit === 'eichel' || card.suit === 'schell') return 'schwarz';
    return null;
  }

  // Fisher–Yates, in place, returns the same array for convenience.
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = array[i];
      array[i] = array[j];
      array[j] = t;
    }
    return array;
  }

  // ============ CARD ART ============
  // Real card images live under CardIcons/. Folder + filename casing is
  // inconsistent per suit, and Eichel spells out "könig" where the others
  // use "koenig", so the mapping is explicit. The Weli and the face-down
  // back sit at the CardIcons/ root.
  //
  // PAGE_BASE anchors the relative card paths to this game's directory.
  // Without it, visiting /games/busfahren (no trailing slash) makes the
  // browser resolve "CardIcons/..." against /games/ and every card 404s.
  const PAGE_BASE = (function () {
    let p = location.pathname;
    if (p.endsWith('/')) return p;
    if (/\.html?$/i.test(p)) return p.replace(/[^/]*$/, '');
    return p + '/';
  })();
  const ART_BASE = PAGE_BASE + 'CardIcons/';
  const ART_BACK = ART_BASE + 'background.png';
  const ART_WELI = ART_BASE + 'Welli.png';
  const ART_SUIT = {
    schell: { dir: 'Schell', prefix: 'Schell' },
    eichel: { dir: 'eichel', prefix: 'eichel' },
    herz:   { dir: 'Herz',   prefix: 'herz' },
    laub:   { dir: 'Laub',   prefix: 'laub' }
  };

  // The on-disk rank token. König is the only per-suit special case.
  function rankToken(suit, rank) {
    if (rank === 'koenig') return suit === 'eichel' ? 'könig' : 'koenig';
    return rank; // 7 8 9 10 unter ober ass
  }

  function cardArtSrc(card) {
    if (card.isWeli) return ART_WELI;
    const s = ART_SUIT[card.suit];
    return ART_BASE + s.dir + '/' + s.prefix + '_' +
      rankToken(card.suit, card.rank) + '.png';
  }

  // <img> for a face-up card. encodeURI keeps the path slashes but
  // percent-encodes the non-ASCII "ö" in eichel_könig.png.
  function cardSVG(card) {
    const label = card.isWeli
      ? 'Weli'
      : (RANK_NAME[card.rank] + ' ' + SUIT_NAME[card.suit]);
    return '<img class="card-art" draggable="false" alt="' +
      attrEscape(label) + '" src="' + encodeURI(cardArtSrc(card)) + '">';
  }

  // Face-down card back image.
  function cardBackSVG() {
    return '<img class="card-art" draggable="false" ' +
      'alt="Verdeckte Karte" src="' + encodeURI(ART_BACK) + '">';
  }

  // ============ INIT ============
  updatePlayerSelection();
</script>
</body>
</html>
