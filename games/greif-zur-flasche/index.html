<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Greif zur Flasche</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --wood:#5e3d1f; --wood-2:#4a2f16; --wood-hi:#7c5730; --wood-lo:#33200c;
    --paper:#eadcb6; --paper-2:#e0cd9e; --paper-dark:#cdb17e;
    --card:#e6d6ab; --card-2:#d9c48f;
    --ink:#3a2a14; --ink-soft:#6b5233; --stamp:#8a6a42; --stamp-deep:#6d5232;
    --red:#8e2318; --red-deep:#671810;
    --blue:#2e4a76;
    --cream:#faf4e2; --cream-2:#efe6cc;
    --verd:#2f6b5b; --verd-deep:#1f4a3e;
    --grey:#a8a094;
    --shadow:rgba(30,18,4,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  button{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;color:inherit;background:none;border:none;}
  input{font-family:inherit;}
  html,body{
    width:100%;height:100dvh;overflow:hidden;
    background:#241505;font-family:'EB Garamond',Georgia,serif;color:var(--ink);
    -webkit-tap-highlight-color:transparent;user-select:none;
  }
  /* ---------- shared textures ---------- */
  .paperbg{
    background:
      radial-gradient(ellipse at 24% 14%, rgba(255,250,226,.6), transparent 55%),
      radial-gradient(ellipse at 82% 88%, rgba(120,80,30,.28), transparent 58%),
      linear-gradient(155deg,#efe2bd 0%,#e5d3a6 48%,#d3ba88 100%);
  }
  .woodbg{
    background:
      repeating-linear-gradient(90deg,
        rgba(0,0,0,.30) 0 3px, transparent 3px 6px, transparent 6px 128px),
      repeating-linear-gradient(0deg,
        rgba(255,235,200,.04) 0 2px, transparent 2px 9px),
      repeating-linear-gradient(90deg,
        rgba(255,220,170,.05) 0 34px, rgba(0,0,0,.07) 34px 71px, rgba(255,225,180,.04) 71px 128px),
      linear-gradient(175deg,var(--wood-hi) 0%,var(--wood) 42%,var(--wood-2) 78%,var(--wood-lo) 100%);
  }
  .grain::after{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='160' height='160' filter='url(%23n)' opacity='0.55'/></svg>");
    mix-blend-mode:multiply;opacity:.16;
  }
  /* coffee/beer stains for paper surfaces */
  .stain{position:absolute;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(140,90,30,.16) 0%, rgba(140,90,30,.10) 55%, transparent 70%);}
  .ring{position:absolute;border-radius:50%;pointer-events:none;
    border:7px solid rgba(140,88,28,.14);
    box-shadow:inset 0 0 6px rgba(140,88,28,.10), 0 0 5px rgba(140,88,28,.08);}

  #app{position:relative;z-index:2;width:100vw;height:100dvh;overflow:hidden;}
  section{position:absolute;inset:0;display:none;}
  section.show{display:flex;}

  /* ---------- topbar (floats over every screen) ---------- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;gap:8px;
    padding:max(6px,env(safe-area-inset-top)) 10px 4px;pointer-events:none;}
  .topbar a.bc,.bc-sep,.bc-current{font-family:'Special Elite',serif;font-size:11px;letter-spacing:.08em;}
  .topbar a.bc{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--stamp);pointer-events:auto;}
  .topbar a.bc:hover{color:var(--red);}
  .bc-sep{color:var(--ink-soft);opacity:.55;}
  .bc-current{color:var(--ink-soft);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46vw;}
  .tb-spacer{flex:1;}
  .ic-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;pointer-events:auto;
    border:1.5px solid var(--ink-soft);color:var(--ink-soft);font-size:12px;line-height:1;background:rgba(250,244,226,.25);}
  .ic-btn:hover{color:var(--red);border-color:var(--red);}
  body.on-wood .topbar a.bc,body.on-wood .bc-sep,body.on-wood .bc-current{color:#e8d9ae;border-color:#c9a96b;}
  body.on-wood .ic-btn{color:#e8d9ae;border-color:#c9a96b;background:rgba(40,24,8,.25);}

  /* =================== SETUP =================== */
  .setup{flex-direction:row;}
  .setup-main{position:relative;flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;
    overflow:auto;padding:max(34px,env(safe-area-inset-top)) 18px 18px;}
  .setup-title,.end-title{
    font-family:'Special Elite',serif;color:var(--red);
    font-size:clamp(30px,6.2vw,58px);letter-spacing:.02em;line-height:1.1;
    text-shadow:0 2px 0 rgba(255,248,220,.55), 0 3px 6px rgba(60,30,5,.25);
    transform:rotate(-1.2deg);margin:2vh 0 4vh;text-align:center;}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px clamp(18px,5vw,70px);width:min(880px,100%);margin:auto 0;}
  .prow{display:flex;align-items:center;gap:8px;min-width:0;}
  .prow.mirror{flex-direction:row-reverse;}
  .prow input{
    flex:1;min-width:0;border:none;border-radius:7px;background:var(--cream);
    box-shadow:0 3px 6px rgba(40,22,4,.35), inset 0 1px 0 #fff;
    font-size:clamp(16px,2.4vw,21px);font-weight:600;color:var(--ink);
    padding:9px 12px;outline:none;user-select:text;}
  .prow input::placeholder{font-style:italic;font-weight:400;color:#a09a8c;}
  .gbtn{width:38px;height:44px;flex:none;color:var(--grey);display:flex;align-items:center;justify-content:center;
    filter:drop-shadow(0 2px 2px rgba(40,22,4,.35));transition:transform .12s;}
  .gbtn:active{transform:scale(.9);}
  .gbtn svg{width:100%;height:100%;}
  .gbtn.m.sel{color:var(--blue);}
  .gbtn.f.sel{color:var(--red);}

  /* wooden rail on the right */
  .rail{position:relative;width:clamp(190px,22vw,250px);flex:none;display:flex;flex-direction:column;
    align-items:center;justify-content:space-between;
    padding:max(14px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
    box-shadow:-6px 0 18px rgba(20,10,2,.55), inset 3px 0 0 rgba(255,230,190,.08);}
  .wbtn{
    width:100%;border-radius:9px;background:linear-gradient(180deg,var(--cream),var(--cream-2));
    box-shadow:0 4px 8px rgba(15,8,2,.5), inset 0 1px 0 #fff;
    font-family:'Special Elite',serif;font-size:clamp(15px,1.9vw,20px);color:var(--red-deep);
    padding:11px 8px;letter-spacing:.02em;transition:transform .1s;}
  .wbtn:active{transform:translateY(2px);box-shadow:0 2px 4px rgba(15,8,2,.5);}
  .cap{width:clamp(44px,5vw,62px);height:auto;filter:drop-shadow(0 4px 5px rgba(10,5,0,.55));pointer-events:none;}
  .cap.tilt{transform:rotate(-14deg);}

  /* =================== GAME =================== */
  .game{flex-direction:row;}
  .table{position:relative;flex:1;min-width:0;display:flex;align-items:center;justify-content:center;
    padding:max(30px,env(safe-area-inset-top)) 2.2vmin 2.2vmin;}
  .board{position:relative;z-index:2;display:grid;gap:1.3vmin;
    grid-template-columns:repeat(var(--cols),1fr);grid-template-rows:repeat(var(--rows),1fr);
    aspect-ratio:calc(var(--cols) / var(--rows));
    width:calc((100dvh - 8vmin) * var(--cols) / var(--rows));
    max-width:100%;max-height:100%;}

  .tile{position:relative;perspective:700px;}
  .tile .in{position:absolute;inset:0;transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.35,.15,.25,1);}
  .tile.flip .in{transform:rotateY(180deg);}
  /* Never set opacity/filter on .tile .in or .face — grouping properties
     flatten preserve-3d and the mirrored card back renders instead of the face. */
  .tile.spent{cursor:default;}
  .tile.spent .face.bk{background:linear-gradient(150deg,#dccca3 0%,#cebd90 45%,#bda679 100%);}
  .tile.spent .face.bk svg{opacity:.7;}
  .tile.spent .face.bk .lbl{opacity:.75;}
  @keyframes dealin{from{opacity:0;transform:scale(.55);}}
  .tile.deal{animation:dealin .4s cubic-bezier(.34,1.4,.5,1) backwards;animation-delay:var(--d,0s);}
  /* memory: matched pairs stay bright, stamped green */
  .tile.won .face.bk{box-shadow:
      inset 0 0 0 3px rgba(47,107,91,.55),
      inset 0 2px 2px rgba(255,252,235,.75),
      0 4px 7px rgba(10,5,0,.5);}
  .tile.won .face.bk svg{color:var(--verd);opacity:1;}
  @keyframes wonpop{0%{transform:rotateY(180deg) scale(1);}45%{transform:rotateY(180deg) scale(1.13);}100%{transform:rotateY(180deg) scale(1);}}
  .tile.won .in{animation:wonpop .5s ease;}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:12%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(150deg,#ecdcb2 0%,var(--card) 45%,var(--card-2) 100%);
    box-shadow:
      inset 0 2px 2px rgba(255,252,235,.75), inset 0 -3px 5px rgba(105,72,28,.4),
      inset 0 0 0 2px rgba(120,88,40,.18),
      0 4px 7px rgba(10,5,0,.5);}
  .face svg{color:var(--stamp);opacity:.92;filter:drop-shadow(0 1px 0 rgba(255,250,230,.5));}
  .face.fr svg{width:64%;height:64%;}
  .face.bk{transform:rotateY(180deg);padding:6% 4%;gap:3%;container-type:size;}
  .face.bk svg{width:auto;height:58%;max-width:82%;}
  .face.bk .lbl{font-family:'Special Elite',serif;color:var(--stamp-deep);font-size:16cqh;
    line-height:1.05;text-align:center;white-space:nowrap;max-width:98%;overflow:hidden;}

  /* right paper panel */
  .panel{position:relative;width:clamp(210px,26vw,300px);flex:none;display:flex;
    box-shadow:-7px 0 20px rgba(15,8,0,.6);}
  .panel-in{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;gap:10px;min-height:0;
    padding:max(12px,env(safe-area-inset-top)) 14px max(12px,env(safe-area-inset-bottom));}
  .pnl-btn{
    width:100%;flex:none;border-radius:10px;background:linear-gradient(180deg,var(--cream),var(--cream-2));
    box-shadow:0 3px 7px rgba(50,28,6,.45), inset 0 1px 0 #fff;
    font-family:'Special Elite',serif;font-size:clamp(15px,2.2vmin,20px);color:var(--red-deep);
    padding:10px 6px;}
  .pnl-btn:active{transform:translateY(2px);}
  .plist{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:2px;padding:4px 0;}
  .pl-row{position:relative;display:flex;align-items:center;gap:8px;}
  .gplus{position:absolute;right:44px;top:-2px;z-index:5;pointer-events:none;
    font-family:'Special Elite',serif;font-size:15px;color:var(--red);
    animation:gfloat .9s ease-out forwards;}
  @keyframes gfloat{from{opacity:1;transform:translateY(4px);}to{opacity:0;transform:translateY(-16px);}}
  .pl-name{flex:1;min-width:0;text-align:left;font-size:clamp(17px,2.9vmin,24px);font-weight:600;
    color:var(--ink);padding:4px 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pl-row.cur .pl-name{color:var(--red);}
  .pl-row.cur .pl-name::after{content:' ◂';font-size:.75em;}
  .pl-plus{flex:none;width:34px;height:30px;border-radius:7px;
    background:linear-gradient(180deg,var(--cream),var(--cream-2));
    box-shadow:0 2px 4px rgba(50,28,6,.4), inset 0 1px 0 #fff;
    font-size:20px;line-height:1;color:var(--ink);font-weight:600;}
  .pl-plus:active{transform:scale(.92);}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
  .pl-name b{font-weight:700;}
  .pl-name.bump{animation:bump .35s ease;display:block;}
  .clock{flex:none;text-align:center;font-family:'Special Elite',serif;
    font-size:clamp(16px,2.6vmin,22px);color:var(--ink-soft);}
  .panel .cap{position:absolute;right:-6px;top:44%;z-index:3;}

  /* =================== END =================== */
  .end{flex-direction:column;align-items:center;justify-content:center;gap:2.4vh;
    padding:max(30px,env(safe-area-inset-top)) 18px 20px;overflow:auto;}
  .end-title{margin:0;}
  .end-sub{font-style:italic;color:var(--ink-soft);font-size:clamp(15px,2.4vw,19px);text-align:center;}
  .rank{display:flex;flex-direction:column;gap:8px;width:min(440px,94vw);}
  .rk{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:9px;
    box-shadow:0 3px 6px rgba(40,22,4,.35), inset 0 1px 0 #fff;padding:9px 14px;
    font-size:clamp(16px,2.6vw,21px);font-weight:600;
    animation:rkin .45s ease backwards;animation-delay:var(--d,0s);}
  @keyframes rkin{from{opacity:0;transform:translateX(-20px);}}
  @keyframes crownwig{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(9deg);}}
  .rk.first svg{animation:crownwig 1.6s ease-in-out infinite;}
  .rk .pos{font-family:'Special Elite',serif;color:var(--ink-soft);width:26px;flex:none;}
  .rk .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rk .ct{font-weight:700;color:var(--red);white-space:nowrap;}
  .rk.first{background:linear-gradient(180deg,#f7ecc4,#ecd88e);}
  .rk.first svg{width:26px;height:26px;color:#a3782a;flex:none;}
  .end-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .wbtn.inline{width:auto;padding:11px 26px;}

  /* =================== MODAL =================== */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
    padding:18px;background:rgba(24,13,3,.66);}
  .modal.show{display:flex;}
  .sheet{position:relative;max-width:480px;width:100%;max-height:92dvh;overflow-y:auto;
    border-radius:6px;border:2px solid rgba(90,60,22,.55);
    outline:1px solid rgba(160,120,60,.5);outline-offset:3px;
    background:
      radial-gradient(ellipse at 20% 12%, rgba(255,250,226,.6), transparent 55%),
      linear-gradient(160deg,#f0e2bc,#dfc990 100%);
    box-shadow:0 16px 40px rgba(0,0,0,.6), inset 0 0 0 5px rgba(160,118,52,.14);
    padding:18px 20px 20px;text-align:center;}
  @keyframes sheetin{from{opacity:0;transform:translateY(14px) scale(.94);}}
  .modal.show .sheet{animation:sheetin .22s ease-out;}
  .mtag{font-family:'Special Elite',serif;font-size:11px;letter-spacing:.28em;color:var(--ink-soft);text-transform:uppercase;}
  .mtitle{font-family:'Special Elite',serif;color:var(--red);font-size:clamp(21px,5vw,30px);margin:6px 0 4px;line-height:1.15;}
  .micon{height:64px;margin:6px auto 2px;color:var(--stamp-deep);}
  .micon svg{height:100%;width:auto;}
  @keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-7deg)}40%{transform:rotate(6deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(3deg)}}
  .micon.boom svg{animation:shake .6s ease infinite;}
  .mbody{font-size:clamp(16px,3vw,19px);line-height:1.45;color:var(--ink);margin-top:6px;}
  .mbody b{color:var(--red);}
  .mbody .big{display:block;font-size:1.5em;font-weight:600;margin:8px 0;}
  .mactions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
  .mbtn{font-family:'Special Elite',serif;font-size:15px;letter-spacing:.04em;
    color:var(--cream);background:linear-gradient(180deg,var(--verd),var(--verd-deep));
    border:2px solid rgba(35,22,6,.8);padding:10px 22px;border-radius:4px;
    box-shadow:0 4px 0 var(--shadow);}
  .mbtn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--shadow);}
  .mbtn.plain{background:linear-gradient(180deg,var(--cream),var(--cream-2));color:var(--ink);}
  .mbtn.danger{background:linear-gradient(180deg,var(--red),var(--red-deep));}
  .mbtn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:0 4px 0 var(--shadow);}
  .answers{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .ans{border:1.5px solid var(--ink-soft);background:rgba(255,250,232,.55);border-radius:6px;
    font-size:16px;font-weight:600;color:var(--ink);padding:10px 12px;text-align:left;}
  .ans:disabled{cursor:default;}
  .ans.ok{background:#cfe0c2;border-color:var(--verd-deep);color:var(--verd-deep);}
  .ans.no{background:#e7c4bc;border-color:var(--red-deep);color:var(--red-deep);}
  .pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .pickgrid .ans{text-align:center;}
  .drows{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .drow{display:flex;align-items:center;gap:10px;border:1.5px solid var(--ink-soft);
    background:rgba(255,250,232,.5);border-radius:6px;padding:7px 10px;}
  .drow .dn{flex:1;min-width:0;text-align:left;font-weight:600;font-size:16px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .drow .dn small{font-size:.78em;font-style:italic;font-weight:400;color:var(--ink-soft);}
  .step{display:flex;align-items:center;gap:8px;flex:none;}
  .step button{width:32px;height:32px;border:2px solid var(--ink);border-radius:6px;background:var(--cream);
    color:var(--ink);font-weight:700;font-size:18px;line-height:1;}
  .step button:disabled{opacity:.3;cursor:not-allowed;}
  .step .cnt{min-width:24px;text-align:center;font-weight:700;font-size:18px;}
  .dleft{margin-top:12px;font-family:'Special Elite',serif;font-size:15px;color:var(--ink-soft);}
  .dleft b{color:var(--red);font-size:1.25em;}
  .rlist{display:flex;flex-direction:column;gap:8px;margin-top:10px;text-align:left;}
  .rl{display:flex;align-items:center;gap:10px;border:1.5px solid var(--ink-soft);border-radius:6px;
    background:rgba(255,250,232,.5);padding:8px 10px;font-size:15px;}
  .rl span{flex:1;min-width:0;}
  .rl button{flex:none;width:28px;height:28px;border:1.5px solid var(--red);border-radius:5px;
    color:var(--red);font-size:14px;line-height:1;}
  .rl-empty{font-style:italic;color:var(--ink-soft);font-size:15px;margin-top:8px;}
  .set-list{max-height:30dvh;overflow-y:auto;padding-right:2px;}
  .set-head{font-family:'Special Elite',serif;font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink-soft);margin-top:14px;}
  .drow .ric{width:22px;height:22px;flex:none;color:var(--stamp-deep);}
  .drow .pct{flex:none;font-size:13px;font-style:italic;color:var(--ink-soft);min-width:34px;text-align:right;}
  .seg{display:flex;gap:8px;justify-content:center;margin-top:10px;}
  .seg button{width:64px;padding:10px 0;border:2px solid var(--ink);border-radius:6px;background:var(--cream);
    font-family:'Special Elite',serif;font-size:17px;color:var(--ink);}
  .seg button.on{background:var(--red);border-color:var(--red-deep);color:var(--cream);}
  .step .cnt.lvl{min-width:56px;font-size:14px;font-family:'Special Elite',serif;}

  /* wheel */
  .wheelwrap{position:relative;width:min(66vw,300px);margin:12px auto 4px;}
  .wheelwrap svg{width:100%;height:auto;display:block;}
  #wheelG{transition:transform 3.4s cubic-bezier(.12,.75,.18,1);transform-origin:50% 50%;}
  .wptr{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;
    border-left:12px solid transparent;border-right:12px solid transparent;
    border-top:20px solid var(--red-deep);filter:drop-shadow(0 2px 2px rgba(0,0,0,.4));z-index:2;}
  @keyframes ptrwig{from{transform:translateX(-56%) rotate(-8deg);}to{transform:translateX(-44%) rotate(8deg);}}
  .wptr.spin{animation:ptrwig .12s linear infinite alternate;transform-origin:50% 15%;}

  /* =================== overlays: pong & memory =================== */
  .ovl{position:fixed;inset:0;z-index:150;display:none;flex-direction:column;}
  .ovl.show{display:flex;}
  .ovl-head{flex:none;display:flex;align-items:center;gap:10px;
    padding:max(10px,env(safe-area-inset-top)) 14px 8px;}
  .ovl-title{font-family:'Special Elite',serif;font-size:clamp(15px,2.6vmin,20px);color:#ecdcae;flex:1;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ovl-x{flex:none;width:30px;height:30px;border:1.5px solid #c9a96b;color:#ecdcae;font-size:15px;border-radius:5px;}
  #pgField{position:relative;flex:1;margin:0 12px max(12px,env(safe-area-inset-bottom));
    border:2px solid rgba(230,210,160,.4);border-radius:8px;overflow:hidden;touch-action:none;
    background:linear-gradient(175deg,rgba(0,0,0,.28),rgba(0,0,0,.44));}
  #pgField .mid{position:absolute;left:50%;top:0;bottom:0;width:0;
    border-left:3px dashed rgba(230,210,160,.35);transform:translateX(-50%);}

  #memoGrid{flex:1;display:grid;gap:1.6vmin;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);

  .ovl-sub{flex:none;text-align:center;font-family:'Special Elite',serif;color:#ecdcae;

  .ovl-sub b.low{color:#ff9d7d;}

  #boomflash{position:fixed;inset:0;z-index:260;pointer-events:none;opacity:0;
    background:radial-gradient(circle at 50% 55%, rgba(255,246,205,.95) 0%, rgba(255,158,54,.8) 28%, rgba(120,30,5,0) 64%);}

  .table.shake{animation:tblshake .5s linear;}

  /* toast */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:300;
    background:var(--cream);color:var(--ink);border-radius:8px;padding:10px 18px;font-size:16px;font-weight:600;

  /* =================== portrait =================== */
  @media (orientation:portrait){
    .setup{flex-direction:column;}
    .setup-main{padding-top:max(30px,env(safe-area-inset-top));}
    .pgrid{grid-template-columns:1fr;gap:10px;}
    .prow.mirror{flex-direction:row;}
    .rail{width:100%;height:auto;flex-direction:row;gap:10px;padding:10px 12px max(10px,env(safe-area-inset-bottom));
      box-shadow:0 -6px 18px rgba(20,10,2,.55);}
    .rail .cap{display:none;}
    .game{flex-direction:column;}
    .table{padding:max(30px,env(safe-area-inset-top)) 2vmin 2vmin;}
    .board{width:100%;max-height:100%;}
    .panel{width:100%;max-height:38dvh;box-shadow:0 -7px 20px rgba(15,8,0,.6);}
    .panel .cap{display:none;}
    .plist{display:grid;grid-template-columns:1fr 1fr;column-gap:14px;}
  }

 {q:"Wie viele Ringe hat das Olympia-Symbol?",a:["4","5","6","7"],c:1}
];
const WHEEL=[2,4,6,3,8,2,5,3];
const MEMO_ICONS=["i-bottle","i-bomb","i-cap","i-m","i-f","i-tongue","i-quiz","i-all"];
const MEMO_TIME=60, MEMO_STAKE=5;
const QUIZ_N=3;

 {t:"mini",  lvl:3, icon:"i-mini",   lbl:"Minispiel",     name:"Minispiel"},
 {t:"wheel", lvl:2, icon:"i-bottles",lbl:"Verteile",      name:"Verteile (Rad)"},
 {t:"bomb",  lvl:1, icon:"i-bomb",   lbl:"Bombe",         name:"Bombe"},
 {t:"rule",  lvl:2, icon:"i-rule",   lbl:"Regel",         name:"Regel"},
 {t:"cat",   lvl:2, icon:"i-cat",    lbl:"Kategorie",     name:"Kategorie"},
 {t:"tongue",lvl:2, icon:"i-tongue", lbl:"Zungenbrecher", name:"Zungenbrecher"},
 {t:"nb",    lvl:2, icon:"i-nb",     lbl:"Nachbar trinkt",name:"Nachbar trinkt"},
 {t:"all",   lvl:1, icon:"i-all",    lbl:"Alle trinken",  name:"Alle trinken"},
 {t:"men",   lvl:1, icon:"i-m",      lbl:"Männer trinken",name:"Männer trinken"},
 {t:"women", lvl:1, icon:"i-f",      lbl:"Frauen trinken",name:"Frauen trinken"},
 {t:"drink", lvl:3, icon:"i-bottle", lbl:"Trink #",       name:"Trink selbst"}
];
const LEVELS=["Nie","Selten","Normal","Oft"];
const SIZES=[24,30,36];
const MINIS=[
 {k:"pong",  name:"Pong",   lvl:2},
 {k:"memory",name:"Memory", lvl:2},
 {k:"quiz",  name:"Quiz",   lvl:2}
];

/* ================= helpers / state ================= */
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const useSvg=(icon,cls)=>'<svg'+(cls?' class="'+cls+'"':'')+'><use href="#'+icon+'"/></svg>';

const LS_PLAYERS="gzf.players", LS_DECK="gzf.deck";

let slots=[];                    // setup: [{name,g}] × 8
let players=[];                  // in game: {name,g,gulps}
let cur=0, deck=[], started=false, busy=false, gen=0;
let activeRules=[];
let levels={}, miniW={}, cardSize=36;   // frequency levels + minigame chances + deck size

const queues={};
function draw(name,arr){
  let q=queues[name];
  if(!q||!q.length) q=queues[name]=shuffle(arr.map((v,i)=>i));
  return arr[q.pop()];
}

let toastTm=null;
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTm); toastTm=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ================= setup screen ================= */
function loadSlots(){
  slots=Array.from({length:8},()=>({name:"",g:"m"}));
  try{
    const s=JSON.parse(localStorage.getItem(LS_PLAYERS))||[];
    s.slice(0,8).forEach((v,i)=>{ if(v&&typeof v.n==="string") slots[i]={name:v.n.slice(0,14),g:v.g==="f"?"f":"m"}; });
  }catch(e){}
  levels=Object.fromEntries(SPEC.map(sp=>[sp.t,sp.lvl]));
  miniW=Object.fromEntries(MINIS.map(m=>[m.k,m.lvl]));
  cardSize=36;
  try{
    const st=JSON.parse(localStorage.getItem(LS_DECK))||{};
    if(SIZES.includes(st.size)) cardSize=st.size;
    SPEC.forEach(sp=>{
      let v=st.levels&&st.levels[sp.t];
      if(!Number.isInteger(v)&&st.counts&&Number.isInteger(st.counts[sp.t])){
        const c=st.counts[sp.t];                 // migrate old count-based decks
        v=c===0?0:c<=2?1:c<=4?2:3;
      }
      if(Number.isInteger(v)) levels[sp.t]=Math.max(0,Math.min(3,v));
    });
    MINIS.forEach(m=>{
      const v=st.mini&&st.mini[m.k];
      if(Number.isInteger(v)) miniW[m.k]=Math.max(0,Math.min(3,v));
    });
  }catch(e){}
}
function saveSlots(){
  try{ localStorage.setItem(LS_PLAYERS,JSON.stringify(slots.map(s=>({n:s.name,g:s.g})))); }catch(e){}
}
function saveDeck(){
  try{ localStorage.setItem(LS_DECK,JSON.stringify({size:cardSize,levels,mini:miniW})); }catch(e){}
}
function resetDeck(){
  levels=Object.fromEntries(SPEC.map(sp=>[sp.t,sp.lvl]));
  miniW=Object.fromEntries(MINIS.map(m=>[m.k,m.lvl]));
  cardSize=36;
  saveDeck();
}
function miniWSum(){ return MINIS.reduce((s,m)=>s+(miniW[m.k]||0),0); }
/* minigame cards are pointless without any playable game — drop them then */
function effLevel(sp){ let w=levels[sp.t]||0; if(sp.t==="mini"&&miniWSum()===0) w=0; return w; }
function deckTotal(){ return SPEC.some(sp=>effLevel(sp)>0)?cardSize:0; }

function renderSetup(){
  const grid=$("pgrid"); grid.innerHTML="";
  // column order like the original: rows 0-3 left, 4-7 right (mirrored)
  const order=[0,4,1,5,2,6,3,7];
  order.forEach(i=>{
    const s=slots[i], mirror=i>=4;
    const row=document.createElement("div");
    row.className="prow"+(mirror?" mirror":"");
    row.innerHTML=
      '<input type="text" maxlength="14" autocomplete="off" enterkeyhint="next" placeholder="'+(i+1)+'. Spieler" value="'+esc(s.name)+'">'
      +'<button class="gbtn m" aria-label="Mann">'+useSvg("i-m")+'</button>'
      +'<button class="gbtn f" aria-label="Frau">'+useSvg("i-f")+'</button>';
    const inp=row.querySelector("input"), bm=row.querySelector(".gbtn.m"), bf=row.querySelector(".gbtn.f");
    const sync=()=>{
      const has=s.name.trim().length>0;
      bm.classList.toggle("sel",has&&s.g==="m");
      bf.classList.toggle("sel",has&&s.g==="f");
    };
    inp.addEventListener("input",()=>{ s.name=inp.value; sync(); saveSlots(); });
    bm.addEventListener("click",()=>{ s.g="m"; sync(); saveSlots(); });
    bf.addEventListener("click",()=>{ s.g="f"; sync(); saveSlots(); });
    sync();
    grid.appendChild(row);
  });
}

/* ================= deck / board ================= */
/* fill the fixed deck size proportionally to the frequency levels
   (largest remainder; every non-Nie type gets at least one card) */
function composeDeck(){
  const alloc=shuffle(SPEC.map(sp=>({sp,w:effLevel(sp)})));   // shuffle = random tie-breaks
  const wsum=alloc.reduce((s,a)=>s+a.w,0);
  if(!wsum) return [];
  alloc.forEach(a=>{ const x=cardSize*a.w/wsum; a.n=Math.floor(x); a.rem=x-a.n; });
  let used=alloc.reduce((s,a)=>s+a.n,0);
  alloc.slice().sort((a,b)=>b.rem-a.rem).forEach(a=>{
    if(used<cardSize&&a.w>0){ a.n++; used++; }
  });
  alloc.filter(a=>a.w>0&&a.n===0).forEach(a=>{
    const donor=alloc.slice().sort((x,y)=>y.n-x.n)[0];
    if(donor&&donor.n>1){ donor.n--; a.n++; }
  });
  const list=[];
  alloc.forEach(a=>{
    for(let k=0;k<a.n;k++){
      const c={t:a.sp.t,icon:a.sp.icon,lbl:a.sp.lbl,spent:false};
      if(a.sp.t==="drink"){ c.val=1+(k%3); c.lbl="Trink "+c.val; }
      list.push(c);
    }
  });
  return shuffle(list);
}

/* pick the exact-rectangle grid closest to a landscape ~1.4 ratio;
   non-factorable totals fall back to a partial last row */
function gridDims(total){
  let best=null;
  for(let cols=4;cols<=8;cols++){
    if(total%cols) continue;
    const rows=total/cols;
    if(rows<2) continue;
    const score=Math.abs(cols/rows-1.4);
    if(!best||score<best.score) best={cols,rows,score};
  }
  if(!best){ const cols=total>24?6:5; best={cols,rows:Math.max(2,Math.ceil(total/cols))}; }
  return best;
}

function buildBoard(){
  deck=composeDeck();
  const {cols,rows}=gridDims(deck.length);
  const b=$("board");
  b.style.setProperty("--cols",cols);
  b.style.setProperty("--rows",rows);
  b.innerHTML="";
  deck.forEach((card,i)=>{
    const tile=document.createElement("div");
    tile.className="tile deal";
    tile.style.setProperty("--d",(i*22)+"ms");
    // shrink long labels to the tile width (Special Elite ≈ .66em per char)
    const lfs=Math.min(16,96/(card.lbl.length*0.66)).toFixed(1);
    tile.innerHTML=
      '<div class="in">'
      +'<div class="face fr">'+useSvg("i-cross")+'</div>'
      +'<div class="face bk">'+useSvg(card.icon)
      +'<span class="lbl" style="font-size:min(16cqh,'+lfs+'cqw)">'+esc(card.lbl)+'</span></div>'
      +'</div>';
    tile.addEventListener("click",()=>onTile(card,tile));
    card.el=tile;
    b.appendChild(tile);
  });
}

function onTile(card,tile){
  if(!started||busy||card.spent) return;
  busy=true;
  tile.classList.add("flip");
  const g=gen;
  setTimeout(()=>{ if(g===gen) openCard(card); },620);
}

function markSpent(card){ card.spent=true; card.el.classList.add("spent"); }

function finishCard(card){
  closeModal();
  markSpent(card);
  busy=false;
  if(deck.every(c=>c.spent)){ endGame("Alle Karten sind aufgedeckt — das war's!"); return; }
  advanceTurn();
}

/* ================= game flow ================= */
function startGame(){
  const chosen=slots.filter(s=>s.name.trim());
  if(chosen.length<2){ toast("Mindestens 2 Spieler eintragen!"); return; }
  if(deckTotal()===0){ toast("Alle Kartentypen stehen auf „Nie“ — Einstellungen anpassen!"); return; }
  players=chosen.map(s=>({name:s.name.trim(),g:s.g,gulps:0}));
  cur=0; started=true; busy=false; gen++; activeRules=[];
  buildBoard();
  renderPanel();
  show("game");
}

function advanceTurn(){
  cur=(cur+1)%players.length;
  renderPanel();
}

function renderPanel(){
  const list=$("plist"); list.innerHTML="";
  players.forEach((p,i)=>{
    const row=document.createElement("div");
    row.className="pl-row"+(i===cur?" cur":"");
    row.innerHTML='<button class="pl-name">'+esc(p.name)+': <b>'+p.gulps+'</b></button>'
      +'<button class="pl-plus" aria-label="Schluck für '+esc(p.name)+'">+</button>';
    row.querySelector(".pl-plus").addEventListener("click",()=>addGulps(i,1));
    row.querySelector(".pl-name").addEventListener("click",()=>openCorrect(i));
    p.rowEl=row;
    list.appendChild(row);
  });
}

function addGulps(i,n){
  const p=players[i];
  p.gulps=Math.max(0,p.gulps+n);
  if(p.rowEl){
    const nm=p.rowEl.querySelector(".pl-name");
    nm.innerHTML=esc(p.name)+': <b>'+p.gulps+'</b>';
    nm.classList.remove("bump"); void nm.offsetWidth; nm.classList.add("bump");
    if(n>0){
      // defer: card resolutions re-render the panel in the same task,
      // which would destroy a chip appended to the old row element
      setTimeout(()=>{
        if(!p.rowEl||!p.rowEl.isConnected) return;
        const chip=document.createElement("span");
        chip.className="gplus"; chip.textContent="+"+n;
        p.rowEl.appendChild(chip);
        setTimeout(()=>chip.remove(),1000);
      },0);
    }
  }
}

function show(id){
  ["setup","game","end"].forEach(s=>$(s).classList.toggle("show",s===id));
  document.body.classList.toggle("on-wood",id==="game");
}

function endGame(subline){
  started=false; gen++; closeModal(); hideOverlays();
  const rank=players.slice().sort((a,b)=>b.gulps-a.gulps);
  $("endSub").textContent=subline||"";
  const el=$("rank"); el.innerHTML="";
  rank.forEach((p,i)=>{
    const total=p.gulps===1?"1 Schluck":p.gulps+" Schlücke";
    const row=document.createElement("div");
    row.className="rk"+(i===0&&p.gulps>0?" first":"");
    row.style.setProperty("--d",(i*90)+"ms");
    row.innerHTML='<span class="pos">'+(i+1)+'.</span>'
      +(i===0&&p.gulps>0?useSvg("i-crown"):"")
      +'<span class="nm">'+esc(p.name)+'</span><span class="ct">'+total+'</span>';
    el.appendChild(row);
  });
  show("end");
}

/* ================= modal machinery ================= */
function modal(o){
  $("mTag").textContent=o.tag||"Karte";
  $("mTitle").innerHTML=o.title||"";
  const ic=$("mIcon");
  if(o.icon){ ic.hidden=false; ic.innerHTML=useSvg(o.icon); ic.classList.toggle("boom",!!o.boom); }
  else { ic.hidden=true; ic.innerHTML=""; ic.classList.remove("boom"); }
  $("mBody").innerHTML=o.body||"";
  const act=$("mActions"); act.innerHTML="";
  (o.actions||[]).forEach(a=>{
    const b=document.createElement("button");
    b.className="mbtn"+(a.cls?" "+a.cls:"");
    b.innerHTML=a.label;
    if(a.disabled) b.disabled=true;
    b.addEventListener("click",a.fn);
    act.appendChild(b);
  });
  $("modal").classList.add("show");
  const sh=$("modal").querySelector(".sheet");       // replay pop-in per step
  sh.style.animation="none"; void sh.offsetWidth; sh.style.animation="";
}
function closeModal(){ $("modal").classList.remove("show"); }
function hideOverlays(){
  stopPong();
  MM.done=true; MM.card=null;
  if(MM.iv){ clearInterval(MM.iv); MM.iv=null; }
  if(MM.endTm){ clearTimeout(MM.endTm); MM.endTm=null; }
  $("pong").classList.remove("show"); $("memo").classList.remove("show");
}

/* player-picker grid html + wiring */
function pickPlayers(opts,onPick){
  const body='<div class="pickgrid">'+opts.map((o,k)=>'<button class="ans" data-k="'+k+'">'+esc(o.label)+'</button>').join("")+'</div>';
  return {body,wire(){
    document.querySelectorAll("#mBody .pickgrid .ans").forEach(b=>{
      b.addEventListener("click",()=>onPick(opts[+b.dataset.k]));
    });
  }};
}

/* distribution UI (reused by wheel / quiz / tongue / memory) — lists ALL
   players including the giver, so gulps can also stick to yourself */
function openDistribute(card,amount,tag){
  const opts=players.map((p,i)=>({p,i}));
  const give=opts.map(()=>0);
  const body=
    '<div class="drows">'+opts.map((o,k)=>
      '<div class="drow"><span class="dn">'+esc(o.p.name)+(o.i===cur?' <small>(du)</small>':'')+'</span>'
      +'<span class="step"><button data-k="'+k+'" data-d="-1">−</button>'
      +'<span class="cnt" id="dc'+k+'">0</span>'
      +'<button data-k="'+k+'" data-d="1">+</button></span></div>').join("")
    +'</div><div class="dleft">Noch zu verteilen: <b id="dleft">'+amount+'</b></div>';
  modal({tag:tag||"Verteilen",title:"Verteile "+amount+" Schlücke",body,
    actions:[{label:"Fertig!",fn:()=>{
      if(give.reduce((s,v)=>s+v,0)!==amount) return;
      opts.forEach((o,k)=>{ if(give[k]) addGulps(o.i,give[k]); });
      finishCard(card);
    },disabled:true}]});
  const confirmBtn=$("mActions").querySelector(".mbtn");
  const upd=()=>{
    const used=give.reduce((s,v)=>s+v,0);
    $("dleft").textContent=String(amount-used);
    opts.forEach((o,k)=>$("dc"+k).textContent=String(give[k]));
    confirmBtn.disabled=used!==amount;
  };
  document.querySelectorAll("#mBody .step button").forEach(b=>{
    b.addEventListener("click",()=>{
      const k=+b.dataset.k, d=+b.dataset.d;
      const used=give.reduce((s,v)=>s+v,0);
      if(d>0&&used>=amount) return;
      if(give[k]+d<0) return;
      give[k]+=d; upd();
    });
  });
  upd();
}

/* correction stepper for a player (tap name in panel) */
function openCorrect(i){
  const p=players[i];
  modal({tag:"Korrektur",title:esc(p.name),
    body:'<div class="drows"><div class="drow"><span class="dn">Schlücke</span>'
      +'<span class="step"><button id="cMinus">−</button><span class="cnt" id="cCnt">'+p.gulps+'</span><button id="cPlus">+</button></span></div></div>',
    actions:[{label:"Fertig",fn:closeModal}]});
  $("cMinus").addEventListener("click",()=>{ addGulps(i,-1); $("cCnt").textContent=p.gulps; });
  $("cPlus").addEventListener("click",()=>{ addGulps(i,1); $("cCnt").textContent=p.gulps; });
}

/* ================= card resolutions ================= */
function openCard(card){
  const p=players[cur];
  switch(card.t){
    case "drink":{
      const n=card.val;
      modal({tag:"Karte",title:"Trink selbst!",icon:"i-bottle",
        body:"<b>"+esc(p.name)+"</b>, das geht auf dich:<span class='big'>"+n+" "+(n===1?"Schluck":"Schlücke")+"</span>",
        actions:[{label:"Wohl bekomm's!",fn:()=>{ addGulps(cur,n); finishCard(card); }}]});
      break;
    }
    case "all":{
      modal({tag:"Karte",title:"Alle trinken!",icon:"i-all",
        body:"Einmal rundum — <b>jeder</b> nimmt einen Schluck.",
        actions:[{label:"Prost!",fn:()=>{ players.forEach((_,i)=>addGulps(i,1)); finishCard(card); }}]});
      break;
    }
    case "men": case "women":{
      const g=card.t==="men"?"m":"f";
      const who=players.map((q,i)=>({q,i})).filter(x=>x.q.g===g);
      if(who.length===0){
        modal({tag:"Karte",title:card.t==="men"?"Männer trinken!":"Frauen trinken!",icon:card.icon,
          body:"Niemand da … also trinkst <b>du</b> die 2 Schlücke, "+esc(p.name)+"!",
          actions:[{label:"Autsch (+2)",fn:()=>{ addGulps(cur,2); finishCard(card); }}]});
      }else{
        modal({tag:"Karte",title:card.t==="men"?"Männer trinken!":"Frauen trinken!",icon:card.icon,
          body:(card.t==="men"?"Alle <b>Männer</b>":"Alle <b>Frauen</b>")+" nehmen <b>2 Schlücke</b>:<br>"
            +who.map(x=>esc(x.q.name)).join(", "),
          actions:[{label:"Prost! (+2)",fn:()=>{ who.forEach(x=>addGulps(x.i,2)); finishCard(card); }}]});
      }
      break;
    }
    case "nb":{
      const dir=Math.random()<.5?-1:1;
      const ni=(cur+dir+players.length)%players.length;
      const side=dir===-1?"linker":"rechter";
      modal({tag:"Karte",title:"Ein Nachbar trinkt!",icon:"i-nb",
        body:"Dein <b>"+side+" Nachbar</b> ist dran:<span class='big'>"+esc(players[ni].name)+" trinkt 2</span>",
        actions:[{label:"Prost, "+esc(players[ni].name)+"!",fn:()=>{ addGulps(ni,2); finishCard(card); }}]});
      break;
    }
    case "bomb":{
      modal({tag:"Karte",title:"Die Bombe!",icon:"i-bomb",boom:true,
        body:"Volltreffer, <b>"+esc(p.name)+"</b>!<span class='big'>5 Schlücke für dich</span>Keine Diskussion.",
        actions:[{label:"Zünden! (+5)",cls:"danger",fn:()=>{
          const f=$("boomflash");
          f.classList.remove("go"); void f.offsetWidth; f.classList.add("go");
          const tb=document.querySelector(".table");
          tb.classList.remove("shake"); void tb.offsetWidth; tb.classList.add("shake");
          addGulps(cur,5); finishCard(card);
        }}]});
      break;
    }
    case "tongue":{
      const tw=draw("tongue",TONGUES);
      modal({tag:"Karte",title:"Zungenbrecher!",icon:"i-tongue",
        body:"<b>"+esc(p.name)+"</b>, sprich das <b>dreimal schnell</b> — die Runde urteilt:"
          +"<span class='big' style='font-size:1.15em'>„"+esc(tw)+"“</span>",
        actions:[
          {label:"Geschafft — verteile 2",fn:()=>openDistribute(card,2,"Belohnung")},
          {label:"Verhaspelt (+2)",cls:"danger",fn:()=>{ addGulps(cur,2); finishCard(card); }}
        ]});
      break;
    }
    case "rule":{
      const showRule=()=>{
        const r=draw("rule",RULES);
        modal({tag:"Karte",title:"Neue Regel!",icon:"i-rule",
          body:"<span class='big' style='font-size:1.1em'>"+esc(r)+"</span>"
            +"Gilt ab sofort für <b>alle</b>. Wer die Regel bricht, trinkt einen Schluck (über den <b>+</b> Knopf).",
          actions:[
            {label:"Andere Regel",cls:"plain",fn:showRule},
            {label:"Regel gilt!",fn:()=>{
              activeRules.push(r);
              if(activeRules.length>4) activeRules.shift();
              finishCard(card);
            }}
          ]});
      };
      showRule();
      break;
    }
    case "cat":{
      const showCat=()=>{
        const c=draw("cat",CATS);
        modal({tag:"Karte",title:"Kategorie!",icon:"i-cat",
          body:"<b>"+esc(p.name)+"</b> beginnt, dann reihum — wer zögert, wiederholt oder nichts mehr weiß, trinkt!"
            +"<span class='big'>"+esc(c)+"</span>",
          actions:[
            {label:"Anderes Thema",cls:"plain",fn:showCat},
            {label:"Los geht's!",fn:()=>{
              const picker=pickPlayers(players.map((q,i)=>({label:q.name,i})),o=>{
                addGulps(o.i,1); finishCard(card);
              });
              modal({tag:"Kategorie",title:"Wer hat verloren?",
                body:"<b>"+esc(c)+"</b> — der Verlierer trinkt einen Schluck."+picker.body,
                actions:[{label:"Niemand / Abbruch",cls:"plain",fn:()=>finishCard(card)}]});
              picker.wire();
            }}
          ]});
      };
      showCat();
      break;
    }
    case "wheel": openWheel(card); break;
    case "mini":{
      // roll which minigame appears, weighted by the configured chances
      const pool=MINIS.filter(m=>miniW[m.k]>0);
      const sum=pool.reduce((s,m)=>s+miniW[m.k],0);
      if(!sum){ finishCard(card); break; }        // unreachable: effCount drops these
      let r=Math.random()*sum, pick=pool[0].k;
      for(const m of pool){ if((r-=miniW[m.k])<0){ pick=m.k; break; } }
      if(pick==="pong") openPongSetup(card);
      else if(pick==="memory") openMemory(card);
      else openQuiz(card);
      break;
    }
  }
}

/* ---------- fortune wheel ---------- */
let wheelRot=0;
function wheelSvg(){
  const n=WHEEL.length, r=90, cx=100, cy=100;
  let segs="";
  for(let i=0;i<n;i++){
    const a0=(i/n)*2*Math.PI-Math.PI/2, a1=((i+1)/n)*2*Math.PI-Math.PI/2;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const dark=i%2===0;
    const am=(a0+a1)/2, tx=cx+r*.62*Math.cos(am), ty=cy+r*.62*Math.sin(am);
    segs+='<path d="M'+cx+' '+cy+' L'+x0.toFixed(1)+' '+y0.toFixed(1)+' A'+r+' '+r+' 0 0 1 '+x1.toFixed(1)+' '+y1.toFixed(1)+' Z" '
      +'fill="'+(dark?"#8e2318":"#e6d6ab")+'" stroke="#3a2a14" stroke-width="1.5"/>'
      +'<text x="'+tx.toFixed(1)+'" y="'+ty.toFixed(1)+'" text-anchor="middle" dominant-baseline="central" '
      +'font-family="Special Elite,serif" font-size="24" fill="'+(dark?"#f3e6bd":"#6d1a12")+'" '
      +'transform="rotate('+(((i+.5)/n)*360).toFixed(1)+' '+tx.toFixed(1)+' '+ty.toFixed(1)+')">'+WHEEL[i]+'</text>';
  }
  return '<div class="wheelwrap"><div class="wptr"></div>'
    +'<svg viewBox="0 0 200 200"><g id="wheelG" style="transform:rotate('+wheelRot+'deg)">'
    +'<circle cx="100" cy="100" r="94" fill="#3a2a14"/>'+segs
    +'<circle cx="100" cy="100" r="14" fill="#3a2a14"/><circle cx="100" cy="100" r="9" fill="#d8b154"/>'
    +'</g></svg></div>';
}
function openWheel(card){
  modal({tag:"Karte",title:"Verteile … dreh das Rad!",
    body:wheelSvg()+"<div>Wie viele Schlücke darfst du verteilen?</div>",
    actions:[{label:"Drehen!",fn:spinWheel.bind(null,card)}]});
}
function spinWheel(card){
  const g=gen;
  const btn=$("mActions").querySelector(".mbtn"); if(btn) btn.disabled=true;
  const n=WHEEL.length, seg=360/n;
  const target=Math.floor(Math.random()*n);
  // pointer sits at top (-90° in svg coords = segment boundary start at top).
  // rotate so the middle of `target` lands under the pointer.
  const want=360-(target*seg+seg/2);
  const base=Math.ceil(wheelRot/360)*360;
  wheelRot=base+4*360+want;
  const wg=document.getElementById("wheelG");
  wg.style.transform="rotate("+wheelRot+"deg)";
  const ptr=document.querySelector("#mBody .wptr");
  if(ptr) ptr.classList.add("spin");
  const val=WHEEL[target];
  setTimeout(()=>{
    if(g!==gen) return;
    modal({tag:"Karte",title:"Das Rad sagt: "+val+"!",icon:"i-bottles",
      body:"Du darfst <b>"+val+" "+(val===1?"Schluck":"Schlücke")+"</b> verteilen — ganz wie du willst.",
      actions:[{label:"Verteilen",fn:()=>openDistribute(card,val)}]});
  },3600);
}

/* ---------- quiz: 3 questions, +1 to give per right, 1 to drink per wrong ---------- */
function openQuiz(card){
  const p=players[cur];
  const qs=[], seen=new Set();
  let guard=0;
  while(qs.length<QUIZ_N && guard++<40){
    const q=draw("quiz",QUIZ);
    if(!seen.has(q.q)){ seen.add(q.q); qs.push(q); }
  }
  let idx=0, right=0, wrong=0;
  const showQ=()=>{
    const q=qs[idx];
    modal({tag:"Minispiel",title:"Mini-Quiz — Frage "+(idx+1)+"/"+QUIZ_N,icon:"i-quiz",
      body:"<b>"+esc(p.name)+"</b>, ohne Hilfe der anderen:<span class='big' style='font-size:1.1em'>"+esc(q.q)+"</span>"
        +'<div class="answers">'+q.a.map((a,k)=>'<button class="ans" data-k="'+k+'">'+esc(a)+'</button>').join("")+'</div>'
        +'<div class="dleft">Richtig: <b>'+right+'</b> · Falsch: <b>'+wrong+'</b></div>',
      actions:[]});
    document.querySelectorAll("#mBody .answers .ans").forEach(b=>{
      b.addEventListener("click",()=>{
        const k=+b.dataset.k;
        document.querySelectorAll("#mBody .answers .ans").forEach(x=>{
          x.disabled=true;
          if(+x.dataset.k===q.c) x.classList.add("ok");
        });
        if(k===q.c) right++;
        else { b.classList.add("no"); wrong++; }
        const act=$("mActions"); act.innerHTML="";
        const btn=document.createElement("button");
        btn.className="mbtn";
        btn.textContent=idx<QUIZ_N-1?"Nächste Frage":"Ergebnis";
        btn.addEventListener("click",()=>{ idx++; if(idx<QUIZ_N) showQ(); else showResult(); });
        act.appendChild(btn);
      });
    });
  };
  const showResult=()=>{
    let msg="<span class='big'>"+right+" richtig · "+wrong+" falsch</span>";
    if(wrong>0) msg+="Du trinkst <b>"+wrong+" "+(wrong===1?"Schluck":"Schlücke")+"</b>.";
    if(right>0) msg+=(wrong>0?"<br>":"")+"Dafür darfst du <b>"+right+" "+(right===1?"Schluck":"Schlücke")+"</b> verteilen.";
    modal({tag:"Minispiel",title:"Quiz-Bilanz",icon:"i-quiz",body:msg,
      actions:[{label:right>0?"Weiter zum Verteilen":"Okay",cls:(wrong>0&&!right)?"danger":"",fn:()=>{
        if(wrong>0) addGulps(cur,wrong);
        if(right>0) openDistribute(card,right,"Belohnung");
        else finishCard(card);
      }}]});
  };
  showQ();
}

/* ---------- pong minigame ---------- */
const PG={iv:null,endTm:null,card:null,li:-1,ri:-1,keys:{},done:false};
function openPongSetup(card){
  const p=players[cur];
  if(players.length===2){
    startPong(card,cur,cur===0?1:0);
    return;
  }
  const opts=players.map((q,i)=>({label:q.name,i})).filter(o=>o.i!==cur);
  const picker=pickPlayers(opts,o=>startPong(card,cur,o.i));
  modal({tag:"Minispiel",title:"Pong — wähle deinen Gegner!",icon:"i-pong",
    body:"<b>"+esc(p.name)+"</b> spielt Pong bis <b>3 Punkte</b>. Jeder kassierte Punkt = <b>1 Schluck</b> am Ende — nur wer perfekt gewinnt, bleibt trocken!"+picker.body,
    actions:[]});
  picker.wire();
}
function startPong(card,li,ri){
  closeModal();
  PG.card=card; PG.li=li; PG.ri=ri; PG.done=false;
  PG.sL=0; PG.sR=0; PG.ly=.5; PG.ry=.5; PG.keys={};
  $("pgTitle").textContent="Pong — "+players[li].name+" vs. "+players[ri].name+" · erster auf 3";
  $("pnL").textContent=players[li].name;
  $("pnR").textContent=players[ri].name;
  $("psL").textContent="0"; $("psR").textContent="0";
  $("pgMsg").textContent="";
  $("pong").classList.add("show");
  pgServe(Math.random()<.5?-1:1,true);
  if(PG.iv) clearInterval(PG.iv);
  PG.iv=setInterval(pgStep,16);
}
function pgServe(dir,first){
  PG.bx=.5; PG.by=.5;
  PG.hold=first?46:36;                       // frames of serve pause
  PG.vx=.0075*dir; PG.vy=.006*(Math.random()<.5?-1:1)*(0.6+Math.random()*.8);
}
function pgStep(){
  if(PG.done) return;
  // keyboard paddles
  const spd=.02;
  if(PG.keys.w) PG.ly-=spd; if(PG.keys.s) PG.ly+=spd;
  if(PG.keys.up) PG.ry-=spd; if(PG.keys.down) PG.ry+=spd;
  PG.ly=Math.max(.1,Math.min(.9,PG.ly)); PG.ry=Math.max(.1,Math.min(.9,PG.ry));
  if(PG.hold>0){ PG.hold--; }
  else{
    PG.bx+=PG.vx; PG.by+=PG.vy;
    if(PG.by<.03){ PG.by=.03; PG.vy=Math.abs(PG.vy); }
    if(PG.by>.97){ PG.by=.97; PG.vy=-Math.abs(PG.vy); }
    // paddles at x=.045/.955, half height .1
    if(PG.bx<.045&&PG.vx<0&&Math.abs(PG.by-PG.ly)<.12){
      PG.bx=.045; PG.vx=-PG.vx*1.05; PG.vy+=(PG.by-PG.ly)*.03;
    }
    if(PG.bx>.955&&PG.vx>0&&Math.abs(PG.by-PG.ry)<.12){
      PG.bx=.955; PG.vx=-PG.vx*1.05; PG.vy+=(PG.by-PG.ry)*.03;
    }
    PG.vy=Math.max(-.02,Math.min(.02,PG.vy));
    if(PG.bx<-.02){ pgPoint("R"); }
    if(PG.bx>1.02){ pgPoint("L"); }
  }
  // render
  $("padL").style.top=(PG.ly*100)+"%";
  $("padR").style.top=(PG.ry*100)+"%";
  const ball=$("pgBall");
  ball.style.left=(PG.bx*100)+"%"; ball.style.top=(PG.by*100)+"%";
}
function pgPoint(side){
  if(side==="L") PG.sL++; else PG.sR++;
  $("psL").textContent=PG.sL; $("psR").textContent=PG.sR;
  const el=side==="L"?$("psL"):$("psR");
  el.classList.remove("hit"); void el.offsetWidth; el.classList.add("hit");
  if(PG.sL>=3||PG.sR>=3){ pgEnd(); return; }
  pgServe(side==="L"?-1:1,false);
}
function pgEnd(){
  PG.done=true;
  clearInterval(PG.iv); PG.iv=null;
  const wi=PG.sL>PG.sR?PG.li:PG.ri;
  const gL=PG.sR, gR=PG.sL;                  // your gulps = points you conceded
  $("pgMsg").textContent=players[wi].name+" gewinnt!";
  const card=PG.card, li=PG.li, ri=PG.ri, g=gen;
  PG.card=null;
  const line=(idx,n)=>"<b>"+esc(players[idx].name)+"</b> "
    +(n===0?"bleibt trocken — perfektes Spiel!":"trinkt <b>"+n+" "+(n===1?"Schluck":"Schlücke")+"</b>.");
  PG.endTm=setTimeout(()=>{
    PG.endTm=null;
    if(g!==gen) return;
    $("pong").classList.remove("show");
    modal({tag:"Minispiel",title:"Pong — "+esc(players[wi].name)+" gewinnt!",icon:"i-pong",
      body:"Endstand <b>"+PG.sL+" : "+PG.sR+"</b><br>"+line(li,gL)+"<br>"+line(ri,gR),
      actions:[{label:"Prost!",fn:()=>{
        if(gL) addGulps(li,gL);
        if(gR) addGulps(ri,gR);
        finishCard(card);
      }}]});
  },1300);
}
function stopPong(){
  if(PG.iv){ clearInterval(PG.iv); PG.iv=null; }
  if(PG.endTm){ clearTimeout(PG.endTm); PG.endTm=null; }
  PG.done=true;
}
$("pgQuit").addEventListener("click",()=>{
  const card=PG.card;
  PG.card=null;
  stopPong(); $("pong").classList.remove("show");
  if(card) finishCard(card);
});
$("pgField").addEventListener("pointerdown",pgTouch);
$("pgField").addEventListener("pointermove",pgTouch);
function pgTouch(e){
  if(!$("pong").classList.contains("show")) return;
  // touch: each player drags on their half; desktop: hovering a half steers that paddle
  const r=$("pgField").getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
  if(x<.5) PG.ly=Math.max(.1,Math.min(.9,y));
  else PG.ry=Math.max(.1,Math.min(.9,y));
  e.preventDefault();
}
document.addEventListener("keydown",e=>{
  if(e.key==="w"||e.key==="W") PG.keys.w=true;
  if(e.key==="s"||e.key==="S") PG.keys.s=true;
  if(e.key==="ArrowUp") PG.keys.up=true;
  if(e.key==="ArrowDown") PG.keys.down=true;
});
document.addEventListener("keyup",e=>{
  if(e.key==="w"||e.key==="W") PG.keys.w=false;
  if(e.key==="s"||e.key==="S") PG.keys.s=false;
  if(e.key==="ArrowUp") PG.keys.up=false;
  if(e.key==="ArrowDown") PG.keys.down=false;
});

/* ---------- memory minigame: beat the clock ---------- */
const MM={card:null,end:0,iv:null,endTm:null,first:null,lock:false,found:0,done:false};
function fmtTime(s){ return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function openMemory(card){
  MM.card=card; MM.first=null; MM.lock=false; MM.found=0; MM.done=false;
  MM.end=Date.now()+MEMO_TIME*1000;
  $("memoPairs").textContent="0/"+MEMO_ICONS.length;
  const tEl=$("memoTime");
  tEl.textContent=fmtTime(MEMO_TIME); tEl.classList.remove("low");
  const grid=$("memoGrid"); grid.innerHTML="";
  const icons=shuffle(MEMO_ICONS.concat(MEMO_ICONS).slice());
  icons.forEach(icon=>{
    const t=document.createElement("div");
    t.className="tile";
    t.innerHTML='<div class="in"><div class="face fr">'+useSvg("i-cross")+'</div>'
      +'<div class="face bk">'+useSvg(icon)+'</div></div>';
    t.dataset.icon=icon;
    t.addEventListener("click",()=>memoFlip(t));
    grid.appendChild(t);
  });
  $("memo").classList.add("show");
  if(MM.iv) clearInterval(MM.iv);
  MM.iv=setInterval(()=>{
    const left=Math.max(0,Math.ceil((MM.end-Date.now())/1000));
    tEl.textContent=fmtTime(left);
    if(left<=10) tEl.classList.add("low");
    if(left<=0) memoEnd(false);
  },250);
}
function memoFlip(t){
  if(MM.done||MM.lock||t.classList.contains("flip")) return;
  t.classList.add("flip");
  if(!MM.first){ MM.first=t; return; }
  const a=MM.first, b=t; MM.first=null;
  if(a.dataset.icon===b.dataset.icon){
    MM.found++;
    $("memoPairs").textContent=MM.found+"/"+MEMO_ICONS.length;
    a.classList.add("won"); b.classList.add("won");
    if(MM.found>=MEMO_ICONS.length) memoEnd(true);
  }else{
    MM.lock=true;
    const g=gen;
    setTimeout(()=>{
      if(g!==gen||MM.done) return;
      a.classList.remove("flip"); b.classList.remove("flip");
      MM.lock=false;
    },850);
  }
}
function memoEnd(win){
  if(MM.done) return;
  MM.done=true;
  if(MM.iv){ clearInterval(MM.iv); MM.iv=null; }
  if(!win) document.querySelectorAll("#memoGrid .tile").forEach(t=>t.classList.add("flip"));
  const card=MM.card, g=gen;
  MM.card=null;
  MM.endTm=setTimeout(()=>{
    MM.endTm=null;
    if(g!==gen) return;
    $("memo").classList.remove("show");
    if(win){
      modal({tag:"Minispiel",title:"Alle Paare gefunden!",icon:"i-memory",
        body:"Starke Leistung — du darfst <b>"+MEMO_STAKE+" Schlücke</b> verteilen.",
        actions:[{label:"Verteilen",fn:()=>openDistribute(card,MEMO_STAKE,"Belohnung")}]});
    }else{
      modal({tag:"Minispiel",title:"Zeit abgelaufen!",icon:"i-memory",
        body:"Das Gedächtnis lässt nach … <b>trink "+MEMO_STAKE+" Schlücke</b>.",
        actions:[{label:"Autsch (+"+MEMO_STAKE+")",cls:"danger",fn:()=>{ addGulps(cur,MEMO_STAKE); finishCard(card); }}]});
    }
  },win?550:1400);
}
$("memoQuit").addEventListener("click",()=>{
  const card=MM.card;
  MM.card=null; MM.done=true;
  if(MM.iv){ clearInterval(MM.iv); MM.iv=null; }
  if(MM.endTm){ clearTimeout(MM.endTm); MM.endTm=null; }
  $("memo").classList.remove("show");
  if(card) finishCard(card);
});

/* ================= settings: deck composition ================= */
function renderSettings(){
  const sizeSeg='<div class="seg" id="segCards">'
    +SIZES.map(n=>'<button data-n="'+n+'"'+(n===cardSize?' class="on"':'')+'>'+n+'</button>').join("")
    +'</div>';
  const rows=SPEC.map(sp=>
    '<div class="drow">'+useSvg(sp.icon,"ric")
    +'<span class="dn">'+sp.name+'</span>'
    +'<span class="step"><button data-t="'+sp.t+'" data-d="-1">−</button>'
    +'<span class="cnt lvl" id="lv_'+sp.t+'"></span>'
    +'<button data-t="'+sp.t+'" data-d="1">+</button></span></div>').join("");
  const minis=MINIS.map(m=>
    '<div class="drow"><span class="dn">'+m.name+'</span>'
    +'<span class="pct" id="mp_'+m.k+'"></span>'
    +'<span class="step"><button data-m="'+m.k+'" data-d="-1">−</button>'
    +'<span class="cnt lvl" id="mw_'+m.k+'"></span>'
    +'<button data-m="'+m.k+'" data-d="1">+</button></span></div>').join("");
  modal({tag:"Einstellungen",title:"Kartendeck",
    body:sizeSeg
      +'<div class="set-head">Kartentypen</div>'
      +'<div class="drows set-list">'+rows+'</div>'
      +'<div class="rl-empty" id="allOff" hidden>Alles auf „Nie“ — so gibt es kein Deck.</div>'
      +'<div class="set-head">Minispiel-Chancen</div>'
      +'<div class="drows">'+minis+'</div>'
      +'<div class="rl-empty" id="miniOff" hidden>Alle Minispiele auf „Nie“ — es kommen keine Minispiel-Karten ins Deck.</div>',
    actions:[
      {label:"Standard",cls:"plain",fn:()=>{ resetDeck(); renderSettings(); }},
      {label:"Fertig",fn:closeModal}
    ]});
  const upd=()=>{
    SPEC.forEach(sp=>{ $("lv_"+sp.t).textContent=LEVELS[levels[sp.t]||0]; });
    const sum=miniWSum();
    MINIS.forEach(m=>{
      $("mw_"+m.k).textContent=LEVELS[miniW[m.k]||0];
      $("mp_"+m.k).textContent=sum?Math.round((miniW[m.k]||0)/sum*100)+"%":"";
    });
    $("miniOff").hidden=sum>0;
    $("allOff").hidden=SPEC.some(sp=>effLevel(sp)>0);
  };
  document.querySelectorAll("#segCards button").forEach(b=>{
    b.addEventListener("click",()=>{
      cardSize=+b.dataset.n; saveDeck();
      document.querySelectorAll("#segCards button").forEach(x=>x.classList.toggle("on",x===b));
    });
  });
  document.querySelectorAll("#mBody .step button").forEach(b=>{
    b.addEventListener("click",()=>{
      const d=+b.dataset.d;
      if(b.dataset.t){
        const t=b.dataset.t;
        const next=(levels[t]||0)+d;
        if(next<0||next>3) return;
        levels[t]=next;
      }else{
        const k=b.dataset.m;
        const next=(miniW[k]||0)+d;
        if(next<0||next>3) return;
        miniW[k]=next;
      }
      saveDeck(); upd();
    });
  });
  upd();
}
$("settingsBtn").addEventListener("click",renderSettings);
