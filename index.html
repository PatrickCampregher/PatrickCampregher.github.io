<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINIGAMES — Arcade Library</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0420;
    --neon-pink: #ff2bd6;
    --neon-cyan: #00f0ff;
    --neon-yellow: #ffd23f;
    --neon-green: #39ff14;
    --neon-purple: #b537f2;
    --card-bg: #14082e;
    --card-bg-2: #1d0b3d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'VT323', monospace;
    color: var(--neon-cyan);
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--neon-pink) 1px, transparent 1px),
      linear-gradient(90deg, var(--neon-pink) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 85%);
    pointer-events: none;
    z-index: 1;
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 20px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(22px, 6vw, 52px);
    color: var(--neon-pink);
    text-shadow:
      0 0 8px var(--neon-pink),
      0 0 20px var(--neon-pink),
      0 0 40px rgba(255, 43, 214, 0.5);
    letter-spacing: 2px;
    line-height: 1.4;
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(16px, 3vw, 24px);
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    letter-spacing: 3px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
  }

  .card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    background: linear-gradient(160deg, var(--card-bg), var(--card-bg-2));
    border: 2px solid var(--neon-purple);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    box-shadow: 0 0 0 rgba(181, 55, 242, 0);
  }

  .card:hover,
  .card:focus-visible {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow:
      0 0 16px rgba(0, 240, 255, 0.6),
      0 0 32px rgba(255, 43, 214, 0.35);
    outline: none;
  }

  .card:focus-visible {
    outline: 3px solid var(--neon-yellow);
    outline-offset: 3px;
  }

  .thumb {
    aspect-ratio: 4 / 3;
    overflow: hidden;
    background: var(--bg);
  }
  .thumb img,
  .thumb svg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .card-body {
    padding: 18px 18px 22px;
    border-top: 2px solid rgba(181, 55, 242, 0.5);
  }

  .card-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px rgba(255, 210, 63, 0.7);
  }

  .card-tag {
    margin-top: 12px;
    font-size: 19px;
    color: var(--neon-cyan);
    opacity: 0.85;
  }

  footer {
    margin-top: 56px;
    text-align: center;
    font-size: 18px;
    color: var(--neon-purple);
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>MINIGAMES</h1>
      <div class="subtitle">&#9654; INSERT COIN &#9664;</div>
    </header>

    <main class="grid">
      <a class="card" href="games/snakes-and-ladders/index.html">
        <div class="thumb">
          <img src="games/snakes-and-ladders/thumb.png" alt="Snakes &amp; Ladders gameplay screenshot">
        </div>
        <div class="card-body">
          <div class="card-title">SNAKES &amp; LADDERS</div>
          <div class="card-tag">Neon '85 board race &mdash; 2-4 players</div>
        </div>
      </a>

      <a class="card" href="games/gioco-dell-oca/index.html">
        <div class="thumb">
          <svg viewBox="0 0 400 300" role="img" aria-label="Il Gioco dell'Oca — vintage spiral board">
            <defs>
              <radialGradient id="oca-bg" cx="50%" cy="45%" r="75%">
                <stop offset="0%" stop-color="#efe0bb"/>
                <stop offset="65%" stop-color="#dcc187"/>
                <stop offset="100%" stop-color="#b78b4d"/>
              </radialGradient>
            </defs>
            <rect width="400" height="300" fill="url(#oca-bg)"/>
            <rect x="8" y="8" width="384" height="284" fill="none" stroke="#33240f" stroke-width="3"/>
            <rect x="15" y="15" width="370" height="270" fill="none" stroke="#b3893b" stroke-width="1.5"/>
            <path d="M200 150 m0 0 a 6 6 0 1 1 0.1 0
                     M200 150 q 26 -26 52 0 t 52 52 t -26 78 t -104 26 t -78 -104 t 52 -130 t 156 -26 t 78 156"
                  fill="none" stroke="#7d2a26" stroke-width="13" stroke-linecap="round" opacity="0.55"/>
            <path d="M200 150 q 26 -26 52 0 t 52 52 t -26 78 t -104 26 t -78 -104 t 52 -130 t 156 -26 t 78 156"
                  fill="none" stroke="#b3893b" stroke-width="2" stroke-dasharray="1 7" stroke-linecap="round"/>
            <g transform="translate(196,142)" fill="#33240f">
              <ellipse cx="0" cy="14" rx="22" ry="15"/>
              <path d="M14 6 q 16 -4 18 -22 q -2 -10 -10 -8 q -12 4 -12 18 q -8 -2 -14 4 z"/>
              <circle cx="24" cy="-18" r="3.2"/>
              <path d="M30 -16 l 11 3 l -10 4 z" fill="#b1542a"/>
            </g>
            <text x="200" y="270" text-anchor="middle" font-family="Cinzel, Georgia, serif"
                  font-size="22" font-weight="700" fill="#7d2a26" letter-spacing="2">63</text>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-title">IL GIOCO DELL'OCA</div>
          <div class="card-tag">Vintage Italian spiral &mdash; drinking edition, 2-6 players</div>
        </div>
      </a>
    </main>

    <footer>GAMES ONLINE &mdash; MORE COMING SOON</footer>
  </div>
</body>
</html>
