<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINIGAMES — Arcade Library</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0420;
    --neon-pink: #ff2bd6;
    --neon-cyan: #00f0ff;
    --neon-yellow: #ffd23f;
    --neon-green: #39ff14;
    --neon-purple: #b537f2;
    --card-bg: #14082e;
    --card-bg-2: #1d0b3d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'VT323', monospace;
    color: var(--neon-cyan);
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--neon-pink) 1px, transparent 1px),
      linear-gradient(90deg, var(--neon-pink) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 85%);
    pointer-events: none;
    z-index: 1;
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 20px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(22px, 6vw, 52px);
    color: var(--neon-pink);
    text-shadow:
      0 0 8px var(--neon-pink),
      0 0 20px var(--neon-pink),
      0 0 40px rgba(255, 43, 214, 0.5);
    letter-spacing: 2px;
    line-height: 1.4;
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(16px, 3vw, 24px);
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    letter-spacing: 3px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
  }

  .card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    background: linear-gradient(160deg, var(--card-bg), var(--card-bg-2));
    border: 2px solid var(--neon-purple);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    box-shadow: 0 0 0 rgba(181, 55, 242, 0);
  }

  .card:hover,
  .card:focus-visible {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow:
      0 0 16px rgba(0, 240, 255, 0.6),
      0 0 32px rgba(255, 43, 214, 0.35);
    outline: none;
  }

  .card:focus-visible {
    outline: 3px solid var(--neon-yellow);
    outline-offset: 3px;
  }

  .thumb {
    position: relative;
    aspect-ratio: 4 / 3;
    background:
      repeating-linear-gradient(0deg, rgba(0,240,255,0.10) 0 1px, transparent 1px 28px),
      repeating-linear-gradient(90deg, rgba(0,240,255,0.10) 0 1px, transparent 1px 28px),
      radial-gradient(circle at 70% 30%, rgba(181,55,242,0.35), transparent 60%),
      var(--bg);
    overflow: hidden;
  }

  /* Snakes & Ladders motif: a neon ladder + a snake curve, pure CSS */
  .thumb-snl .ladder {
    position: absolute;
    left: 22%;
    top: 12%;
    width: 34px;
    height: 76%;
    border-left: 4px solid var(--neon-yellow);
    border-right: 4px solid var(--neon-yellow);
    box-shadow: 0 0 10px var(--neon-yellow);
  }
  .thumb-snl .ladder::before,
  .thumb-snl .ladder::after {
    content: '';
    position: absolute;
    left: -4px;
    right: -4px;
    height: 4px;
    background: var(--neon-yellow);
    box-shadow: 0 0 8px var(--neon-yellow);
  }
  .thumb-snl .ladder::before { top: 28%; }
  .thumb-snl .ladder::after  { top: 64%; }

  .thumb-snl .snake {
    position: absolute;
    right: 16%;
    top: 16%;
    width: 46%;
    height: 68%;
    border: 5px solid var(--neon-green);
    border-color: var(--neon-green) transparent var(--neon-green) transparent;
    border-radius: 50%;
    transform: rotate(18deg);
    box-shadow: 0 0 12px var(--neon-green);
  }
  .thumb-snl .snake::after {
    content: '';
    position: absolute;
    right: -6px;
    top: -6px;
    width: 14px;
    height: 14px;
    background: var(--neon-green);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--neon-green);
  }

  .card-body {
    padding: 18px 18px 22px;
    border-top: 2px solid rgba(181, 55, 242, 0.5);
  }

  .card-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px rgba(255, 210, 63, 0.7);
  }

  .card-tag {
    margin-top: 12px;
    font-size: 19px;
    color: var(--neon-cyan);
    opacity: 0.85;
  }

  footer {
    margin-top: 56px;
    text-align: center;
    font-size: 18px;
    color: var(--neon-purple);
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>MINIGAMES</h1>
      <div class="subtitle">&#9654; INSERT COIN &#9664;</div>
    </header>

    <main class="grid">
      <a class="card" href="games/snakes-and-ladders/index.html">
        <div class="thumb thumb-snl">
          <div class="ladder"></div>
          <div class="snake"></div>
        </div>
        <div class="card-body">
          <div class="card-title">SNAKES &amp; LADDERS</div>
          <div class="card-tag">Neon '85 board race &mdash; 2-4 players</div>
        </div>
      </a>
    </main>

    <footer>1 GAME LOADED &mdash; MORE COMING SOON</footer>
  </div>
</body>
</html>
