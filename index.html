<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINIGAMES — Arcade Library</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0420;
    --neon-pink: #ff2bd6;
    --neon-cyan: #00f0ff;
    --neon-yellow: #ffd23f;
    --neon-green: #39ff14;
    --neon-purple: #b537f2;
    --card-bg: #14082e;
    --card-bg-2: #1d0b3d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'VT323', monospace;
    color: var(--neon-cyan);
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--neon-pink) 1px, transparent 1px),
      linear-gradient(90deg, var(--neon-pink) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 85%);
    pointer-events: none;
    z-index: 1;
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 20px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(22px, 6vw, 52px);
    color: var(--neon-pink);
    text-shadow:
      0 0 8px var(--neon-pink),
      0 0 20px var(--neon-pink),
      0 0 40px rgba(255, 43, 214, 0.5);
    letter-spacing: 2px;
    line-height: 1.4;
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(16px, 3vw, 24px);
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    letter-spacing: 3px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
  }

  .card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    background: linear-gradient(160deg, var(--card-bg), var(--card-bg-2));
    border: 2px solid var(--neon-purple);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    box-shadow: 0 0 0 rgba(181, 55, 242, 0);
  }

  .card:hover,
  .card:focus-visible {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow:
      0 0 16px rgba(0, 240, 255, 0.6),
      0 0 32px rgba(255, 43, 214, 0.35);
    outline: none;
  }

  .card:focus-visible {
    outline: 3px solid var(--neon-yellow);
    outline-offset: 3px;
  }

  .thumb {
    aspect-ratio: 4 / 3;
    overflow: hidden;
    background: var(--bg);
  }
  .thumb img,
  .thumb svg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .card-body {
    padding: 18px 18px 22px;
    border-top: 2px solid rgba(181, 55, 242, 0.5);
  }

  .card-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px rgba(255, 210, 63, 0.7);
  }

  .card-tag {
    margin-top: 12px;
    font-size: 19px;
    color: var(--neon-cyan);
    opacity: 0.85;
  }

  footer {
    margin-top: 56px;
    text-align: center;
    font-size: 18px;
    color: var(--neon-purple);
    opacity: 0.8;
  }

  .fs-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 60;
    background: transparent;
    border: 1.5px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-size: 12px;
    line-height: 1;
    width: 22px;
    height: 22px;
    cursor: pointer;
    text-shadow: 0 0 4px var(--neon-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .fs-btn:hover, .fs-btn:active {
    background: var(--neon-cyan);
    color: var(--bg);
    text-shadow: none;
  }
</style>
</head>
<body>
  <button class="fs-btn" id="fsBtn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
  <div class="wrap">
    <header>
      <h1>MINIGAMES</h1>
      <div class="subtitle">&#9654; INSERT COIN &#9664;</div>
    </header>

    <main class="grid">
      <a class="card" href="games/snakes-and-ladders/index.html">
        <div class="thumb">
          <img src="games/snakes-and-ladders/thumb.png" alt="Snakes &amp; Ladders gameplay screenshot">
        </div>
        <div class="card-body">
          <div class="card-title">SNAKES &amp; LADDERS</div>
          <div class="card-tag">Neon '85 board race &mdash; 2-4 players</div>
        </div>
      </a>

      <a class="card" href="games/gioco-dell-oca/index.html">

            <rect x="15" y="15" width="370" height="270" fill="none" stroke="#b3893b" stroke-width="1.5"/>

            <rect x="28" y="28" width="44" height="44" rx="6" fill="#a9c8af" stroke="#1f4a3e" stroke-width="1.5"/>
            <rect x="178" y="78" width="44" height="44" rx="6" fill="#cf9a7f" stroke="#5d1c1a" stroke-width="1.5"/>
            <rect x="328" y="228" width="44" height="44" rx="6" fill="#d8bd6a" stroke="#b3893b" stroke-width="1.5"/>
            <rect x="328" y="28" width="44" height="44" rx="6" fill="#d8b154" stroke="#33240f" stroke-width="1.5"/>
            <text x="350" y="56" text-anchor="middle" font-family="Cinzel, Georgia, serif"

            <g transform="translate(196,168)" fill="#33240f">

        </div>
        <div class="card-body">
          <div class="card-title">IL GIOCO DELL'OCA</div>
          <div class="card-tag">Vintage Italian board &mdash; drinking edition, 2-6 players</div>
        </div>
      </a>

      <a class="card" href="games/busfahren/index.html">

              </g>
              <g transform="rotate(26)">
                <rect x="-52" y="-78" width="104" height="156" rx="11" fill="#14082e" stroke="#ff2bd6" stroke-width="2.5"/>
                <g transform="translate(0,-6)" fill="#ff2bd6">

              </g>
            </g>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-title">BUSFAHREN</div>
          <div class="card-tag">S&uuml;dtiroler Kartenspiel &mdash; 1-4 Spieler</div>
        </div>
      </a>
      <a class="card" href="games/greif-zur-flasche/index.html">
        <div class="thumb">

            <defs>

        <div class="card-body">
          <div class="card-title">GREIF ZUR FLASCHE</div>
          <div class="card-tag">Memory-Trinkspiel &mdash; 2-8 Spieler</div>
        </div>
      </a>
    </main>

    <footer>GAMES ONLINE &mdash; MORE COMING SOON</footer>
  </div>

  <script>
    (function () {
      var fsBtn = document.getElementById('fsBtn');
      var docEl = document.documentElement;
      var supported = docEl.requestFullscreen || docEl.webkitRequestFullscreen ||
                      docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
      if (!supported) { fsBtn.style.display = 'none'; return; }

      function isFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement ||
                  document.mozFullScreenElement || document.msFullscreenElement);
      }
      var WANT_KEY = 'mg_fs_want';
      function wantFs() { try { return sessionStorage.getItem(WANT_KEY) === '1'; } catch (e) { return false; } }
      function setWantFs(on) {
        try { on ? sessionStorage.setItem(WANT_KEY, '1') : sessionStorage.removeItem(WANT_KEY); } catch (e) {}
      }
      function enterFs() {
        var req = docEl.requestFullscreen || docEl.webkitRequestFullscreen ||
                  docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
        if (req) req.call(docEl).catch(function () {});
      }
      function toggleFullscreen() {
        if (!isFullscreen()) {
          setWantFs(true);
          enterFs();
        } else {
          // Explicit user exit — stop auto-restoring on later pages.
          setWantFs(false);
          var exit = document.exitFullscreen || document.webkitExitFullscreen ||
                     document.mozCancelFullScreen || document.msExitFullscreen;
          if (exit) exit.call(document).catch(function () {});
        }
      }
      function updateIcon() {
        fsBtn.textContent = isFullscreen() ? '❐' : '⛶';
      }
      fsBtn.addEventListener('click', toggleFullscreen);
      ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange']
        .forEach(function (ev) { document.addEventListener(ev, updateIcon); });
      updateIcon();

      // Navigation force-exits fullscreen and a fresh gesture is required to
      // re-enter. If the user wanted fullscreen, restore it on their first
      // interaction with this page (the tap/click they'd make anyway).
      if (wantFs() && !isFullscreen()) {
        var restore = function () {
          if (wantFs() && !isFullscreen()) enterFs();
          ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(function (ev) {
            document.removeEventListener(ev, restore, true);
          });
        };
        ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(function (ev) {
          document.addEventListener(ev, restore, true);
        });
      }
    })();
  </script>
</body>
</html>
